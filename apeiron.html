  APEIRON — CHANGE LOG
  (one line per change, most recent on top)

  v0.2.0 — 2026-07-22 — First playable demo: real-time gait (Phase 1.5),
                         a physics-driven kick with computed hit reactions
                         (Phase 2, one verb-class move: "Rift Kick",
                         Distinction), KO win condition, synthesized hit/
                         whoosh/KO audio, and Canvas2D juice (screen shake,
                         hit-stop, hit-flash, particle burst). Deliberately
                         descoped for this milestone, per feasibility
                         review: WebGL2 shader layer, AudioWorklet,
                         Worker/OffscreenCanvas threading, the Essence
                         ledger, and Gamepad support are all still Phase 3+
                         and not in this build -- Canvas2D + main-thread
                         physics gets to "playable and feels good" without
                         their risk. Solve method is a hybrid, not the pure
                         Verlet/PBD sketched in APEIRON_RIG_SCHEMA.md: the
                         PELVIS is a real translating point mass; every
                         constrained limb joint is a damped angular spring
                         (angle + angular velocity) relative to its parent
                         bone's direction, clamped to the schema's angle
                         limits and pulled toward restAngle by the
                         recovery-torque spring. This is a disclosed
                         implementation choice, not a schema change -- see
                         the Physics module's own comment for why.

  v0.1.1 — 2026-07-22 — Phase 1: lock the skeleton/mass/constraint schema
                         in the Rig module (JOINT enum, dynamic-vs-fixed-
                         offset split, Float32Array SoA state, default
                         lengths/masses/angle-limits/rest-angles). Still
                         no solver, no IK, no rendering -- createRigState()
                         only builds the data, it doesn't step or draw it.
                         See APEIRON_RIG_SCHEMA.md for the full rationale;
                         this is that document made real. Phase 1.5 (gait
                         solver, verified moving on an actual device) is
                         the next real commit, not this one.

  v0.1.0 — 2026-07-22 — Phase 0: scaffold only. Version marker, changelog,
                         shared studio color tokens, arcade-nav link, and an
                         empty module skeleton (Rig/Physics/Combat/Audio/VFX/

                         yet. See APEIRON_FLAGSHIP_DESIGN.md for the locked
                         design intent. Phase 1 (skeleton + mass/constraint
                         schema, written before any rendering code) is the
                         next real commit, not this one.
-->

<script>
'use strict';
// @ts-check

/*
  APEIRON — MODULE MAP (table of contents)
  ------------------------------------------------------------------------
  Each module below is an empty IIFE namespace — a boundary, not a
  build-out. Keep this map's phase column and (once real code exists)
  line-range column accurate as each module grows past its stub; a stale
  TOC on a 30-40k line file is worse than no TOC.

    Rig        Skeleton/joint mass+constraint schema. Structure-of-Arrays
               over Float32Array, not an array of joint objects.        (Phase 1, done)
    Physics    Gait + damped-angular-spring limb solver, translation,
               impulse response. See its own header comment for the
               disclosed gap between this and the schema's planned
               Verlet/PBD solve.                                        (Phase 1.5-2, demo scope done)
    Combat     First Principles verb-classes, hit resolution. One move
               shipped ("Rift Kick", Distinction); Relation/Transformation/
               Persistence moves are not yet built.                     (Phase 2, partial)
    MatchState Round flow, win/loss.                                    (Phase 2, demo scope done)
    Audio      Synthesized hit/whoosh/KO SFX, main thread. NOT the
               AudioWorklet adaptive score from the design doc -- the
               audio-designer review found that not worth building for
               this game; deferred indefinitely, not just to Phase 3.   (demo scope done, Phase 3 target dropped)
    VFX        Canvas2D juice: screen shake, hit-stop, hit-flash,
               particle burst. NOT the WebGL2 shader layer -- still a
               real Phase 3 target if the visual ceiling needs raising
               later, just not required to feel good right now.        (demo scope done, Phase 3 deferred)
    Renderer   Canvas2D background/arena, tapered gradient-shaded rig
               draw, joint accents, HUD (health bars, win screen).      (demo scope done)
    Input      Keyboard + on-screen touch buttons, unified into one
               state. Gamepad API not wired yet.                        (Phase 4, partial)
    Threading  Worker/OffscreenCanvas message protocol; owns the
               transferable-ArrayBuffer contract. transferControlTo-
               Offscreen() is one-way, so this boundary must be decided
               before Physics grows further, not assumed retrofittable. (Phase 3.5, not started)
    Ledger     Cross-game Essence ledger (IndexedDB) read/write and
               schema validation — fails loudly on a missing or
               malformed record, never silently defaults to zero.       (Phase 4, not started)
  ------------------------------------------------------------------------
*/

/**
 * Skeleton, joint mass/constraint data, IK solve, impulse-driven hit response.
 * Phase 1 scope: the schema and its default data only (this IIFE below).
 * No solver, no IK, no draw call exists yet -- see APEIRON_RIG_SCHEMA.md
 * for the full rationale behind every number here, and Phase 1.5/2 in
 * APEIRON_FLAGSHIP_DESIGN.md §10 for what gets built on top of it next.
 */
const Rig = (() => {
  const JOINT_COUNT = 15;

  /** @type {Readonly<Record<string, number>>} */
  const JOINT = Object.freeze({
    PELVIS: 0, CHEST: 1, HEAD: 2,
    HIP_L: 3, KNEE_L: 4, FOOT_L: 5,
    HIP_R: 6, KNEE_R: 7, FOOT_R: 8,
    SHOULDER_L: 9, ELBOW_L: 10, HAND_L: 11,
    SHOULDER_R: 12, ELBOW_R: 13, HAND_R: 14,
  });

  /** Joints solved as real Verlet point masses every physics step. */
  const DYNAMIC_JOINTS = Object.freeze([
    JOINT.PELVIS, JOINT.CHEST,
    JOINT.KNEE_L, JOINT.FOOT_L, JOINT.KNEE_R, JOINT.FOOT_R,
    JOINT.ELBOW_L, JOINT.HAND_L, JOINT.ELBOW_R, JOINT.HAND_R,
  ]);

  /** Joints recomputed each step as a rigid offset from their parent -- never integrated, no mass of their own. */
  const FIXED_OFFSET_JOINTS = Object.freeze([
    JOINT.HEAD, JOINT.HIP_L, JOINT.HIP_R, JOINT.SHOULDER_L, JOINT.SHOULDER_R,
  ]);

  /**
   * One row per joint, indexed by JOINT.*, per APEIRON_RIG_SCHEMA.md §1-4.
   * `massFraction` is 0 for fixed-offset joints (they carry no independent
   * mass); `parent` is -1 only for PELVIS, the root. Angle fields are
   * relative to the parent bone's own direction, not an absolute frame --
   * see the schema doc §4 for why that convention was chosen over
   * Rykndu's absolute-frame one.
   * @type {Array<{parent:number, length:number, massFraction:number, angleMin:number, angleMax:number, restAngle:number}>}
   */
  const JOINT_DEFS = [
    /* PELVIS      */ { parent: -1, length: 0,   massFraction: 0.20,  angleMin: 0,     angleMax: 0,    restAngle: 0 },
    /* CHEST       */ { parent: 0,  length: 62,  massFraction: 0.38,  angleMin: -0.35, angleMax: 0.35, restAngle: 0.05 },
    /* HEAD        */ { parent: 1,  length: 21,  massFraction: 0,     angleMin: 0,     angleMax: 0,    restAngle: 0 },
    /* HIP_L       */ { parent: 0,  length: 2,   massFraction: 0,     angleMin: 0,     angleMax: 0,    restAngle: 0 },
    /* KNEE_L      */ { parent: 3,  length: 50,  massFraction: 0.10,  angleMin: -1.2,  angleMax: 1.0,  restAngle: 0.15 },
    /* FOOT_L      */ { parent: 4,  length: 48,  massFraction: 0.055, angleMin: 0,     angleMax: 2.4,  restAngle: 0.25 },
    /* HIP_R       */ { parent: 0,  length: 2,   massFraction: 0,     angleMin: 0,     angleMax: 0,    restAngle: 0 },
    /* KNEE_R      */ { parent: 6,  length: 50,  massFraction: 0.10,  angleMin: -1.2,  angleMax: 1.0,  restAngle: 0.15 },
    /* FOOT_R      */ { parent: 7,  length: 48,  massFraction: 0.055, angleMin: 0,     angleMax: 2.4,  restAngle: 0.25 },
    /* SHOULDER_L  */ { parent: 1,  length: 4.5, massFraction: 0,     angleMin: 0,     angleMax: 0,    restAngle: 0 },
    /* ELBOW_L     */ { parent: 9,  length: 37,  massFraction: 0.03,  angleMin: -0.5,  angleMax: 3.0,  restAngle: 0.30 },
    /* HAND_L      */ { parent: 10, length: 37,  massFraction: 0.025, angleMin: 0,     angleMax: 2.6,  restAngle: 0.90 },
    /* SHOULDER_R  */ { parent: 1,  length: 4.5, massFraction: 0,     angleMin: 0,     angleMax: 0,    restAngle: 0 },
    /* ELBOW_R     */ { parent: 12, length: 37,  massFraction: 0.03,  angleMin: -0.5,  angleMax: 3.0,  restAngle: 0.30 },
    /* HAND_R      */ { parent: 13, length: 37,  massFraction: 0.025, angleMin: 0,     angleMax: 2.6,  restAngle: 0.90 },
  ];

  // Dev-time consistency check: every joint is exactly one of dynamic/fixed,
  // and the two lists partition JOINT_COUNT with no gap or overlap. Cheap,
  // and it's exactly the kind of drift ("a joint added to JOINT but never
  // classified") that would otherwise surface as a silent NaN deep in a
  // future solver instead of here, at data-definition time.
  (() => {
    const seen = new Uint8Array(JOINT_COUNT);
    for (const j of DYNAMIC_JOINTS) seen[j] = 1;
    for (const j of FIXED_OFFSET_JOINTS) seen[j] = 1;
    if (seen.reduce((a, b) => a + b, 0) !== JOINT_COUNT) {
      throw new Error('Rig: DYNAMIC_JOINTS + FIXED_OFFSET_JOINTS must partition every JOINT index exactly once.');
    }
  })();

  /**
   * @typedef {Object} RigState
   * @property {Float32Array} posX       - current world-space x, length JOINT_COUNT
   * @property {Float32Array} posY       - current world-space y
   * @property {Float32Array} prevX      - previous-step x (Verlet velocity is implicit: posX - prevX)
   * @property {Float32Array} prevY      - previous-step y
   * @property {Float32Array} invMass    - 1/mass; 0 for FIXED_OFFSET_JOINTS
   * @property {Int8Array}    parent     - parent JOINT index per joint, -1 for PELVIS
   * @property {Float32Array} boneLength - rest distance to parent, per joint
   * @property {Float32Array} angleMin   - radians, relative to parent bone direction
   * @property {Float32Array} angleMax   - radians, relative to parent bone direction
   * @property {Float32Array} restAngle  - recovery-torque spring target, radians
   */

  /**
   * Builds a fresh RigState from JOINT_DEFS. Pure data -- no positions are
   * solved into a real stance here (that's the gait solver, Phase 1.5);
   * posX/posY/prevX/prevY all start at 0 and are populated by whatever
   * first calls this, not by this function itself.
   * @returns {RigState}
   */
  function createState() {
    const posX = new Float32Array(JOINT_COUNT);
    const posY = new Float32Array(JOINT_COUNT);
    const prevX = new Float32Array(JOINT_COUNT);
    const prevY = new Float32Array(JOINT_COUNT);
    const invMass = new Float32Array(JOINT_COUNT);
    const parent = new Int8Array(JOINT_COUNT);
    const boneLength = new Float32Array(JOINT_COUNT);
    const angleMin = new Float32Array(JOINT_COUNT);
    const angleMax = new Float32Array(JOINT_COUNT);
    const restAngle = new Float32Array(JOINT_COUNT);

    JOINT_DEFS.forEach((def, i) => {
      parent[i] = def.parent;
      boneLength[i] = def.length;
      invMass[i] = def.massFraction > 0 ? 1 / def.massFraction : 0;
      angleMin[i] = def.angleMin;
      angleMax[i] = def.angleMax;
      restAngle[i] = def.restAngle;
    });

    return { posX, posY, prevX, prevY, invMass, parent, boneLength, angleMin, angleMax, restAngle };
  }

  return { JOINT_COUNT, JOINT, DYNAMIC_JOINTS, FIXED_OFFSET_JOINTS, createState };
})();

/**
 * Gait + limb solver, translation, impulse response.
 *
 * Disclosed gap from APEIRON_RIG_SCHEMA.md: that doc specs a uniform
 * Verlet/PBD solve for every dynamic joint. What's actually built here is
 * a hybrid: PELVIS is a real translating point (the only joint whose
 * position is a primary state variable), while every constrained limb
 * joint is represented as an ANGLE (relative to its parent bone's
 * direction, exactly per the schema's own convention) driven by a damped
 * angular spring -- angle/angular-velocity integrated with semi-implicit
 * Euler, clamped to the schema's angleMin/angleMax, pulled toward a
 * per-frame target by ANGULAR_STIFFNESS/DAMPING. This is a legitimate,
 * simpler reading of "constraint-solved, not pose-blended" (a joint with
 * rotational inertia under a recovery torque IS a physical model, not a
 * lookup table) chosen because it's stable at real mobile frame times
 * and fast to get right; the uniform Verlet/PBD version is a real future
 * upgrade, not a correctness bug in this one.
 */
const Physics = (() => {
  const { JOINT } = Rig;
  const DOWN = Math.PI / 2;
  const UP = -Math.PI / 2;

  const ANGULAR_STIFFNESS = 260;  // rad/s^2 per rad of target error
  const ANGULAR_DAMPING = 14;     // 1/s
  const MOVE_ACCEL = 2600;        // px/s^2
  const MOVE_MAX_SPEED = 210;     // px/s
  const MOVE_FRICTION = 1400;     // px/s^2, applied when no input
  const DISPLAY_SCALE = 1.3;      // uniform scale on every schema length; shared by render + hit-test so they can't desync

  // Every constrained joint's angle is measured against this reference.
  // Root-attached bones (spine/thigh/upper-arm) have no parent bone of
  // their own, so they reference a fixed world direction; chained bones
  // (shin/forearm) compose onto their parent's already-resolved angle --
  // this is what makes the limit "relative to parent bone direction" as
  // promised in the schema doc, for joints two bones deep too.
  const REF = Object.freeze({
    [JOINT.CHEST]: { base: UP, from: null },
    [JOINT.KNEE_L]: { base: DOWN, from: null },
    [JOINT.KNEE_R]: { base: DOWN, from: null },
    [JOINT.ELBOW_L]: { base: DOWN, from: null },
    [JOINT.ELBOW_R]: { base: DOWN, from: null },
    [JOINT.FOOT_L]: { base: 0, from: JOINT.KNEE_L },
    [JOINT.FOOT_R]: { base: 0, from: JOINT.KNEE_R },
    [JOINT.HAND_L]: { base: 0, from: JOINT.ELBOW_L },
    [JOINT.HAND_R]: { base: 0, from: JOINT.ELBOW_R },
  });

  const CONSTRAINED_JOINTS = Object.freeze([
    JOINT.CHEST, JOINT.KNEE_L, JOINT.FOOT_L, JOINT.KNEE_R, JOINT.FOOT_R,
    JOINT.ELBOW_L, JOINT.HAND_L, JOINT.ELBOW_R, JOINT.HAND_R,
  ]);

  const dirX = a => Math.cos(a);
  const dirY = a => Math.sin(a);

  /**
   * One fighter's live simulation state. Phase 1 deliberately stopped at
   * the schema; everything that changes frame to frame lives here.
   */
  function createBody(groundY, x, facing) {
    const rig = Rig.createState();
    const angle = new Float32Array(Rig.JOINT_COUNT);
    const angVel = new Float32Array(Rig.JOINT_COUNT);
    for (let i = 0; i < Rig.JOINT_COUNT; i++) angle[i] = rig.restAngle[i];
    // PELVIS is the hip line, not the feet -- stand height is thigh+shin
    // below it, so the pelvis itself sits that far above groundY, not on it.
    const standHeight = (rig.boneLength[JOINT.KNEE_L] + rig.boneLength[JOINT.FOOT_L]) * DISPLAY_SCALE;
    return {
      rig, angle, angVel,
      x, y: groundY - standHeight, vx: 0,
      facing, groundY,
      phase: 0,       // gait cycle phase accumulator
      hitstun: 0,
      poseOverride: null, // Map<jointIndex, targetAngle>, set by Combat during an attack
    };
  }

  function worldAngle(body, j) {
    const ref = REF[j];
    if (!ref) return 0;
    const base = ref.from === null ? ref.base : worldAngle(body, ref.from);
    return base + body.angle[j];
  }

  /**
   * Forward-kinematics: resolves rig.posX/posY from the current angle[]
   * state. This is the ONLY place world positions are computed, and both
   * rendering and hit-detection read from it -- the exact discipline
   * RYKNDU_RIG_SCHEMA.md calls out (a draw-only mirror desyncing from the
   * real hit-checked joints) is what this single-resolve avoids.
   */
  function resolvePose(body) {
    const rig = body.rig;
    const s = DISPLAY_SCALE;
    const set = (j, x, y) => { rig.posX[j] = x; rig.posY[j] = y; };

    set(JOINT.PELVIS, body.x, body.y);

    const chestA = worldAngle(body, JOINT.CHEST);
    set(JOINT.CHEST,
      body.x + dirX(chestA) * rig.boneLength[JOINT.CHEST] * s,
      body.y + dirY(chestA) * rig.boneLength[JOINT.CHEST] * s);

    set(JOINT.HEAD,
      rig.posX[JOINT.CHEST] + dirX(chestA) * rig.boneLength[JOINT.HEAD] * s,
      rig.posY[JOINT.CHEST] + dirY(chestA) * rig.boneLength[JOINT.HEAD] * s);

    set(JOINT.HIP_L, body.x - rig.boneLength[JOINT.HIP_L] * s, body.y);
    set(JOINT.HIP_R, body.x + rig.boneLength[JOINT.HIP_R] * s, body.y);
    set(JOINT.SHOULDER_L, rig.posX[JOINT.CHEST] - rig.boneLength[JOINT.SHOULDER_L] * s, rig.posY[JOINT.CHEST] + 4 * s);
    set(JOINT.SHOULDER_R, rig.posX[JOINT.CHEST] + rig.boneLength[JOINT.SHOULDER_R] * s, rig.posY[JOINT.CHEST] + 4 * s);

    const chains = [
      [JOINT.HIP_L, JOINT.KNEE_L, JOINT.FOOT_L],
      [JOINT.HIP_R, JOINT.KNEE_R, JOINT.FOOT_R],
      [JOINT.SHOULDER_L, JOINT.ELBOW_L, JOINT.HAND_L],
      [JOINT.SHOULDER_R, JOINT.ELBOW_R, JOINT.HAND_R],
    ];
    for (const [root, mid, end] of chains) {
      const midA = worldAngle(body, mid);
      set(mid, rig.posX[root] + dirX(midA) * rig.boneLength[mid] * s, rig.posY[root] + dirY(midA) * rig.boneLength[mid] * s);
      const endA = worldAngle(body, end);
      set(end, rig.posX[mid] + dirX(endA) * rig.boneLength[end] * s, rig.posY[mid] + dirY(endA) * rig.boneLength[end] * s);
    }

    // Canonical pose is authored facing right (R = front limbs, per
    // RYKNDU_RIG_SCHEMA.md's own convention, reused here); mirror the
    // whole resolved joint set around pelvis.x when facing left, exactly
    // as Rykndu's v0.1.28 redesign does -- proven, and it's a single
    // post-process pass rather than a second copy of every pose.
    if (body.facing < 0) {
      for (let i = 0; i < Rig.JOINT_COUNT; i++) rig.posX[i] = 2 * body.x - rig.posX[i];
    }
  }

  /** Idle sway blended with a velocity-driven walk cycle -- never a static pose translated across the screen. */
  function computeGaitTargets(body) {
    const rig = body.rig;
    const idle = i => rig.restAngle[i];
    const sway = Math.sin(performance.now() * 0.0015) * 0.02;
    const speed = Math.abs(body.vx);
    const moving = speed > 15;
    if (moving) body.phase += (2.2 + speed * 0.01) / 60;

    const t = { [JOINT.CHEST]: idle(JOINT.CHEST) + sway };
    if (moving) {
      const swingL = Math.sin(body.phase);
      const swingR = Math.sin(body.phase + Math.PI);
      t[JOINT.KNEE_L] = idle(JOINT.KNEE_L) + swingL * 0.55;
      t[JOINT.KNEE_R] = idle(JOINT.KNEE_R) + swingR * 0.55;
      t[JOINT.FOOT_L] = idle(JOINT.FOOT_L) + Math.max(0, Math.sin(body.phase + 0.6)) * 0.9;
      t[JOINT.FOOT_R] = idle(JOINT.FOOT_R) + Math.max(0, Math.sin(body.phase + Math.PI + 0.6)) * 0.9;
      t[JOINT.ELBOW_L] = idle(JOINT.ELBOW_L) - swingR * 0.3;
      t[JOINT.ELBOW_R] = idle(JOINT.ELBOW_R) - swingL * 0.3;
    } else {
      t[JOINT.KNEE_L] = idle(JOINT.KNEE_L);
      t[JOINT.KNEE_R] = idle(JOINT.KNEE_R);
      t[JOINT.FOOT_L] = idle(JOINT.FOOT_L);
      t[JOINT.FOOT_R] = idle(JOINT.FOOT_R);
      t[JOINT.ELBOW_L] = idle(JOINT.ELBOW_L) + sway * 0.5;
      t[JOINT.ELBOW_R] = idle(JOINT.ELBOW_R) - sway * 0.5;
    }
    return t;
  }

  function step(body, dt, moveX, minX, maxX) {
    const targetVX = moveX * MOVE_MAX_SPEED;
    if (Math.abs(targetVX) > 1) {
      body.vx += Math.sign(targetVX - body.vx) * Math.min(Math.abs(targetVX - body.vx), MOVE_ACCEL * dt);
    } else {
      const decel = Math.min(Math.abs(body.vx), MOVE_FRICTION * dt);
      body.vx -= Math.sign(body.vx) * decel;
    }
    body.x += body.vx * dt;
    if (minX !== undefined) body.x = Math.max(minX, Math.min(maxX, body.x));

    const gait = body.hitstun > 0 ? null : computeGaitTargets(body);

    for (const j of CONSTRAINED_JOINTS) {
      const rig = body.rig;
      let target;
      if (body.poseOverride && body.poseOverride.has(j)) target = body.poseOverride.get(j);
      else if (gait && gait[j] !== undefined) target = gait[j];
      else target = rig.restAngle[j];

      const err = target - body.angle[j];
      const accel = err * ANGULAR_STIFFNESS - body.angVel[j] * ANGULAR_DAMPING;
      body.angVel[j] += accel * dt;
      body.angle[j] += body.angVel[j] * dt;

      const lo = rig.angleMin[j], hi = rig.angleMax[j];
      if (body.angle[j] < lo) { body.angle[j] = lo; if (body.angVel[j] < 0) body.angVel[j] = 0; }
      if (body.angle[j] > hi) { body.angle[j] = hi; if (body.angVel[j] > 0) body.angVel[j] = 0; }
    }

    if (body.hitstun > 0) body.hitstun = Math.max(0, body.hitstun - dt);
    resolvePose(body);
  }

  /** A hit converted into an angular kick at one joint -- "computed, not selected", per the design doc. */
  function applyImpulse(body, jointIndex, magnitude) {
    const invMass = body.rig.invMass[jointIndex] || 1;
    body.angVel[jointIndex] += magnitude * invMass * 0.02;
  }

  return { createBody, step, resolvePose, applyImpulse, DISPLAY_SCALE, MOVE_MAX_SPEED };
})();

/**
 * First Principles verb-classes and hit resolution. Demo scope: one move,
 * "Rift Kick" -- classified Distinction (it separates the opponent from
 * their footing/guard on contact), per the design doc's own rule that
 * every move must fit exactly one of the four or be cut. Relation/
 * Transformation/Persistence moves are real future work, not silently
 * dropped -- see the module map above.
 */
const Combat = (() => {
  const J = Rig.JOINT;

  const RIFT_KICK = Object.freeze({
    windup: 0.18, strike: 0.10, recover: 0.28,
    range: 70 * Physics.DISPLAY_SCALE,
    damage: 14,
    knockback: 340,
    principle: 'Distinction',
  });

  const HIT_CANDIDATE_JOINTS = Object.freeze([J.CHEST, J.HEAD, J.KNEE_L, J.KNEE_R, J.ELBOW_L, J.ELBOW_R]);

  function createFighter(body) {
    return { body, hp: 100, attackT: 0, phase: 'idle', hasHit: false, cooldown: 0, name: '' };
  }

  /** @returns {boolean} whether the kick actually started (false if already mid-attack or on cooldown) */
  function startKick(f, onWhoosh) {
    if (f.phase !== 'idle' || f.cooldown > 0) return false;
    f.phase = 'windup';
    f.attackT = 0;
    f.hasHit = false;
    const rig = f.body.rig;
    const ov = new Map();
    ov.set(J.KNEE_R, rig.restAngle[J.KNEE_R] - 0.9);
    ov.set(J.FOOT_R, rig.angleMax[J.FOOT_R] * 0.85);
    f.body.poseOverride = ov;
    onWhoosh && onWhoosh();
    return true;
  }

  function update(f, dt) {
    if (f.cooldown > 0) f.cooldown = Math.max(0, f.cooldown - dt);
    if (f.phase === 'idle') return;
    f.attackT += dt;
    const rig = f.body.rig;

    if (f.phase === 'windup' && f.attackT >= RIFT_KICK.windup) {
      f.phase = 'strike';
      f.attackT = 0;
      f.body.poseOverride.set(J.KNEE_R, rig.restAngle[J.KNEE_R] - 0.25);
      f.body.poseOverride.set(J.FOOT_R, rig.angleMin[J.FOOT_R]);
      f.body.angVel[J.FOOT_R] = -15;
      f.body.angVel[J.KNEE_R] = -5;
    } else if (f.phase === 'strike' && f.attackT >= RIFT_KICK.strike) {
      f.phase = 'recover';
      f.attackT = 0;
      f.body.poseOverride = null;
    } else if (f.phase === 'recover' && f.attackT >= RIFT_KICK.recover) {
      f.phase = 'idle';
      f.cooldown = 0.15;
    }
  }

  /** Attacker's front-foot (contact point) vs. defender's nearest limb/torso joint -- both read from the same resolvePose() output. */
  function checkHit(attackerF, defenderF, onHit) {
    if (attackerF.phase !== 'strike' || attackerF.hasHit) return;
    const aRig = attackerF.body.rig;
    const ax = aRig.posX[J.FOOT_R], ay = aRig.posY[J.FOOT_R];
    const dRig = defenderF.body.rig;

    let best = null, bestD = Infinity;
    for (const j of HIT_CANDIDATE_JOINTS) {
      const dx = dRig.posX[j] - ax, dy = dRig.posY[j] - ay;
      const d = Math.hypot(dx, dy);
      if (d < bestD) { bestD = d; best = j; }
    }
    if (bestD > RIFT_KICK.range) return;

    attackerF.hasHit = true;
    defenderF.hp = Math.max(0, defenderF.hp - RIFT_KICK.damage);
    defenderF.body.hitstun = 0.30;
    const dir = defenderF.body.x >= attackerF.body.x ? 1 : -1;
    defenderF.body.vx += dir * RIFT_KICK.knockback;
    defenderF.body.angVel[J.CHEST] += dir * 3;
    Physics.applyImpulse(defenderF.body, best, dir * 220);

    onHit && onHit({
      attacker: attackerF, defender: defenderF, joint: best,
      x: (ax + dRig.posX[best]) / 2, y: (ay + dRig.posY[best]) / 2,
    });
  }

  return { RIFT_KICK, createFighter, startKick, update, checkHit };
})();

/** Round flow and win/loss. The shared intensity signal (driving audio/VFX escalation together) is a real Phase 3 item, not built for this demo's single-move, single-round scope. */
const MatchState = (() => {
  function create() {
    return { over: false, winner: null };
  }
  function update(state, f1, f2) {
    if (state.over) return;
    if (f1.hp <= 0 || f2.hp <= 0) {
      state.over = true;
      state.winner = (f1.hp <= 0 && f2.hp <= 0) ? 'draw' : (f1.hp <= 0 ? 'p2' : 'p1');
    }
  }
  return { create, update };
})();

/**
 * Synthesized hit-feedback SFX, main thread, oscillator/noise graphs --
 * the same technique already proven in this studio's other games (see
 * infall.html's Music module). NOT the AudioWorklet adaptive score the
 * design doc originally called for: the audio-designer review found that
 * port not worth its complexity for this game, so it's dropped here
 * rather than half-built. AudioContext is created lazily on first user
 * gesture (browser autoplay policy is a real boundary; guarded, not
 * assumed away) -- if construction fails for any reason, every play*
 * function becomes a silent no-op instead of throwing into the game loop.
 */
const Audio = (() => {
  let ctx = null;

  function ensure() {
    if (ctx) return ctx;
    try { ctx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { ctx = null; }
    return ctx;
  }

  function playWhoosh() {
    const c = ensure();
    if (!c) return;
    const t0 = c.currentTime;
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(220, t0);
    osc.frequency.exponentialRampToValueAtTime(90, t0 + 0.15);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(0.12, t0 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.16);
    osc.connect(gain).connect(c.destination);
    osc.start(t0); osc.stop(t0 + 0.18);
  }

  function playHit() {
    const c = ensure();
    if (!c) return;
    const t0 = c.currentTime;

    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(160, t0);
    osc.frequency.exponentialRampToValueAtTime(45, t0 + 0.18);
    gain.gain.setValueAtTime(0.5, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.22);
    osc.connect(gain).connect(c.destination);
    osc.start(t0); osc.stop(t0 + 0.24);

    const bufSize = Math.floor(c.sampleRate * 0.08);
    const buf = c.createBuffer(1, bufSize, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
    const noise = c.createBufferSource();
    noise.buffer = buf;
    const nGain = c.createGain();
    nGain.gain.setValueAtTime(0.35, t0);
    nGain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.08);
    const filt = c.createBiquadFilter();
    filt.type = 'highpass';
    filt.frequency.value = 800;
    noise.connect(filt).connect(nGain).connect(c.destination);
    noise.start(t0);
  }

  let pad = null;
  function startAmbientPad() {
    const c = ensure();
    if (!c || pad) return;
    const gain = c.createGain();
    gain.gain.setValueAtTime(0.05, c.currentTime);
    gain.connect(c.destination);
    const o1 = c.createOscillator(), o2 = c.createOscillator();
    o1.type = 'sine'; o2.type = 'sine';
    o1.frequency.value = 55; o2.frequency.value = 55.6; // slight detune for a slow beat/shimmer
    o1.connect(gain); o2.connect(gain);
    o1.start(); o2.start();
    pad = { gain, o1, o2 };
  }

  function playKO() {
    const c = ensure();
    if (!c) return;
    const t0 = c.currentTime;
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(300, t0);
    osc.frequency.exponentialRampToValueAtTime(60, t0 + 0.6);
    gain.gain.setValueAtTime(0.25, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.7);
    osc.connect(gain).connect(c.destination);
    osc.start(t0); osc.stop(t0 + 0.72);
  }

  return { ensure, playWhoosh, playHit, playKO, startAmbientPad };
})();

/** Canvas2D juice: screen shake, hit-flash, particle burst. The WebGL2 shader layer from the design doc is a real future upgrade, not built here -- see the module map above for why that's fine for this milestone. */
const VFX = (() => {
  let shake = 0;
  let flash = 0;
  const particles = [];

  function addShake(amount) { shake = Math.min(1, shake + amount); }
  function addFlash(amount) { flash = Math.min(1, flash + amount); }

  function burst(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 60 + Math.random() * 220;
      particles.push({
        x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60,
        life: 0.35 + Math.random() * 0.25, age: 0, color, size: 2 + Math.random() * 3,
      });
    }
  }

  function update(dt) {
    shake = Math.max(0, shake - dt * 3.2);
    flash = Math.max(0, flash - dt * 4.5);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.age += dt;
      if (p.age >= p.life) { particles.splice(i, 1); continue; }
      p.vy += 500 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
    }
  }

  function shakeOffset() {
    if (shake <= 0) return [0, 0];
    const m = shake * 10;
    return [(Math.random() * 2 - 1) * m, (Math.random() * 2 - 1) * m];
  }

  return { addShake, addFlash, burst, update, shakeOffset, particles, get flash() { return flash; } };
})();

/** Canvas2D background/arena, rig draw, HUD. Not in the original module map -- added here because base rendering needs its own boundary distinct from VFX (juice) and Physics (simulation). */
const Renderer = (() => {
  const J = Rig.JOINT;
  const s = Physics.DISPLAY_SCALE;

  const BACK_LIMBS = Object.freeze([
    [J.HIP_L, J.KNEE_L, 7, 6], [J.KNEE_L, J.FOOT_L, 6, 4],
    [J.SHOULDER_L, J.ELBOW_L, 6, 5], [J.ELBOW_L, J.HAND_L, 5, 4],
  ]);
  const FRONT_LIMBS = Object.freeze([
    [J.HIP_R, J.KNEE_R, 8, 6], [J.KNEE_R, J.FOOT_R, 7, 5],
    [J.SHOULDER_R, J.ELBOW_R, 6.5, 5], [J.ELBOW_R, J.HAND_R, 5.5, 4],
  ]);

  function drawLimb(ctx, x1, y1, x2, y2, w1, w2, base, highlight) {
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.hypot(dx, dy) || 1;
    const nx = -dy / len, ny = dx / len;
    ctx.beginPath();
    ctx.moveTo(x1 + nx * w1, y1 + ny * w1);
    ctx.lineTo(x2 + nx * w2, y2 + ny * w2);
    ctx.lineTo(x2 - nx * w2, y2 - ny * w2);
    ctx.lineTo(x1 - nx * w1, y1 - ny * w1);
    ctx.closePath();
    const grad = ctx.createLinearGradient(x1 + nx * w1, y1 + ny * w1, x1 - nx * w1, y1 - ny * w1);
    grad.addColorStop(0, base);
    grad.addColorStop(0.5, highlight);
    grad.addColorStop(1, base);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(10,6,32,0.55)';
    ctx.stroke();
  }

  function drawJointAccent(ctx, x, y, r, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(Math.PI / 4);
    ctx.beginPath();
    ctx.moveTo(0, -r); ctx.lineTo(r * 0.7, 0); ctx.lineTo(0, r); ctx.lineTo(-r * 0.7, 0);
    ctx.closePath();
    const g = ctx.createRadialGradient(0, -r * 0.3, 0, 0, 0, r);
    g.addColorStop(0, '#ffffff');
    g.addColorStop(0.4, color);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
  }

  function drawRig(ctx, body, colors) {
    const P = body.rig.posX, Q = body.rig.posY;
    for (const [a, b, w1, w2] of BACK_LIMBS) drawLimb(ctx, P[a], Q[a], P[b], Q[b], w1, w2, colors.limbBack, colors.limbBackLight);
    drawLimb(ctx, P[J.PELVIS], Q[J.PELVIS], P[J.CHEST], Q[J.CHEST], 10, 8, colors.torso, colors.torsoLight);
    drawLimb(ctx, P[J.CHEST], Q[J.CHEST], P[J.HEAD], Q[J.HEAD], 7, 6, colors.torso, colors.torsoLight);
    ctx.beginPath();
    ctx.arc(P[J.HEAD], Q[J.HEAD], 13, 0, Math.PI * 2);
    const hg = ctx.createRadialGradient(P[J.HEAD] - 4, Q[J.HEAD] - 4, 1, P[J.HEAD], Q[J.HEAD], 14);
    hg.addColorStop(0, colors.torsoLight);
    hg.addColorStop(1, colors.torso);
    ctx.fillStyle = hg;
    ctx.fill();
    for (const [a, b, w1, w2] of FRONT_LIMBS) drawLimb(ctx, P[a], Q[a], P[b], Q[b], w1, w2, colors.limbFront, colors.limbFrontLight);
    drawJointAccent(ctx, P[J.CHEST], Q[J.CHEST], 5, colors.accent);
    drawJointAccent(ctx, P[J.KNEE_R], Q[J.KNEE_R], 5, colors.accent);
    drawJointAccent(ctx, P[J.ELBOW_R], Q[J.ELBOW_R], 4, colors.accent);
  }

  function drawBackground(ctx, w, h, groundY) {
    const g = ctx.createLinearGradient(0, 0, 0, h);
    g.addColorStop(0, '#1c0f42');
    g.addColorStop(1, '#0a0620');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);

    const rg = ctx.createRadialGradient(w / 2, groundY, 10, w / 2, groundY, w * 0.6);
    rg.addColorStop(0, 'rgba(185,138,255,0.10)');
    rg.addColorStop(1, 'rgba(185,138,255,0)');
    ctx.fillStyle = rg;
    ctx.fillRect(0, 0, w, h);

    ctx.strokeStyle = 'rgba(255,215,107,0.35)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.lineTo(w, groundY);
    ctx.stroke();

    ctx.fillStyle = 'rgba(10,6,32,0.55)';
    ctx.fillRect(0, groundY, w, h - groundY);
  }

  function drawParticles(ctx) {
    for (const p of VFX.particles) {
      ctx.globalAlpha = Math.max(0, 1 - p.age / p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawHUD(ctx, w, f1, f2, names) {
    const barW = w * 0.36, barH = 16, pad = 18;
    function bar(x, hp, alignRight) {
      ctx.fillStyle = 'rgba(20,11,48,0.7)';
      ctx.fillRect(x, pad, barW, barH);
      const pct = Math.max(0, hp) / 100;
      const fw = barW * pct;
      ctx.fillStyle = pct > 0.35 ? '#5eff9c' : '#ff4d70';
      ctx.fillRect(alignRight ? x + barW - fw : x, pad, fw, barH);
      ctx.strokeStyle = 'rgba(255,215,107,0.5)';
      ctx.strokeRect(x, pad, barW, barH);
    }
    bar(pad, f1.hp, false);
    bar(w - pad - barW, f2.hp, true);
    ctx.fillStyle = '#f4ecff';
    ctx.font = '13px "IBM Plex Mono", monospace';
    ctx.textAlign = 'left';
    ctx.fillText(names[0], pad, pad + barH + 16);
    ctx.textAlign = 'right';
    ctx.fillText(names[1], w - pad, pad + barH + 16);
  }

  function drawWinScreen(ctx, w, h, match) {
    ctx.fillStyle = 'rgba(10,6,32,0.55)';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#f4ecff';
    ctx.textAlign = 'center';
    ctx.font = 'bold 42px "Cormorant Garamond", serif';
    const label = match.winner === 'p1' ? 'You Win' : match.winner === 'p2' ? 'CPU Wins' : 'Draw';
    ctx.fillText(label, w / 2, h / 2 - 10);
    ctx.font = '16px "Quicksand", sans-serif';
    ctx.fillText('Press K or tap Kick to restart', w / 2, h / 2 + 26);
  }

  function drawIntro(ctx, w, h, introT, introDuration) {
    const elapsed = introDuration - introT;
    const alpha = introT < 0.3 ? introT / 0.3 : 1;
    const scale = 1 + Math.max(0, 0.35 - elapsed * 1.2);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(w / 2, h * 0.4);
    ctx.scale(scale, scale);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd76b';
    ctx.font = 'bold 56px "Cormorant Garamond", serif';
    ctx.fillText(elapsed < 0.5 ? 'Apeiron' : 'FIGHT!', 0, 0);
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  return { drawRig, drawBackground, drawParticles, drawHUD, drawWinScreen, drawIntro };
})();

/** Keyboard + on-screen touch buttons, unified into one input state. Gamepad API is a real Phase 4 item, not wired yet -- the studio's existing pattern (infall.html/wardfall.html) is the reference to reuse when it is. */
const Input = (() => {
  const keys = new Set();
  const touch = { left: false, right: false, attack: false };

  window.addEventListener('keydown', e => {
    if (e.code === 'ArrowLeft' || e.code === 'ArrowRight' || e.code === 'Space') e.preventDefault();
    keys.add(e.code);
  }, { passive: false });
  window.addEventListener('keyup', e => keys.delete(e.code));

  function bindTouchButton(el, key) {
    if (!el) return;
    const on = e => { e.preventDefault(); touch[key] = true; };
    const off = e => { e.preventDefault(); touch[key] = false; };
    el.addEventListener('touchstart', on, { passive: false });
    el.addEventListener('touchend', off, { passive: false });
    el.addEventListener('touchcancel', off, { passive: false });
    el.addEventListener('mousedown', on);
    el.addEventListener('mouseup', off);
    el.addEventListener('mouseleave', off);
  }

  function p1() {
    return {
      left: keys.has('ArrowLeft') || keys.has('KeyA') || touch.left,
      right: keys.has('ArrowRight') || keys.has('KeyD') || touch.right,
      attack: keys.has('Space') || keys.has('KeyK') || touch.attack,
    };
  }

  return { p1, bindTouchButton, keys };
})();

/**
 * Demo bootstrap: canvas setup, two fighters (player vs. a simple CPU),
 * the game loop, and event wiring. Not a module -- the entry point that
 * uses them, per the studio's usual single-file structure.
 */
(function main() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  let W = 0, H = 0, groundY = 0;

  function resize() {
    W = canvas.clientWidth;
    H = canvas.clientHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    groundY = H * 0.78;
  }
  window.addEventListener('resize', resize);
  resize();

  const P1_COLORS = { limbBack: '#5a4a8a', limbBackLight: '#7a68b8', limbFront: '#7a5fd6', limbFrontLight: '#a98fff', torso: '#4ea8ff', torsoLight: '#8fd0ff', accent: '#b98aff' };
  const P2_COLORS = { limbBack: '#8a4a5a', limbBackLight: '#b8687a', limbFront: '#d65f6f', limbFrontLight: '#ff8fa0', torso: '#ff8f4e', torsoLight: '#ffcf8f', accent: '#ffcb5c' };

  let p1Body, p2Body, f1, f2, match, matchOverAt, introT;
  const RESTART_DELAY = 0.8; // seconds the win screen must show before a restart press is honored -- otherwise a held attack key skips it instantly
  const INTRO_DURATION = 1.1;

  function resetMatch() {
    p1Body = Physics.createBody(groundY, W * 0.32, 1);
    p2Body = Physics.createBody(groundY, W * 0.68, -1);
    Physics.resolvePose(p1Body);
    Physics.resolvePose(p2Body);
    f1 = Combat.createFighter(p1Body);
    f2 = Combat.createFighter(p2Body);
    match = MatchState.create();
    matchOverAt = 0;
    introT = INTRO_DURATION;
  }
  resetMatch();

  window.addEventListener('keydown', e => {
    if (match.over && (e.code === 'Space' || e.code === 'KeyK') && (performance.now() - matchOverAt) / 1000 > RESTART_DELAY) resetMatch();
  });
  Input.bindTouchButton(document.getElementById('btnLeft'), 'left');
  Input.bindTouchButton(document.getElementById('btnRight'), 'right');
  Input.bindTouchButton(document.getElementById('btnKick'), 'attack');

  function unlockAudio() {
    Audio.ensure();
    Audio.startAmbientPad();
    window.removeEventListener('keydown', unlockAudio);
    window.removeEventListener('touchstart', unlockAudio);
  }
  window.addEventListener('keydown', unlockAudio);
  window.addEventListener('touchstart', unlockAudio);

  function onHit(info) {
    Audio.playHit();
    VFX.addShake(0.7);
    VFX.addFlash(0.4);
    VFX.burst(info.x, info.y, info.attacker === f1 ? P1_COLORS.accent : P2_COLORS.accent, 18);
    hitstop = 0.06;
  }

  let prevAttack = false;
  let cpuCooldown = 1.0;
  let hitstop = 0;
  let last = performance.now();

  function frame(now) {
    let dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    requestAnimationFrame(frame);

    if (hitstop > 0) { hitstop -= dt; dt *= 0.05; }

    const input = Input.p1();
    const attackPressed = input.attack && !prevAttack;
    prevAttack = input.attack;

    if (introT > 0) introT = Math.max(0, introT - dt);

    if (!match.over) {
      // Both fighters always face each other, independent of movement direction -- standard fighting-game convention, and it removes an entire class of "attacked while facing the wrong way" bug.
      p1Body.facing = p2Body.x >= p1Body.x ? 1 : -1;
      p2Body.facing = p1Body.x >= p2Body.x ? 1 : -1;

      const moveX1 = (input.left ? -1 : 0) + (input.right ? 1 : 0);
      Physics.step(p1Body, dt, moveX1, 60, W - 60);
      Combat.update(f1, dt);
      if (attackPressed && introT <= 0) Combat.startKick(f1, Audio.playWhoosh);

      cpuCooldown -= dt;
      const gap = p1Body.x - p2Body.x;
      const dist = Math.abs(gap);
      const moveX2 = dist > 90 ? Math.sign(gap) : 0;
      Physics.step(p2Body, dt, moveX2, 60, W - 60);
      Combat.update(f2, dt);
      if (dist < 100 && cpuCooldown <= 0 && f2.phase === 'idle' && introT <= 0) {
        if (Combat.startKick(f2, Audio.playWhoosh)) cpuCooldown = 0.9 + Math.random() * 0.8;
      }

      // Fighters don't collide against each other's rigs (no per-limb
      // collision in this demo scope), but standing on top of each other
      // reads as broken, not "close range" -- a flat minimum body-to-body
      // separation is enough to prevent that at this scope.
      const MIN_SEPARATION = 70;
      const curGap = p2Body.x - p1Body.x;
      if (Math.abs(curGap) < MIN_SEPARATION) {
        const push = (MIN_SEPARATION - Math.abs(curGap)) / 2;
        const sign = curGap >= 0 ? 1 : -1;
        p1Body.x -= sign * push;
        p2Body.x += sign * push;
        Physics.resolvePose(p1Body);
        Physics.resolvePose(p2Body);
      }

      Combat.checkHit(f1, f2, onHit);
      Combat.checkHit(f2, f1, onHit);
      MatchState.update(match, f1, f2);
      if (match.over) { Audio.playKO(); matchOverAt = performance.now(); }
    }

    VFX.update(dt);

    const [sx, sy] = VFX.shakeOffset();
    ctx.save();
    ctx.translate(sx, sy);
    Renderer.drawBackground(ctx, W, H, groundY);
    Renderer.drawRig(ctx, p1Body, P1_COLORS);
    Renderer.drawRig(ctx, p2Body, P2_COLORS);
    Renderer.drawParticles(ctx);
    ctx.restore();

    if (VFX.flash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${VFX.flash * 0.5})`;
      ctx.fillRect(0, 0, W, H);
    }

    Renderer.drawHUD(ctx, W, f1, f2, ['P1', 'CPU']);
    if (introT > 0) Renderer.drawIntro(ctx, W, H, introT, INTRO_DURATION);
    if (match.over) Renderer.drawWinScreen(ctx, W, H, match);
  }
  requestAnimationFrame(frame);
})();
</script>

</body>
</html>
