<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rykndu Doll Rig — Prototype</title>

<!--
  RYKNDU DOLL RIG — CHANGE LOG
  (one line per change, most recent on top — treat git commit messages as
  the authoritative record of what actually changed; this comment is
  useful context, not ground truth)

  v0.1.5 — 2026-07-08 — Real hit detection and an autonomous enemy,
                          replacing the mock marker. Two independent team
                          reviews (game-designer and engineer) had found the
                          same root cause behind this rig "feeling thin":
                          the old mockEnemy only ever existed as a side
                          effect of the player's own startAttack() call, so
                          it could never actually threaten anything.
                          Enemies now spawn and approach on their own timer
                          (one at a time for now — the array/side-based
                          shape is ready for a second concurrent enemy
                          later, but actually spawning two at once is still
                          deferred, per the studio's own gate on the
                          double-boss goal). A hit is checked only during
                          the strike phase specifically, against the real
                          kicking foot's world position from solveRig() —
                          the exact thing the v0.1.4 refactor was for. An
                          enemy that reaches melee range unanswered is
                          counted as missed rather than killed; neither
                          count is wired to a health bar or win/lose yet —
                          that's the next phase, gated on this one existing
                          first. window.Rig._test now exposes the enemy
                          list, kill/miss counts, and a spawnEnemy(side,
                          elapsedMs) hook for deterministic testing.

  v0.1.4 — 2026-07-08 — Split drawRig() into solveRig(pose), pure math that
                          returns every joint's world-space position, and
                          renderRig(joints), which only draws from that
                          output. Previously a joint's position (e.g. a
                          foot) was computed and discarded in the same
                          statement it was drawn in, so no hit-detection
                          system had anything to read. No intended visual
                          change — verified by before/after screenshot
                          comparison at idle, mid-windup, and mid-strike.
                          window.Rig._test.state() now also exposes the
                          solved joints. This was flagged as the one real
                          architectural blocker for adding enemies/hit
                          detection next (an independent engineer review
                          confirmed the rest of the rig's foundation is
                          sound and didn't need restructuring).

  v0.1.3 — 2026-07-08 — Studio audit (game-designer subagent) found the
                          attack model was structurally unable to support
                          the decided double-boss/single-input-stream design
                          goal: windup+strike+recover (400ms) was one
                          indivisible lock, even though the hit resolves
                          during strike (152ms) and the remaining 220ms of
                          recovery has no gameplay function. Split the lock
                          into committed phases (windup+strike, 180ms,
                          uninterruptible) and a final recovery phase that a
                          new input can now cancel immediately instead of
                          waiting out — a buffered input fires the instant
                          the committed phase ends, and a fresh input during
                          recovery starts right away. Also added a window.Rig
                          _test hook and a committed Playwright regression
                          test (tests/rig-sequence.js) driving this state
                          machine through the real page, since two real bugs
                          upstream were already found by simulating it, not
                          by reading it.
                          Correction (independent engineer audit, same day):
                          this comment previously misnamed the test file and
                          called it "non-DOM" — it's DOM/Playwright-driven.
                          Treat git commit messages as the authoritative
                          record for this file's history; this comment is
                          useful context but not ground truth.

  v0.1.2 — 2026-07-08 — v0.1.1's pose-blend fix only covered the transition
                          inside the sequence loop; startAttack() had the
                          same circular-self-read bug (fromPose was captured
                          AFTER seq was reassigned, so it read as a no-op),
                          causing a visible snap on every attack after the
                          first. Reordered so fromPose is captured first.
                          Also fixed a left-kick-only bug where the mirrored
                          spine angle landed ~2pi away from its visual
                          equivalent, making lerpPose sweep almost a full
                          rotation instead of a small lean — mirror() now
                          wraps spineA into (-pi, pi]. And mockEnemy.hitAt
                          no longer re-hardcodes the windup/strike durations
                          (it now reads them from the sequence itself), so a
                          future timing-tuning pass can't silently desync it.

  v0.1.1 — 2026-07-08 — Fixed a crash on the last phase of any attack
                          sequence: seqIdx could go out of bounds and get
                          read before the end-of-sequence check ran. Reordered
                          so the bounds check happens first, and fixed the
                          pose-blend handoff to use the just-completed phase's
                          actual target instead of a circular self-read.

  v0.1.0 — 2026-07-08 — Phase 0 + first rig prototype: joint hierarchy
                          (pelvis/spine/head, hip-knee legs, shoulder-elbow
                          arms), idle breathing pose, left/right kick attack
                          with windup/strike/recover phases and input
                          buffering, keyboard + tap-zone input, mock
                          incoming-enemy marker for connect-timing
                          feel-testing only (not real hit detection).
-->

<style>
  html, body { margin: 0; padding: 0; background: #12141c; overflow: hidden; height: 100%; }
  #stage { display: block; touch-action: none; }
  .version-marker {
    position: fixed; top: 8px; right: 10px; font-size: 10px; color: #888;
    opacity: 0.5; letter-spacing: 0.02em; font-family: monospace; z-index: 50;
    pointer-events: none;
  }
  #hint {
    position: fixed; bottom: 10px; left: 0; right: 0; text-align: center;
    color: #666; font-family: monospace; font-size: 12px; pointer-events: none;
  }
  #debug {
    position: fixed; top: 8px; left: 10px; font-size: 11px; color: #5c6;
    font-family: monospace; opacity: 0.7; pointer-events: none; white-space: pre;
  }
  .tapzone { position: fixed; top: 0; bottom: 0; width: 50%; }
  #zoneL { left: 0; }
  #zoneR { right: 0; }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="version-marker">Doll Rig Prototype — v0.1.5</div>
<div id="debug"></div>
<div id="hint">&larr; / &rarr; keys, or tap left/right half, to strike</div>
<div class="tapzone" id="zoneL"></div>
<div class="tapzone" id="zoneR"></div>

<script>
(function () {
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  const debugEl = document.getElementById('debug');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // ---- Segment lengths (px) ----
  const LEN = {
    thigh: 62, shin: 60, upperArm: 46, forearm: 46,
    spine: 78, neck: 14, headR: 24,
    hipW: 16, shoulderW: 30
  };

  // Angle convention: 0 = pointing right (+x), PI/2 = pointing down (canvas is y-down).
  const DOWN = Math.PI / 2;

  // ---- Poses: absolute angle per segment + pelvis offset ----
  // These numbers are a first guess, not a tuned result — expect to hand-adjust
  // them once you see the rig move.
  const POSES = {
    idle: {
      pelvisDX: 0, pelvisDY: 0, spineA: -DOWN + 0.03,
      hipL: DOWN + 0.18, kneeL: DOWN + 0.05,
      hipR: DOWN - 0.18, kneeR: DOWN - 0.05,
      shoulderL: DOWN + 1.9, elbowL: DOWN + 1.6,
      shoulderR: DOWN - 1.9, elbowR: DOWN - 1.6
    },
    kickR_windup: {
      pelvisDX: -10, pelvisDY: 4, spineA: -DOWN - 0.12,
      hipL: DOWN + 0.35, kneeL: DOWN + 0.55,
      hipR: DOWN - 0.55, kneeR: DOWN - 0.75,
      shoulderL: DOWN + 2.0, elbowL: DOWN + 1.7,
      shoulderR: DOWN - 1.6, elbowR: DOWN - 1.2
    },
    kickR_strike: {
      pelvisDX: -14, pelvisDY: 0, spineA: -DOWN - 0.22,
      hipL: DOWN + 0.25, kneeL: DOWN + 0.35,
      hipR: -0.35, kneeR: -0.30,
      shoulderL: DOWN + 2.1, elbowL: DOWN + 1.8,
      shoulderR: DOWN - 1.3, elbowR: DOWN - 0.9
    }
  };

  // Keep a mirrored spine angle within (-pi, pi] of the un-mirrored range —
  // spineA's resting orientation is near -pi/2, so a raw "pi - angle"
  // reflection lands near +3pi/2 instead: numerically ~2pi away from its
  // own visual equivalent, which made lerpPose sweep almost a full
  // rotation on every left-side kick instead of a small lean.
  function wrapAngle(a) {
    while (a > Math.PI) a -= 2 * Math.PI;
    while (a <= -Math.PI) a += 2 * Math.PI;
    return a;
  }

  // Build the mirrored left-side kick from the right-side kick definitions,
  // so the two sides can never silently drift out of sync with each other.
  function mirror(pose) {
    return {
      pelvisDX: -pose.pelvisDX, pelvisDY: pose.pelvisDY, spineA: wrapAngle(Math.PI - pose.spineA),
      hipL: Math.PI - pose.hipR, kneeL: Math.PI - pose.kneeR,
      hipR: Math.PI - pose.hipL, kneeR: Math.PI - pose.kneeL,
      shoulderL: Math.PI - pose.shoulderR, elbowL: Math.PI - pose.elbowR,
      shoulderR: Math.PI - pose.shoulderL, elbowR: Math.PI - pose.elbowL
    };
  }
  POSES.kickL_windup = mirror(POSES.kickR_windup);
  POSES.kickL_strike = mirror(POSES.kickR_strike);

  function lerp(a, b, t) { return a + (b - a) * t; }
  function lerpPose(a, b, t) {
    const out = {};
    for (const k in a) out[k] = lerp(a[k], b[k], t);
    return out;
  }
  function easeOutQuad(t) { return 1 - (1 - t) * (1 - t); }
  function easeInQuad(t) { return t * t; }
  function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

  // Windup -> strike -> recover. Durations are a first guess for tempo —
  // this is the single most important thing to tune once you're watching it.
  function attackSequence(side) {
    const w = side === 'R' ? 'kickR_windup' : 'kickL_windup';
    const s = side === 'R' ? 'kickR_strike' : 'kickL_strike';
    return [
      { pose: w, dur: 110, ease: easeOutQuad },
      { pose: s, dur: 70, ease: easeInQuad },
      { pose: 'idle', dur: 220, ease: easeInOutQuad }
    ];
  }

  // ---- Animation state ----
  let seq = null;
  let seqIdx = 0;
  let seqStart = 0;
  let fromPose = POSES.idle;
  let queuedSide = null; // one buffered input so a fast tap during the committed phases isn't dropped
  let attackSide = null; // which side the currently-playing (or most recent) attack was on

  // Convention: the LAST phase of any attackSequence is recovery — cosmetic
  // follow-through with no remaining gameplay function (the hit has already
  // resolved during strike). Every phase before that is committed: once it
  // starts, it plays out in full. This distinction is load-bearing for the
  // double-boss threat-reading design goal — a player must be able to answer
  // a second threat without waiting out dead recovery time from the first.
  function isCommittedPhase(idx) {
    return idx < seq.length - 1;
  }

  function triggerAttack(side) {
    if (seq && isCommittedPhase(seqIdx)) { queuedSide = side; return; }
    // Either idle, or sitting in the (interruptible) recovery phase — start
    // immediately. startAttack() captures currentPose() as fromPose, so an
    // interrupted recovery blends smoothly into the new windup instead of
    // snapping.
    startAttack(side);
  }

  function startAttack(side) {
    // Capture the outgoing pose BEFORE seq/seqIdx/seqStart change — otherwise
    // currentPose() below takes its mid-sequence branch against the new seq
    // (t=0), returning fromPose unchanged instead of the actual current pose.
    fromPose = currentPose();
    seq = attackSequence(side);
    seqIdx = 0;
    seqStart = performance.now();
    attackSide = side;
  }

  function currentPose() {
    if (!seq) {
      // subtle idle breathing so the rig isn't static between attacks
      const bob = Math.sin(performance.now() / 450) * 3;
      const sway = Math.sin(performance.now() / 900) * 0.04;
      return Object.assign({}, POSES.idle, {
        pelvisDY: POSES.idle.pelvisDY + bob,
        shoulderL: POSES.idle.shoulderL + sway,
        shoulderR: POSES.idle.shoulderR - sway
      });
    }
    const step = seq[seqIdx];
    const t = Math.min(1, (performance.now() - seqStart) / step.dur);
    const eased = step.ease(t);
    const target = step.pose === 'idle' ? POSES.idle : POSES[step.pose];
    return lerpPose(fromPose, target, eased);
  }

  function updateSeq(now) {
    if (!seq) return;
    const step = seq[seqIdx];
    if (now - seqStart >= step.dur) {
      // Capture the pose this phase was heading toward BEFORE advancing,
      // so the next phase blends from the correct starting point.
      const completed = step.pose === 'idle' ? POSES.idle : POSES[step.pose];
      seqIdx++;
      seqStart = now;
      if (seqIdx >= seq.length) {
        // Sequence is over — bail out before touching seq[seqIdx], which
        // is now out of bounds. This check has to come before any read of
        // the next step, not after.
        seq = null;
        if (queuedSide) {
          const s = queuedSide;
          queuedSide = null;
          startAttack(s);
        }
        return;
      }
      fromPose = completed;
      // The committed phases (windup+strike) just finished, so we're about
      // to enter recovery — which has no gameplay function left. If an
      // input was already buffered during windup/strike, don't make the
      // player wait out the full recovery: fire it now instead.
      if (!isCommittedPhase(seqIdx) && queuedSide) {
        const s = queuedSide;
        queuedSide = null;
        startAttack(s);
      }
    }
  }

  // ---- Rig solving (pure math — no canvas calls) ----
  // Returns every joint's world-space position for a given pose. This is the
  // one place segment-endpoint math happens; rendering and (later) hit
  // detection both read from this same output instead of each computing
  // positions their own way, which is exactly how mockEnemy.hitAt's
  // duplicated-duration bug happened before — two copies of the same math
  // silently drifting apart.
  function segEnd(x1, y1, angle, len) {
    return { x: x1 + Math.cos(angle) * len, y: y1 + Math.sin(angle) * len };
  }

  function solveRig(pose) {
    const groundY = canvas.height * 0.78;
    const cx = canvas.width / 2 + pose.pelvisDX;
    const pelvis = { x: cx, y: groundY - LEN.thigh - LEN.shin + pose.pelvisDY };

    const hipL = { x: pelvis.x - LEN.hipW * 0.4, y: pelvis.y };
    const kneeL = segEnd(hipL.x, hipL.y, pose.hipL, LEN.thigh);
    const footL = segEnd(kneeL.x, kneeL.y, pose.kneeL, LEN.shin);

    const hipR = { x: pelvis.x + LEN.hipW * 0.4, y: pelvis.y };
    const kneeR = segEnd(hipR.x, hipR.y, pose.hipR, LEN.thigh);
    const footR = segEnd(kneeR.x, kneeR.y, pose.kneeR, LEN.shin);

    const chest = segEnd(pelvis.x, pelvis.y, pose.spineA, LEN.spine);

    const shoulderL = { x: chest.x - LEN.shoulderW * 0.5, y: chest.y + 8 };
    const elbowL = segEnd(shoulderL.x, shoulderL.y, pose.shoulderL, LEN.upperArm);
    const handL = segEnd(elbowL.x, elbowL.y, pose.elbowL, LEN.forearm);

    const shoulderR = { x: chest.x + LEN.shoulderW * 0.5, y: chest.y + 8 };
    const elbowR = segEnd(shoulderR.x, shoulderR.y, pose.shoulderR, LEN.upperArm);
    const handR = segEnd(elbowR.x, elbowR.y, pose.elbowR, LEN.forearm);

    const head = { x: chest.x, y: chest.y - LEN.neck - LEN.headR };

    return {
      pelvis, hipL, kneeL, footL, hipR, kneeR, footR,
      chest, shoulderL, elbowL, handL, shoulderR, elbowR, handR, head
    };
  }

  // ---- Drawing (pure rendering — no math, reads joints from solveRig) ----
  function drawLine(p1, p2, width) {
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#e8e8f0';
    ctx.stroke();
  }

  function renderRig(j) {
    // legs first (drawn behind torso)
    drawLine(j.hipL, j.kneeL, 7);
    drawLine(j.kneeL, j.footL, 6);
    drawLine(j.hipR, j.kneeR, 7);
    drawLine(j.kneeR, j.footR, 6);

    // spine
    drawLine(j.pelvis, j.chest, 9);

    // arms
    drawLine(j.shoulderL, j.elbowL, 6);
    drawLine(j.elbowL, j.handL, 5);
    drawLine(j.shoulderR, j.elbowR, 6);
    drawLine(j.elbowR, j.handR, 5);

    // head
    ctx.beginPath();
    ctx.arc(j.head.x, j.head.y, LEN.headR, 0, Math.PI * 2);
    ctx.fillStyle = '#e8e8f0';
    ctx.fill();
  }

  // ---- Enemies ----
  // Autonomous: enemies spawn and approach on their own schedule, independent
  // of when the player attacks. Previously the "enemy" only ever existed as
  // a side effect of the player's own startAttack() call, which meant it
  // could never actually threaten the player — this is the fix for that.
  //
  // These numbers are first guesses, same convention as the pose timings:
  // expect to hand-tune once this is being watched, not read as final.
  const ENEMY_HIT_RADIUS = 45;    // generous hitbox around the enemy, for the player's kicking foot
  const ENEMY_MELEE_REACH = 55;   // how close (px from the pelvis) an enemy gets before it "lands" a hit
  const ENEMY_TRAVEL_MS = 600;    // spawn-to-contact time; within this rig's own ~430-700ms derived floor
  const ENEMY_SPAWN_GAP_MS = 900; // gap after an enemy resolves before the next one spawns

  let enemies = [];
  let nextSpawnAt = 1000; // small initial grace period before the first enemy
  let killCount = 0;
  let missedCount = 0;

  function makeEnemy(spawnAt, side) {
    const pelvisX = canvas.width / 2; // idle pelvisDX is 0; small attack-time offsets are ignored here
    const spawnX = side === 'R' ? canvas.width + 50 : -50;
    const contactX = side === 'R' ? pelvisX + ENEMY_MELEE_REACH : pelvisX - ENEMY_MELEE_REACH;
    return { side, spawnAt, spawnX, contactX, x: spawnX, y: canvas.height * 0.78 - 30, alive: true };
  }

  function updateEnemies(now) {
    if (enemies.length === 0 && now >= nextSpawnAt) {
      enemies.push(makeEnemy(now, Math.random() < 0.5 ? 'L' : 'R'));
    }
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      const t = Math.min(1, (now - e.spawnAt) / ENEMY_TRAVEL_MS);
      e.x = lerp(e.spawnX, e.contactX, t);
      if (t >= 1) {
        // Reached melee range with no correct-side hit landed in time.
        missedCount++;
        enemies.splice(i, 1);
        nextSpawnAt = now + ENEMY_SPAWN_GAP_MS;
      }
    }
  }

  // Only checked during the strike phase specifically (not windup/recover) —
  // reads the kicking foot's real world position from solveRig(), which is
  // exactly what the v0.1.4 refactor exists to make possible.
  function resolveHits(now, joints) {
    if (!seq || seqIdx !== 1 || !attackSide) return;
    const foot = attackSide === 'R' ? joints.footR : joints.footL;
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (e.side !== attackSide) continue;
      const dx = foot.x - e.x, dy = foot.y - e.y;
      if (Math.sqrt(dx * dx + dy * dy) <= ENEMY_HIT_RADIUS) {
        enemies.splice(i, 1);
        killCount++;
        nextSpawnAt = now + ENEMY_SPAWN_GAP_MS;
      }
    }
  }

  function drawEnemies() {
    for (const e of enemies) {
      ctx.beginPath();
      ctx.arc(e.x, e.y, 14, 0, Math.PI * 2);
      ctx.fillStyle = '#c0392b';
      ctx.fill();
    }
  }

  // ---- Input ----
  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') triggerAttack('L');
    if (e.key === 'ArrowRight') triggerAttack('R');
  });
  document.getElementById('zoneL').addEventListener('pointerdown', () => triggerAttack('L'));
  document.getElementById('zoneR').addEventListener('pointerdown', () => triggerAttack('R'));

  // ---- Test hook (mirrors this studio's Game._test convention) ----
  // Read-only state introspection plus a direct trigger, so QA/tests can set
  // up exact scenarios (e.g. "trigger during recovery") instead of guessing
  // real-time delays around synthetic keyboard events.
  window.Rig = {
    _test: {
      state: () => ({
        idle: !seq,
        seqIdx,
        seqLen: seq ? seq.length : 0,
        committed: seq ? isCommittedPhase(seqIdx) : false,
        queuedSide,
        attackSide,
        pose: currentPose(),
        joints: solveRig(currentPose()),
        enemies: enemies.map(e => ({ side: e.side, x: e.x, alive: e.alive })),
        killCount,
        missedCount
      }),
      trigger: (side) => triggerAttack(side),
      // Test-only spawn: reuses the exact same makeEnemy()/updateEnemies()
      // path production spawning does, just backdating spawnAt so the enemy
      // is already partway (or fully) through its approach on the very next
      // frame — no separate/duplicated enemy-placement logic to drift out
      // of sync with the real thing.
      spawnEnemy: (side, elapsedMs) => {
        const now = performance.now();
        const e = makeEnemy(now - (elapsedMs || 0), side);
        enemies.push(e);
        return e;
      },
      // The autonomous spawner is the point of this system, but that means
      // it can also fire in the middle of a deterministic test's own waits.
      // These two let a test isolate a scenario without fighting the timer.
      clearEnemies: () => { enemies = []; },
      freezeSpawns: () => { nextSpawnAt = Infinity; }
    }
  };

  // ---- Main loop ----
  function frame(now) {
    updateSeq(now);
    const pose = currentPose();
    const joints = solveRig(pose); // solved once per frame; rendering and hit detection both read from this

    ctx.fillStyle = '#12141c';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = '#2a2d3a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height * 0.78 + 2);
    ctx.lineTo(canvas.width, canvas.height * 0.78 + 2);
    ctx.stroke();

    updateEnemies(now);
    resolveHits(now, joints);
    drawEnemies();
    renderRig(joints);

    debugEl.textContent = 'state: ' + (seq ? ('attacking [' + seqIdx + '/' + seq.length + ']') : 'idle') +
      (queuedSide ? '\nbuffered: ' + queuedSide : '') +
      '\nkills: ' + killCount + '  missed: ' + missedCount +
      (enemies.length ? '\nenemy: ' + enemies[0].side + ' @ ' + enemies[0].x.toFixed(0) : '');

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
