  // paused "virtual now" through updateSeq/currentPose/startAttack, which
  // currently read performance.now() directly, and that's real invasive risk
  // to the just-stabilized timing system for a nice-to-have effect when
  // flash+punch+particles+shake already deliver most of the impact.
  function lerpColor(c1, c2, t) {
    const a = parseInt(c1.slice(1), 16), b = parseInt(c2.slice(1), 16);
    const ar = (a >> 16) & 255, ag = (a >> 8) & 255, ab = a & 255;
    const br = (b >> 16) & 255, bg = (b >> 8) & 255, bb = b & 255;
    return 'rgb(' + Math.round(lerp(ar, br, t)) + ',' + Math.round(lerp(ag, bg, t)) + ',' + Math.round(lerp(ab, bb, t)) + ')';
  }

  const MAX_PARTICLES = 40;
  let particles = [];
  let shakeMag = 0;   // decaying px magnitude, applied as a random canvas offset
  let missFlash = 0;  // 0..1, decaying -- translucent full-canvas danger-tint on a miss

  // prefers-reduced-motion (v0.1.8): OS-level signal only -- this file has no
  // settings menu/Persist module to layer a manual override on the way
  // wonderland.html/sigilchain.html's Settings module does, and building one
  // is out of scope for a rendering/feel pass. Still closes a real gap: this
  // was the one file in the studio with zero handling for it, despite being
  // the most shake/flash-heavy of the three. Gates screen shake and the
  // full-bleed missFlash, the two motion-heavy effects here.
  let reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  window.matchMedia('(prefers-reduced-motion: reduce)').addEventListener('change', (e) => { reducedMotion = e.matches; });

  function spawnBurst(x, y) {
    const count = 10;
    for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
      const a = (Math.PI * 2 * i) / count + Math.random() * 0.3;
      const speed = 140 + Math.random() * 80;
      particles.push({ x, y, vx: Math.cos(a) * speed, vy: Math.sin(a) * speed, life: 0.3 + Math.random() * 0.2, maxLife: 0.5, color: '#ff4d70' });
    }
    for (let i = 0; i < 3 && particles.length < MAX_PARTICLES; i++) {
      const a = Math.random() * Math.PI * 2;
      const speed = 60 + Math.random() * 40;
      particles.push({ x, y, vx: Math.cos(a) * speed, vy: Math.sin(a) * speed, life: 0.2, maxLife: 0.2, color: '#ffffff' });
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ---- Enemies ----
  // Autonomous: enemies spawn and approach on their own schedule, independent
  // of when the player attacks. Previously the "enemy" only ever existed as
  // a side effect of the player's own startAttack() call, which meant it
  // could never actually threaten the player — this is the fix for that.
  //
  // These numbers are first guesses, same convention as the pose timings:
  // expect to hand-tune once this is being watched, not read as final.
  const ENEMY_HIT_RADIUS = 45;    // generous hitbox around the enemy, for the player's kicking foot
  const ENEMY_MELEE_REACH = 55;   // how close (px from the pelvis) an enemy gets before it "lands" a hit
  const ENEMY_TRAVEL_MS = 600;    // spawn-to-contact time; within this rig's own ~430-700ms derived floor
  const ENEMY_SPAWN_GAP_MS = 550; // gap after an enemy resolves before the next one spawns
  const ENEMY_DEATH_DUR = 220;    // ms a killed enemy lingers as a fading flash before its slot clears

  // Visible size: quality-pass finding (visual-art-director) -- base 22px
  // radius growing to 34px as the enemy nears melee range (t 0.65 to 1.0),
  // reusing the travel fraction updateEnemies() already computes rather than
  // adding a second timer. Old flat 14px radius (9.4:1 vs the rig's height)
  // was a directly-reported readability failure. Growth also functions as a
  // telegraph -- the dot visibly swelling is itself a "get ready" cue.
  const ENEMY_RADIUS_BASE = 22, ENEMY_RADIUS_PEAK = 34, ENEMY_GROW_START = 0.65;
  // Color: was #c0392b, matching neither shipped game's --danger token
  // (#ff4d70, identical in wonderland.html and sigilchain.html) -- untokenized
  // hex drift the studio's cross-game convention exists to catch. Telegraph
  // color lerps toward #ff8da0, also reused verbatim from wonderland's own
  // hp-bar danger gradient, not a new color relationship.
  const ENEMY_COLOR_BASE = '#ff4d70', ENEMY_COLOR_PEAK = '#ff8da0';

  let enemies = [];
  let nextSpawnAt = 1000; // small initial grace period before the first enemy
  let killCount = 0;
  let missedCount = 0;

  // ---- Session ----
  // Phase 3 of the plan of action: the previous builds had real hit
  // detection and real feedback but no actual stakes -- an unanswered
  // enemy just incremented a counter forever. MAX_MISSES is the plan's
  // suggested 3-5-miss "winnable but threatening" pool, first-guess like
  // every other number here. A "gauntlet": endless single-enemy encounters,
  // scored by kill count, ending on the lives pool running out -- not a
  // health-bar boss fight, which the studio explicitly didn't build toward.
  const MAX_MISSES = 5;
  let sessionState = 'playing'; // 'playing' | 'lose'

  function resetSession() {
    p1.reset();
    enemies = []; nextSpawnAt = performance.now() + 1000;
    killCount = 0; missedCount = 0;
    particles = []; shakeMag = 0; missFlash = 0;
    sessionState = 'playing';
  }

  function makeEnemy(spawnAt, side) {
    const pelvisX = canvas.width / 2 + p1.posX * renderScale; // player 1 now has a real, movable position (v0.1.17 physics) instead of always standing at screen center; small attack-time pelvisDX lean is still ignored here. *renderScale matches solveRig()'s own cx formula exactly -- without it, this drifts from the player's actual rendered/hit-tested position the instant renderScale != 1 (any viewport narrower than RENDER_SCALE_REFERENCE_WIDTH), sending enemies toward a stale contact point
    const spawnX = side === 'R' ? canvas.width + 50 : -50;
    const contactX = side === 'R' ? pelvisX + ENEMY_MELEE_REACH : pelvisX - ENEMY_MELEE_REACH;
    return { side, spawnAt, spawnX, contactX, x: spawnX, y: canvas.height * 0.78 - 30, alive: true,
      t: 0, dying: false, deathT: 0,
      pulsesFired: [false, false, false] }; // tracks which PULSE_THRESHOLDS stages this enemy has already fired
  }

  function updateEnemies(now, dt) {
    if (enemies.length === 0 && now >= nextSpawnAt) {
      enemies.push(makeEnemy(now, Math.random() < 0.5 ? 'L' : 'R'));
    }
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (e.dying) {
        e.deathT += dt * 1000;
        if (e.deathT >= ENEMY_DEATH_DUR) enemies.splice(i, 1);
        continue;
      }
      const t = Math.min(1, (now - e.spawnAt) / ENEMY_TRAVEL_MS);
      e.t = t;
      e.x = lerp(e.spawnX, e.contactX, t);
      // Fire each proximity-pulse stage once, the frame its threshold is
      // crossed — an event-gated one-shot, not a per-frame ramp (see SFX
      // module comment). This is the audio cue for the approach itself,
      // independent of windup/strike/miss.
      for (let stage = 0; stage < PULSE_THRESHOLDS.length; stage++) {
        if (!e.pulsesFired[stage] && t >= PULSE_THRESHOLDS[stage]) {
          e.pulsesFired[stage] = true;
          SFX.proximityPulse(stage);
        }
      }
      if (t >= 1) {
        // Reached melee range with no correct-side hit landed in time.
        missedCount++;
        SFX.missBuzz();
        missFlash = reducedMotion ? 0.4 : 1;
        shakeMag = Math.min(20, shakeMag + (reducedMotion ? 1 : 3)); // weaker tier than a kill's +6 -- distinct weight, not just a color
        p1.triggerFlinch();
        enemies.splice(i, 1);
        nextSpawnAt = now + ENEMY_SPAWN_GAP_MS;
        if (missedCount >= MAX_MISSES) sessionState = 'lose';
      }
    }
  }

  // Only checked during the strike phase specifically (not windup/recover) —
  // reads the kicking foot's real world position from solveRig(), which is
  // exactly what the v0.1.4 refactor exists to make possible.
  function resolveHits(now, joints) {
    if (p1.idle || p1.seqIdx !== 1 || !p1.attackSide) return;
    const sockets = getSockets(joints);
    const foot = p1.attackSide === 'R' ? sockets.foot_r : sockets.foot_l;
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (e.dying || e.side !== p1.attackSide) continue;
      const dx = foot.x - e.x, dy = foot.y - e.y;
      if (Math.sqrt(dx * dx + dy * dy) <= ENEMY_HIT_RADIUS) {
        // Not an instant splice -- linger briefly as a fading flash (see
        // drawEnemies()) so the kill actually reads as an impact, not a
        // silent disappearance. Excluded from further hit/miss checks above
        // via the e.dying guard.
        e.dying = true; e.deathT = 0;
        killCount++;
        SFX.strikeImpact();
        spawnBurst(e.x, e.y);
        shakeMag = Math.min(20, shakeMag + (reducedMotion ? 2 : 6));
        nextSpawnAt = now + ENEMY_SPAWN_GAP_MS;
      }
    }
  }

  // ---- Rig-vs-rig combat resolution (Game 5's actual core mechanic) ----
  // checkPvpHit()/resolveDuelHit() are called from BOTH directions --
  // (p1 attacking p2) and (p2 attacking p1) -- through the same two
  // functions with the attacker/defender arguments swapped, never two
  // hand-copied blocks. That's the identical reasoning behind mirror()
  // and createRigController() itself: two copies of the same math are
  // exactly the kind of thing that silently drifts apart later.
  //
  // Guard doesn't fully no-sell a hit (GUARD_CHIP_SCALE) -- a block still
  // costs the defender a little ground, so guard is a real mitigation, not
  // a free wall. KNOCKBACK_SPEED is well above MOVE_MAX_SPEED (220px/sec,
  // the fastest voluntary walking ever gets) specifically so a landed hit
  // is unmistakably more forceful than movement itself, not just a faster
  // walk in one direction.
  const PVP_HIT_RADIUS = 50; // generous, matching ENEMY_HIT_RADIUS's own generosity for a kicking foot vs. a whole-body hurtbox
  const KNOCKBACK_SPEED = 480; // px/sec
  const GUARD_CHIP_SCALE = 0.2; // a blocked hit still pushes the defender back a little

  // Returns the defender's hurtbox point on a landed hit, or null -- never
  // a bare boolean, so the caller (which needs the exact contact point for
  // spawnBurst()'s impact particles) doesn't have to re-solve either rig's
  // pose a second time to get it.
  function checkPvpHit(attacker, defender, attackerJoints, defenderJoints) {
    if (attacker.idle || attacker.seqIdx !== 1 || !attacker.attackSide) return null; // only the strike phase counts -- same convention resolveHits() uses against the enemy dots
    if (attacker.hasHitThisSwing) return null; // one landed hit per strike, not once per frame the strike phase happens to overlap the defender
    const towardDefender = defender.posX >= attacker.posX ? 'R' : 'L';
    if (attacker.attackSide !== towardDefender) return null; // kicking away from the opponent can't land on them
    const foot = attacker.attackSide === 'R' ? getSockets(attackerJoints).foot_r : getSockets(attackerJoints).foot_l;
    const hurtbox = getSockets(defenderJoints).stance; // ankle height, matching where a strike pose actually solves to -- see getSockets()'s own comment
    const dx = foot.x - hurtbox.x, dy = foot.y - hurtbox.y;
    // *renderScale (not a bare PVP_HIT_RADIUS pixel comparison): foot/
    // hurtbox are both solveRig() output, scaled by renderScale on a
    // narrow viewport (see resize()'s own comment) -- a fixed pixel
    // threshold would make combat range effectively bigger in world-space
    // terms on a small screen than on a desktop-width one. Scaling the
    // threshold the same way keeps the real world-space hit range
    // identical regardless of device, matching every other physics
    // constant (ARENA_BOUND, KNOCKBACK_SPEED, MOVE_MAX_SPEED) already
    // being pure world-units untouched by renderScale.
    if (Math.sqrt(dx * dx + dy * dy) > PVP_HIT_RADIUS * renderScale) return null;
    return hurtbox;
  }

  function resolveDuelHit(attacker, defender, attackerJoints, defenderJoints) {
    const hurtbox = checkPvpHit(attacker, defender, attackerJoints, defenderJoints);
    if (!hurtbox) return;
    attacker.markHit();
    const dir = defender.posX >= attacker.posX ? 1 : -1;
    const blocked = defender.guarding;
    // Parry (v0.1.25): a hit landing within the defender's PARRY_WINDOW_MS
    // of the moment guard was raised is NOT a block -- it's a full
    // negation plus a real punish. The defender takes zero knockback and
    // zero guard-meter cost (this is the precision-timing reward guard
    // never had); the ATTACKER is the one who gets knocked back instead,
    // pushed AWAY from the defender (-dir, the opposite of the direction
    // a normal hit would push the defender), interrupting whatever THEY
    // were doing exactly the way applyKnockback()'s unblocked branch
    // already does for a landed hit.
    if (blocked && defender.isInParryWindow()) {
      attacker.applyKnockback(-dir * KNOCKBACK_SPEED, false);
      SFX.parryChime();
      spawnBurst(hurtbox.x, hurtbox.y);
      shakeMag = Math.min(20, shakeMag + (reducedMotion ? 2 : 6));
      return;
    }
    defender.applyKnockback(dir * KNOCKBACK_SPEED * (blocked ? GUARD_CHIP_SCALE : 1), blocked);
    if (blocked) defender.damageGuardMeter(GUARD_BLOCK_HIT_DRAIN); // guard mitigates knockback but isn't free -- a real stamina cost per blocked hit, on top of the continuous drain from just holding guard (see updateGuardMeter())
    SFX.strikeImpact();
    spawnBurst(hurtbox.x, hurtbox.y);
    shakeMag = Math.min(20, shakeMag + (reducedMotion ? 2 : 6) * (blocked ? 0.4 : 1));
  }

  function resolveCombatHits(joints1, joints2) {
    if (matchOver) return; // the match is decided -- no more hits land until a rematch
    resolveDuelHit(p1, p2, joints1, joints2);
    resolveDuelHit(p2, p1, joints2, joints1);
  }

  // ---- Ring-out (the duel's actual win condition) ----
  // ARENA_BOUND is the same wall voluntary movement already clamps
  // against (see updateMovement()) -- walking can never cross it, so the
  // only way either rig's posX ends up beyond it is a knockback impulse
  // from resolveDuelHit() above, which is exactly what makes "crossed the
  // line" a meaningful ring-out rather than something either player could
  // trigger just by walking there.
  //
  // v0.1.23: a running score alone was never a finished match -- nothing
  // stopped it once either player hit any number, and there was no result
  // to show. MATCH_TARGET_SCORE gives ring-outs an actual endpoint: first
  // to reach it wins the MATCH (not just the exchange), the match freezes
  // (see resolveCombatHits()/frame()'s input gating below) until either
  // player's next attack/jump input calls resetMatch() via tryRematch().
  let p1Score = 0, p2Score = 0;
  let matchOver = false, matchWinner = null; // matchWinner: 'P1' | 'P2' | null
  const MATCH_TARGET_SCORE = 3;
  function checkRingOuts() {
    if (matchOver) return;
    if (Math.abs(p1.posX) > ARENA_BOUND) {
      p2Score++;
      if (p2Score >= MATCH_TARGET_SCORE) { matchOver = true; matchWinner = 'P2'; }
      resetDuelPositions();
    } else if (Math.abs(p2.posX) > ARENA_BOUND) {
      p1Score++;
      if (p1Score >= MATCH_TARGET_SCORE) { matchOver = true; matchWinner = 'P1'; }
      resetDuelPositions();
    }
  }
  function resetDuelPositions() {
    // A full reset (not just posX) -- a ring-out ends the exchange
    // entirely, the same way a real round reset would; whichever attack/
    // guard/knockback state either rig was mid-way through no longer
    // means anything once the round position resets under it.
    p1.reset();
    p2.reset();
  }
  // A fresh match: scores AND the decided flag both clear, not just
  // positions -- resetDuelPositions() alone would leave matchOver stuck
  // true forever with no path back to play.
  function resetMatch() {
    p1Score = 0; p2Score = 0; matchOver = false; matchWinner = null;
    resetDuelPositions();
  }
  // Called from every real attack-trigger input path (see handleInput()
  // for player 1, and the two player-2 call sites in the Input section
  // below) so EITHER player's next attack press restarts the match --
  // not just whichever one happens to own the session/game-over flow.
  // Returns true if it consumed the input as a rematch (caller should not
  // also throw the attack that triggered it).
  function tryRematch() {
    if (!matchOver) return false;
    resetMatch();
    return true;
  }

  // v0.1.8 feel-pass finding: growth + color-lerp made the enemy telegraph
  // its approach, but it never stopped being a plain ctx.arc() circle -- the
  // producer's original "the dot is so small" complaint was really "it's a
  // dot, period," and sizing/coloring a dot better doesn't change that. This
  // draws a small asymmetric arrowhead/chevron instead: a shape with a nose
  // and a concave back notch, canonically pointing left (-x). Side 'R'
  // enemies travel leftward toward the player, so they use this orientation
  // directly; side 'L' enemies travel rightward, so drawEnemies() mirrors it
  // with ctx.scale(-1,1) rather than hand-authoring a second shape that could
  // drift out of sync (same reasoning as mirror() for the player's own
  // kick poses).
  function drawEnemyShape(radius) {
    ctx.beginPath();
    ctx.moveTo(-radius * 1.3, 0);        // nose
    ctx.lineTo(radius * 0.6, -radius * 0.9);  // upper back corner
    ctx.lineTo(radius * 0.15, 0);        // concave back notch -- what makes it read as an arrow, not a kite
    ctx.lineTo(radius * 0.6, radius * 0.9);   // lower back corner
    ctx.closePath();
    ctx.fill();
  }

  // A distinct "about to strike" state, not just a further point on the
  // continuous grow/color gradient -- the gradient alone reads as "getting
  // closer," not "about to hit." Fires only in the enemy's final approach
  // stretch, well after ENEMY_GROW_START but before contact.
  const ENEMY_STRIKE_WARN_T = 0.85;

  function drawEnemies() {
    for (const e of enemies) {
      if (e.dying) {
        // Punchier kill flash (v0.1.8): the old version was a raw linear
        // alpha/radius falloff and read as a fade, not an impact. Reuses the
        // studio's own "give it weight" easeOutBack idiom (already used for
        // the recovery-phase pose) for a snap-then-settle radius pop, and a
        // fast easeInQuad alpha drop so it stays bright before cutting out
        // sharply, closer to a flash than a fade.
        const dt2 = e.deathT / ENEMY_DEATH_DUR; // 0..1
        const growEased = easeOutBack(Math.min(1, dt2 * 1.4));
        ctx.globalAlpha = Math.max(0, 1 - easeInQuad(dt2));
        ctx.beginPath();
        ctx.arc(e.x, e.y, ENEMY_RADIUS_PEAK * (1 + 0.4 * growEased), 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.globalAlpha = 1;
        continue;
      }
      const growT = Math.max(0, Math.min(1, (e.t - ENEMY_GROW_START) / (1 - ENEMY_GROW_START)));
      const eased = easeOutQuad(growT);
      const radius = lerp(ENEMY_RADIUS_BASE, ENEMY_RADIUS_PEAK, eased);

      ctx.save();
      ctx.translate(e.x, e.y);
      if (e.side === 'L') ctx.scale(-1, 1); // mirror the canonical points-left shape for rightward-traveling enemies
      ctx.fillStyle = lerpColor(ENEMY_COLOR_BASE, ENEMY_COLOR_PEAK, eased);
      drawEnemyShape(radius);
      ctx.restore();

      if (e.t >= ENEMY_STRIKE_WARN_T) {
        const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 60);
        ctx.beginPath();
        ctx.arc(e.x, e.y, radius + 5 + pulse * 3, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,' + (0.5 + pulse * 0.4).toFixed(2) + ')';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }
  }

  // Contact shadows (v0.1.8): nothing in this file ever cast a shadow, so
  // the player and every enemy looked like they were floating slightly above
  // the ground line rather than standing on it. Kept deliberately simple --
  // flat ellipses anchored to the ground line, not real projected geometry.
  function drawShadow(x, rx, ry) {
    const groundY = canvas.height * 0.78;
    ctx.beginPath();
    ctx.ellipse(x, groundY + 4, rx, ry, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fill();
  }
  function drawShadows(joints) {
    // One shadow centered under the pelvis, not per-foot -- the feet move
    // too fast during a kick for a per-foot shadow to read as anything but
    // noise; a single anchored shadow reads as "planted on the ground."
    drawShadow(joints.pelvis.x, 34 * renderScale, 8 * renderScale);
    for (const e of enemies) {
      if (e.dying) continue;
      const growT = Math.max(0, Math.min(1, (e.t - ENEMY_GROW_START) / (1 - ENEMY_GROW_START)));
      const r = lerp(ENEMY_RADIUS_BASE, ENEMY_RADIUS_PEAK, easeOutQuad(growT));
      drawShadow(e.x, r * 0.8, r * 0.28);
    }
  }

  // ---- Input ----
  // ensureCtx() must be called from a real user-gesture handler (a browser
  // AudioContext starts suspended until one fires) — keydown/pointerdown are
  // exactly that, so it's called here rather than at load time. Any input
  // while sessionState is 'lose' restarts instead of attacking — there's
  // nothing to strike at on the game-over screen.
  function handleInput(side) {
    SFX.ensureCtx();
    if (tryRematch()) return; // a decided duel match takes priority -- restart the match, don't also throw a kick
    if (sessionState === 'lose') { resetSession(); return; }
    triggerAttack(side);
  }

  // Player 1 movement (producer request: "add the game joystick... and
  // may add the movement logic to the rig itself", later "detail the
  // physics of the rig"). Replaces the old scheme where ArrowLeft/
  // ArrowRight directly threw a left/right kick -- now they move the
  // rig, and attack throws whichever kick matches p1.facing (the
  // direction last moved). Held-key state is tracked here and turned into
  // an *intent* (-1..1, a direction, not a position delta) applied once
  // per frame -- p1.updatePhysics(dt) is what actually integrates
  // velocity/position from that intent, giving movement real acceleration
  // instead of an instant per-frame teleport.
  let moveLeftHeld = false, moveRightHeld = false;
  function applyMoveInput(dt) {
    let intent = 0;
    if (moveLeftHeld) intent -= 1;
    if (moveRightHeld) intent += 1;
    if (touchMoveIntent !== 0) intent = touchMoveIntent; // active touch-stick drag overrides keyboard, same precedence gamepad gets below
    if (p1PadIndex !== null) {
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      const gp = pads[p1PadIndex];
      // Deadzone of 0.15 -- standard-mapping analog sticks rarely rest at
      // exactly 0, and without this the rig drifts on its own. An analog
      // stick past the deadzone overrides digital keyboard intent (an
      // actual push value, not just -1/0/1), rather than adding to it.
      if (gp && gp.axes && Math.abs(gp.axes[0]) > 0.15) intent = gp.axes[0];
    }
    p1.setMoveIntent(intent);
    p1.updatePhysics(dt);
  }

  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') moveLeftHeld = true;
    if (e.key === 'ArrowRight') moveRightHeld = true;
    if (e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); handleInput(p1.facing); } // attack -- facing-based, not an explicit side, now that direction comes from movement
    if (e.key === 'ArrowUp') { SFX.ensureCtx(); p1.tryJump(); }
    // Guard is a hold, not a tap -- gated on 'playing' the same as attacks
    // effectively are (resetSession() on the 'lose' screen already handles
    // that path via handleInput()'s own attack button).
    if (e.key === 'ArrowDown' && sessionState === 'playing') { SFX.ensureCtx(); setGuard(true); }
  });
  window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft') moveLeftHeld = false;
    if (e.key === 'ArrowRight') moveRightHeld = false;
    if (e.key === 'ArrowDown') setGuard(false);
  });
  // Touch controls (v0.1.19) -- replaces the old zoneL/zoneR full-screen-
  // half tap zones, which threw an explicit left/right kick directly and
  // were left completely orphaned by the movement/facing rework (a tap
  // "just gave a knee jerk" on touch specifically because touch was never
  // updated to match). Mirrors the keyboard/gamepad scheme exactly --
  // move via a drag joystick, attack throws whichever kick matches
  // p1.facing (not an explicit side), jump and block are their own
  // buttons -- not a fifth, touch-only control language.
  let touchMoveIntent = 0;
  (function setupTouchStick() {
    const stick = document.getElementById('touchStick');
    const knob = document.getElementById('touchStickKnob');
    const MAX_RADIUS = 34; // px the knob can travel from center before clamping
    let activePointerId = null;
    function setKnob(dx, dy) { knob.style.transform = `translate(${dx}px, ${dy}px)`; }
    function onMove(e) {
      if (e.pointerId !== activePointerId) return;
      const rect = stick.getBoundingClientRect();
      const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
      let dx = e.clientX - cx, dy = e.clientY - cy;
      const dist = Math.hypot(dx, dy);
      if (dist > MAX_RADIUS) { dx = dx / dist * MAX_RADIUS; dy = dy / dist * MAX_RADIUS; }
      setKnob(dx, dy);
      touchMoveIntent = clamp(dx / MAX_RADIUS, -1, 1); // horizontal axis only -- this rig has no lateral-depth movement to drive with the vertical component
    }
    function release(e) {
      if (e.pointerId !== activePointerId) return;
      activePointerId = null;
      touchMoveIntent = 0;
      setKnob(0, 0);
    }
    stick.addEventListener('pointerdown', (e) => {
      SFX.ensureCtx();
      activePointerId = e.pointerId;
      try { stick.setPointerCapture(e.pointerId); } catch (err) { /* no-op -- capture is a nice-to-have (keeps tracking a drag that leaves the element bounds), losing it just means a fast drag off the stick stops updating, not a crash */ }
      onMove(e);
    });
    stick.addEventListener('pointermove', onMove);
    stick.addEventListener('pointerup', release);
    stick.addEventListener('pointercancel', release);
  })();

  function setupTouchButton(id, onDown, onUp) {
    const el = document.getElementById(id);
    el.addEventListener('pointerdown', (e) => {
      el.classList.add('active');
      try { el.setPointerCapture(e.pointerId); } catch (err) { /* no-op -- see the joystick's identical guard above */ }
      onDown();
    });
    const release = () => { el.classList.remove('active'); if (onUp) onUp(); };
    el.addEventListener('pointerup', release);
    el.addEventListener('pointercancel', release);
  }
  setupTouchButton('btnAttack', () => handleInput(p1.facing)); // facing-based, same as the space key and gamepad attack button -- not an explicit side
  setupTouchButton('btnJump', () => { SFX.ensureCtx(); p1.tryJump(); });
  setupTouchButton('btnBlock',
    () => { SFX.ensureCtx(); if (sessionState === 'playing') setGuard(true); }, // same gating as the keyboard/gamepad guard-raise
    () => setGuard(false));

  // Player 2 split-keyboard fallback (2-player extension, reworked to
  // match player 1's physics-driven model -- A/D move, W jump, S guard, F
  // attack via current facing, instead of the old A/D=explicit-side-kick
  // scheme, which predated movement/jump entirely and left player 2
  // unable to ever actually approach player 1). Always live regardless of
  // whether a gamepad is also assigned to player 2, same as player 1's
  // arrows stay live alongside a player-1 gamepad. Not routed through
  // handleInput()/resetSession() -- player 2 has no session/game-over
  // state of its own -- but DOES route through this small equivalent so
  // player 2's attack input can restart a decided DUEL match too, not
  // just player 1's (see tryRematch()'s own comment).
  function handleP2Input(side) {
    SFX.ensureCtx();
    if (tryRematch()) return;
    p2.triggerAttack(side);
  }
  let p2MoveLeftHeld = false, p2MoveRightHeld = false;
  window.addEventListener('keydown', (e) => {
    if (e.key === 'a' || e.key === 'A') p2MoveLeftHeld = true;
    if (e.key === 'd' || e.key === 'D') p2MoveRightHeld = true;
    if (e.key === 'f' || e.key === 'F') handleP2Input(p2.facing);
    if (e.key === 'w' || e.key === 'W') { SFX.ensureCtx(); p2.tryJump(); }
    if (e.key === 's' || e.key === 'S') { SFX.ensureCtx(); p2.setGuard(true); }
  });
  window.addEventListener('keyup', (e) => {
    if (e.key === 'a' || e.key === 'A') p2MoveLeftHeld = false;
    if (e.key === 'd' || e.key === 'D') p2MoveRightHeld = false;
    if (e.key === 's' || e.key === 'S') p2.setGuard(false);
  });
  function applyP2MoveInput(dt) {
    let intent = 0;
    if (p2MoveLeftHeld) intent -= 1;
    if (p2MoveRightHeld) intent += 1;
    if (p2PadIndex !== null) {
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      const gp = pads[p2PadIndex];
      if (gp && gp.axes && Math.abs(gp.axes[0]) > 0.15) intent = gp.axes[0];
    }
    p2.setMoveIntent(intent);
    p2.updatePhysics(dt);
  }

  // ---- Gamepad support (Game 5 2-player extension) ----
  // Generic Gamepad API reading -- plain button indices, not hardcoded to
  // any one controller model's labels, so any standard-mapped device
  // (most USB arcade sticks included, since they enumerate as HID
  // gamepads) works without special-casing. A genuinely non-standard-
  // mapped device may still land its kick/guard buttons on unexpected
  // physical buttons -- a remap screen would fix that, deliberately not
  // built here (real UI/UX work deferred past this consolidation pass).
  //
  // Fixed index-to-player assignment, decided once at connect time and
  // never re-arbitrated per frame -- deliberately NOT the existing shipped
  // "last active pad wins" pattern (wardfall.html/infall.html/
  // iridescentcosmology.html's single-pad, first-found/most-recent-input
  // logic). That pattern is actively wrong for simultaneous local
  // multiplayer: both players' pads are live at once, so "last one to
  // produce input wins" would silently steal control from whichever
  // player didn't press something that frame. Assignment here is
  // connection-order only (first pad -> player 1's slot, second -> player
  // 2's), each player's keyboard binding stays live in parallel regardless
  // of whether a pad is also assigned to them.
  let p1PadIndex = null, p2PadIndex = null;
  const padPrevPressed = {}; // padIndex -> per-button previous-frame pressed state, for rising-edge detection (the API has no press-event model, only a per-frame snapshot -- a naive read fires once per frame a button is held, not once per press)
  // Both players now share one gamepad scheme (player 2's old two-kick-
  // button layout is gone along with its explicit-side attack model) --
  // a single attack button read via facing, a jump button, and the
  // existing shoulder for guard.
  const BTN_ATTACK = 0, BTN_JUMP = 3, BTN_GUARD = 4; // standard-mapping bottom/top face buttons + shoulder

  function assignPad(index) {
    if (p1PadIndex === null && p2PadIndex !== index) { p1PadIndex = index; return; }
    if (p2PadIndex === null && p1PadIndex !== index) { p2PadIndex = index; return; }
    // Both slots already taken -- a third pad has nowhere to go yet (no
    // 3-4 player mode built); left unassigned rather than stealing a slot.
  }
  window.addEventListener('gamepadconnected', (e) => assignPad(e.gamepad.index));
  window.addEventListener('gamepaddisconnected', (e) => {
    if (p1PadIndex === e.gamepad.index) p1PadIndex = null;
    if (p2PadIndex === e.gamepad.index) p2PadIndex = null;
    delete padPrevPressed[e.gamepad.index];
  });

  // Shared gamepad poll for either player's rig -- analog stick for
  // movement (handled in applyMoveInput/applyP2MoveInput so keyboard-held
  // and stick input share one path), a single attack button read via
  // facing (not an explicit side), and a jump button. Rising-edge
  // detection on attack/jump, same reason kicks always needed it -- a
  // per-frame snapshot read naively would refire every frame a button
  // stays held. One shared function for both players (not two hand-copied
  // versions) since the scheme is now identical -- the exact "duplicated
  // logic silently drifts apart" trap this file has already hit before.
  function pollPlayerPad(padIndex, rig, onAttack, guardGate) {
    if (padIndex === null) return;
    const pads = navigator.getGamepads ? navigator.getGamepads() : [];
    const gp = pads[padIndex];
    if (!gp) return;
    const prev = padPrevPressed[padIndex] || { attack: false, jump: false };
    const nowAttack = !!(gp.buttons[BTN_ATTACK] && gp.buttons[BTN_ATTACK].pressed);
    const nowJump = !!(gp.buttons[BTN_JUMP] && gp.buttons[BTN_JUMP].pressed);
    if (nowAttack && !prev.attack) onAttack();
    if (nowJump && !prev.jump) { SFX.ensureCtx(); rig.tryJump(); }
    const guardHeld = !!(gp.buttons[BTN_GUARD] && gp.buttons[BTN_GUARD].pressed);
    if (!guardGate || guardGate(guardHeld)) rig.setGuard(guardHeld);
    padPrevPressed[padIndex] = { attack: nowAttack, jump: nowJump };
  }

  // Called once per frame from inside the main loop (gamepad state has no
  // event model -- it must be polled every tick, per the studio's own
  // named risk for this API), not from an input event handler.
  function pollGamepads() {
    pollPlayerPad(p1PadIndex, p1, () => handleInput(p1.facing),
      (guardHeld) => sessionState === 'playing' || !guardHeld); // release always allowed, raise only while playing -- same gating the keyboard guard handler uses
    pollPlayerPad(p2PadIndex, p2, () => handleP2Input(p2.facing), null); // player 2 has no session state to gate against, but does route through the match-over rematch check
  }

  // ---- Test hook (mirrors this studio's Game._test convention) ----
  // Read-only state introspection plus a direct trigger, so QA/tests can set
  // up exact scenarios (e.g. "trigger during recovery") instead of guessing
  // real-time delays around synthetic keyboard events.
  window.Rig = {
    _test: {
      state: () => {
        const joints = solveRig(p1.currentPose(), p1.posX);
        return {
          idle: p1.idle,
          seqIdx: p1.seqIdx,
          seqLen: p1.seqLen,
          committed: p1.committed,
          guarding: p1.guarding,
          queuedSide: p1.queuedSide,
          attackSide: p1.attackSide,
          posX: p1.posX,
          velX: p1.velX,
          facing: p1.facing,
          jumping: p1.jumping,
          velY: p1.velY,
          recoverExitVel: p1.recoverExitVel,
          recoverEnterPose: p1.recoverEnterPose,
          guardMeter: p1.guardMeter,
          isInParryWindow: p1.isInParryWindow(),
          hasHitThisSwing: p1.hasHitThisSwing,
          knockbackTimer: p1.knockbackTimer,
          pose: p1.currentPose(),
          joints,
          sockets: getSockets(joints),
          enemies: enemies.map(e => ({ side: e.side, x: e.x, alive: e.alive, t: e.t, dying: e.dying, pulsesFired: e.pulsesFired.slice() })),
          killCount,
          missedCount,
          audioStarted: SFX._test.isStarted(),
          particleCount: particles.length,
          shakeMag,
          missFlash,
          sessionState,
          livesRemaining: MAX_MISSES - missedCount
        };
      },
      sfxGainValue: () => SFX._test.sfxGainValue(),
      // Routes through handleInput(), the same entry point real keyboard/tap
      // input uses — so a trigger call while sessionState is 'lose' restarts
      // instead of attacking, exactly like a real player's next tap would.
      trigger: (side) => handleInput(side),
      attack: () => handleInput(p1.facing), // the real attack button's actual call path -- facing-based, not an explicit side
      // Bypasses handleInput()'s tryRematch()/sessionState checks entirely
      // -- lets a test verify resolveCombatHits()'s OWN internal
      // `if (matchOver) return` guard directly (defense in depth), since
      // every real input path already refuses to reach this state by
      // routing through tryRematch() first.
      rawAttack: (side) => triggerAttack(side),
      setGuard: (active) => setGuard(active),
      // setMoveIntent/updatePhysics/stepPhysics expose the real physics
      // integrator directly -- a test drives it the same way the real
      // per-frame loop does (set an intent, then step time forward),
      // never a shortcut that bypasses velocity/acceleration.
      setMoveIntent: (v) => p1.setMoveIntent(v),
      updatePhysics: (dt) => p1.updatePhysics(dt),
      stepPhysics: (totalMs, stepMs) => {
        stepMs = stepMs || 16;
        let remaining = totalMs;
        while (remaining > 0) {
          const step = Math.min(stepMs, remaining);
          p1.updatePhysics(step / 1000);
          remaining -= step;
        }
      },
      jump: () => p1.tryJump(),
      // Test/round-reset-only positioning -- bypasses movement physics so a
      // combat test can put both rigs at an exact, deterministic distance
      // instead of waiting out real acceleration to close the gap.
      teleportTo: (x) => p1.teleportTo(x),
      resetSession: () => resetSession(),
      // Test-only spawn: reuses the exact same makeEnemy()/updateEnemies()
      // path production spawning does, just backdating spawnAt so the enemy
      // is already partway (or fully) through its approach on the very next
      // frame — no separate/duplicated enemy-placement logic to drift out
      // of sync with the real thing.
      spawnEnemy: (side, elapsedMs) => {
        const now = performance.now();
        const e = makeEnemy(now - (elapsedMs || 0), side);
        enemies.push(e);
        return e;
      },
      // The autonomous spawner is the point of this system, but that means
      // it can also fire in the middle of a deterministic test's own waits.
      // These two let a test isolate a scenario without fighting the timer.
      clearEnemies: () => { enemies = []; },
      freezeSpawns: () => { nextSpawnAt = Infinity; }
    }
  };

  // Player 2's own test hook (Game 5 2-player extension) -- deliberately a
  // separate top-level object from window.Rig, not a property nested
  // under it, so a test can hold both simultaneously and compare them
  // directly (the actual "are these genuinely separate objects" check).
  // No enemies/session/audio fields -- player 2 isn't wired into that
  // system yet (see the note above p2's instantiation).
  window.Rig2 = {
    _test: {
      state: () => {
        const joints = solveRig(p2.currentPose(), p2.posX);
        return {
          idle: p2.idle,
          seqIdx: p2.seqIdx,
          seqLen: p2.seqLen,
          committed: p2.committed,
          guarding: p2.guarding,
          queuedSide: p2.queuedSide,
          attackSide: p2.attackSide,
          posX: p2.posX,
          velX: p2.velX,
          facing: p2.facing,
          jumping: p2.jumping,
          velY: p2.velY,
          recoverExitVel: p2.recoverExitVel,
          recoverEnterPose: p2.recoverEnterPose,
          guardMeter: p2.guardMeter,
          isInParryWindow: p2.isInParryWindow(),
          hasHitThisSwing: p2.hasHitThisSwing,
          knockbackTimer: p2.knockbackTimer,
          pose: p2.currentPose(),
          joints,
          sockets: getSockets(joints)
        };
      },
      trigger: (side) => handleP2Input(side),
      setGuard: (active) => p2.setGuard(active),
      reset: () => p2.reset(),
      teleportTo: (x) => p2.teleportTo(x),
      setMoveIntent: (v) => p2.setMoveIntent(v),
      updatePhysics: (dt) => p2.updatePhysics(dt),
      stepPhysics: (totalMs, stepMs) => {
        stepMs = stepMs || 16;
        let remaining = totalMs;
        while (remaining > 0) {
          const step = Math.min(stepMs, remaining);
          p2.updatePhysics(step / 1000);
          remaining -= step;
        }
      },
      jump: () => p2.tryJump(),
      // Test-only hooks for the gamepad-assignment logic, since real
      // hardware can't be driven from Playwright -- these call the exact
      // same assignPad()/pollOnePad() functions a real gamepadconnected
      // event and rAF tick would, not a separate test-only copy of the
      // assignment rule.
      simulateGamepadConnect: (index) => assignPad(index),
      simulateGamepadDisconnect: (index) => {
        if (p1PadIndex === index) p1PadIndex = null;
        if (p2PadIndex === index) p2PadIndex = null;
        delete padPrevPressed[index];
      },
      padAssignment: () => ({ p1PadIndex, p2PadIndex })
    }
  };

  // Combat/ring-out test hook (Game 5 rig-vs-rig combat resolution) --
  // its own top-level object for the same reason window.Rig2 is: state
  // that belongs to neither rig individually (the match score) shouldn't
  // get bolted onto one player's own hook.
  window.Duel = {
    _test: {
      state: () => ({ p1Score, p2Score, matchOver, matchWinner }),
      resetPositions: () => resetDuelPositions(),
      resetMatch: () => resetMatch(),
      tryRematch: () => tryRematch()
    }
  };

  // ---- Main loop ----
  let lastFrameTime = 0;
  function frame(now) {
    const dt = lastFrameTime ? Math.min(0.05, (now - lastFrameTime) / 1000) : 0.016; // seconds, capped so a tab-switch stall can't fling particles
    lastFrameTime = now;

    // Gameplay logic freezes once the session ends -- the rig settles into
    // whatever pose it was heading toward (currentPose()'s eased t clamps at
    // 1) and holds there under the game-over overlay, rather than continuing
    // to animate or letting enemies keep spawning behind it. matchOver
    // (v0.1.23) freezes BOTH players' movement/sequence the same way once
    // the duel itself is decided -- this is a deliberate, temporary freeze
    // pending a rematch, unlike the SHOW_P2 gating mistake named in the
    // comment below (that one permanently starved updateSeq() with no path
    // back; this one clears the instant tryRematch() fires).
    if (sessionState === 'playing' && !matchOver) applyMoveInput(dt);
    if (sessionState === 'playing' && !matchOver) updateSeq(now);
    const pose = currentPose();
    const joints = solveRig(pose, p1.posX); // solved once per frame; rendering and hit detection both read from this

    // Player 2 (Game 5 2-player extension): the state machine keeps
    // updating every frame regardless of SHOW_P2 -- updateSeq() is what
    // advances seqIdx/completes an attack sequence at all, so gating it
    // would leave p2 stuck mid-sequence forever the instant anything
    // triggers it (a real bug this had for one commit, caught by the
    // existing rig-2player suite failing, not assumed safe). Only the
    // joint-solve/render calls below are gated -- SHOW_P2 controls
    // visibility, not whether player 2 is alive.
    pollGamepads(); // fixed-index-per-player polling; see the Input section below -- still runs unconditionally since it also drives player 1's pad
    if (!matchOver) applyP2MoveInput(dt);
    if (!matchOver) p2.updateSeq(now);
    // Solved unconditionally now (not gated behind SHOW_P2) -- combat
    // resolution below needs player 2's actual joints to check hits every
    // frame regardless of whether player 2 happens to be rendered.
    const joints2 = solveRig(p2.currentPose(), p2.posX);
    resolveCombatHits(joints, joints2);
    checkRingOuts();

    // Screen shake is pure presentation -- a render-time offset only, never
    // touching the coordinates solveRig()/resolveHits() actually use for hit
    // timing (same guarantee wonderland's Juice module makes explicit).
    ctx.save();
    if (shakeMag > 0.05) {
      ctx.translate((Math.random() * 2 - 1) * shakeMag, (Math.random() * 2 - 1) * shakeMag);
    }

    ctx.fillStyle = bgGradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = '#2a2d3a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height * 0.78 + 2);
    ctx.lineTo(canvas.width, canvas.height * 0.78 + 2);
    ctx.stroke();

    // resolveHits() runs BEFORE updateEnemies() -- a hit gets first claim on
    // an enemy before the miss-timeout check can remove it. Reordered from
    // the original (updateEnemies first) after an engineer audit found that
    // order let a geometrically clean, comfortably-in-radius hit get stolen
    // as a miss whenever an enemy's melee-range timeout and the player's
    // strike-phase start coincided in the same frame -- rare per-attempt,
    // but one-directional (only ever cost the player) and worse on lower
    // frame rates. Whichever function removes an enemy first, the other
    // simply won't find it in the array, so this can't double-count.
    if (sessionState === 'playing') {
      resolveHits(now, joints);
      updateEnemies(now, dt);
    }
    updateParticles(dt); // let residual particles/shake from the losing hit finish decaying under game-over
    drawShadows(joints); // must draw before the rig/enemies so it reads as underneath them, but after resolveHits()/updateEnemies() so enemy positions/removals are current this frame
    if (SHOW_P2) drawShadow(joints2.pelvis.x, 34 * renderScale, 8 * renderScale); // drawShadows() also draws enemy shadows -- calling it twice would double-draw those, so player 2 uses the underlying primitive directly
    drawEnemies();
    drawParticles();
    renderRig(joints, P1_COLOR);
    if (SHOW_P2) renderRig(joints2, P2_COLOR);
    drawGuardMeter(joints, p1.guardMeter, P1_COLOR);
    if (SHOW_P2) drawGuardMeter(joints2, p2.guardMeter, P2_COLOR);
    ctx.restore(); // end shake offset -- flash overlay below is screen-space, not shaken

    if (missFlash > 0.01) {
      // v0.1.8: peak alpha was 0.4 and painted directly over the player's
      // own white rig lines (drawn just above, inside the same shake-offset
      // save/restore) at the exact moment -- a possible game over -- they
      // most needed to still read clearly. Lower peak, faster decay: still a
      // clear hit-pulse, no longer a wash.
      ctx.fillStyle = 'rgba(255,77,112,' + (missFlash * (reducedMotion ? 0.12 : 0.22)).toFixed(3) + ')';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    shakeMag = Math.max(0, shakeMag - dt * 90);
    missFlash = Math.max(0, missFlash - dt * 7);

    if (sessionState === 'lose') {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Backing card for the text block -- v0.1.8 fix: the retry hint used to
      // be a bare fillText directly over the frozen rig, and at this
      // viewport size it rendered right through the character's head. A card
      // guarantees legibility regardless of what's underneath it.
      const cardW = Math.min(280, canvas.width - 40), cardH = 120;
      const cardX = canvas.width / 2 - cardW / 2, cardY = canvas.height / 2 - 70;
      ctx.fillStyle = 'rgba(18,20,28,0.92)';
      ctx.strokeStyle = 'rgba(255,77,112,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(cardX, cardY, cardW, cardH, 10); else ctx.rect(cardX, cardY, cardW, cardH);
      ctx.fill();
      ctx.stroke();

      ctx.textAlign = 'center';
      ctx.fillStyle = '#ff4d70';
      ctx.font = 'bold 32px monospace';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
      ctx.fillStyle = '#e8e8f0';
      ctx.font = '16px monospace';
      ctx.fillText('Kills: ' + killCount, canvas.width / 2, canvas.height / 2 + 15);
      ctx.fillStyle = '#888';
      ctx.font = '13px monospace';
      ctx.fillText('tap or press a key to try again', canvas.width / 2, canvas.height / 2 + 45);
      ctx.restore();
    }

    // Match-over overlay (v0.1.23) -- a running score with no endpoint
    // was never a finished match; this is the actual result screen, same
    // card treatment as the single-player GAME OVER overlay above but in
    // the winning rig's own color, and gated on a real attack input
    // (tryRematch(), wired into every attack entry point for BOTH
    // players) rather than a passive timer.
    if (matchOver) {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const winnerColor = matchWinner === 'P1' ? P1_COLOR : P2_COLOR;
      const cardW = Math.min(300, canvas.width - 40), cardH = 130;
      const cardX = canvas.width / 2 - cardW / 2, cardY = canvas.height / 2 - 75;
      ctx.fillStyle = 'rgba(18,20,28,0.92)';
      ctx.strokeStyle = winnerColor;
      ctx.lineWidth = 1;
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(cardX, cardY, cardW, cardH, 10); else ctx.rect(cardX, cardY, cardW, cardH);
      ctx.fill();
      ctx.stroke();

      ctx.textAlign = 'center';
      ctx.fillStyle = winnerColor;
      ctx.font = 'bold 30px monospace';
      ctx.fillText(matchWinner + ' WINS THE MATCH', canvas.width / 2, canvas.height / 2 - 25);
      ctx.fillStyle = '#e8e8f0';
      ctx.font = '16px monospace';
      ctx.fillText(p1Score + ' — ' + p2Score, canvas.width / 2, canvas.height / 2 + 10);
      ctx.fillStyle = '#888';
      ctx.font = '13px monospace';
      ctx.fillText('either player: attack to start a rematch', canvas.width / 2, canvas.height / 2 + 45);
      ctx.restore();
    }

    hudEl.innerHTML = 'KILLS: ' + killCount + '&nbsp;&nbsp;&nbsp;' +
      '<span class="lives-full">' + '♥'.repeat(Math.max(0, MAX_MISSES - missedCount)) + '</span>' +
      '<span class="lives-spent">' + '♥'.repeat(Math.min(MAX_MISSES, missedCount)) + '</span>' +
      '&nbsp;&nbsp;&nbsp;<span class="duel-score">P1 ' + p1Score + ' — ' + p2Score + ' P2 (first to ' + MATCH_TARGET_SCORE + ')</span>';

    debugEl.textContent = 'state: ' + (!p1.idle ? ('attacking [' + p1.seqIdx + '/' + p1.seqLen + ']') : (p1.guarding ? 'guarding' : 'idle')) +
      (p1.queuedSide ? '\nbuffered: ' + p1.queuedSide : '') +
      '\nsession: ' + sessionState +
      '\nkills: ' + killCount + '  missed: ' + missedCount +
      (enemies.length ? '\nenemy: ' + enemies[0].side + ' @ ' + enemies[0].x.toFixed(0) : '');

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
