  v0.1.18 — 2026-07-20 — Weighted attack follow-through: the recovery
                          phase (strike-end -> idle) was still a fixed-
                          duration lerpPose()+easeOutBack() blend, the same
                          canned-curve shape movement/jump had before
                          v0.1.17 -- meaning the exact "knee jerk" symptom
                          could still show up at the one moment (recovery)
                          this pass hadn't reached yet.

                          Replaced with a real damped-spring follow-
                          through, seeded with the strike phase's own exit
                          velocity (computed once, in updateSeq(), as the
                          strike's actual pose delta over its actual
                          duration -- not an invented number). Deliberately
                          kept as a closed-form solution -- x(t) =
                          (x0+(v0+omega*x0)*t)*e^(-omega*t), the analytic
                          critically-damped-spring position at time t given
                          an initial displacement and velocity -- rather
                          than frame-by-frame integration, specifically so
                          recovery stays a stateless "evaluate the pose at
                          any t" function like every other phase here, and
                          the fixed-duration phase-transition timing/
                          buffered-input contract in updateSeq() didn't
                          need to change at all -- only the pose formula
                          did. The real payoff, even though the current
                          fixed-timing attack always exits the strike at
                          the same velocity: continuity of velocity across
                          the strike/recovery boundary, where the old
                          fixed-curve blend restarted from zero velocity
                          every time regardless of how fast the strike was
                          actually moving -- a real, if subtle, discontinuity
                          at exactly the moment recovery began.

                          5 new assertions (tests/rig-sequence.js §17):
                          exit velocity is captured and substantial (not
                          zero/invented), recovery's starting pose is
                          continuous with the strike's own end pose (not
                          snapped toward idle), and the phase still ends on
                          the same fixed schedule as before. One real
                          flaky-test bug caught and fixed during this pass:
                          a 190ms margin against the 180ms committed-phase
                          boundary was too tight once the suite had grown
                          this long (the same class of timing bug §4/§12
                          already named and fixed once), corrected to the
                          same ~280ms safe margin used elsewhere rather
                          than inventing a new tight number. Full suite
                          stable across repeated runs: 73/73 rig-sequence
                          + 20/20 rig-2player + 14/14 rig-audio.

  v0.1.17 — 2026-07-20 — Real physics, replacing v0.1.16's instant-delta

                          MOVE_ACCEL and decays via MOVE_FRICTION on

                          floaty. Position integrates from velocity every

                          with real integrated projectile motion --

                          downward GRAVITY applied every frame, height
                          integrated from velocity. Falls back through the
                          same speed profile it rose with; cutting the
                          jump would (if ever built) naturally arc
                          differently, which a canned curve can't do.

                          two independently-driven, independently-animated
                          rigs on screen at once, each posable/testable
                          through its own window.Rig / window.Rig2 test
                          hook.

                          Input: player 2 gets a split-keyboard fallback
                          (A/D/S for kick-L/kick-R/guard) alongside
                          player 1's existing arrows, always live
                          regardless of gamepad connection. Added generic
                          Gamepad API support -- plain button indices, not
                          hardcoded to one controller model, so standard-
                          mapped devices (most USB arcade sticks included)
                          work without special-casing. Pad-to-player
                          assignment is fixed at first connection
                          (connection order: first pad -> player 1, second
                          -> player 2) and never re-arbitrated per frame --
                          deliberately NOT the existing shipped "last
                          active pad wins" pattern in wardfall.html/
                          infall.html/iridescentcosmology.html, which would
                          be actively wrong here since both players' pads
                          are live simultaneously. Kick buttons use rising-
                          edge detection (the API has no press-event model,
                          only a per-frame snapshot) so a held button
                          doesn't refire every frame; guard is level-
                          triggered by design, matching the keyboard
                          guard's hold semantics.

                          See prototypes/RYKNDU_2PLAYER.md for the full
                          writeup of what this does and doesn't cover.

  v0.1.10 — 2026-07-20 — Game 5 consolidation pass §5: added a `guard`
                          state -- POSES.guard (a held, low, arms-in brace,
                          distinct from POSES.flinch's momentary recoil)
                          plus setGuard(active)/`guarding`. A held state,
                          not a timed sequence like attacks: guarding is
                          true for exactly as long as the input is held.
                          Gated the same way attacks already gate each
                          other -- can't be raised mid-committed
                          windup/strike, but does cut off an interruptible
                          recovery tail. triggerAttack() now refuses to
                          start an attack while guarding (must release
                          guard first). Bound to ArrowDown (hold) alongside
                          the existing ArrowLeft/Right kick inputs, and to
                          window.Rig._test.setGuard() for tests. This is
                          the pose/input-gating only -- what guard actually
                          blocks (a hurtbox, a timer/meter, parry timing)
                          is real combat design deferred past this
                          consolidation pass, since there's no incoming-
                          attack-vs-player hit check to defend against yet
                          in a still-single-rig-vs-enemy-dots prototype.
                          See prototypes/RYKNDU_MOVESET.md for the full
                          state/transition table this pass also wrote.

  v0.1.9 — 2026-07-20 — Game 5 consolidation pass §3: added a named
                          attachment-socket layer (getSockets(joints):
                          hand_r, hand_l, foot_r, foot_l, hip, back, head)
                          on top of solveRig()'s existing joint output.
                          Socket names are deliberately distinct from
                          solveRig()'s own joint keys (hand_r vs handR) so
                          a stray direct joint read doesn't silently pass
                          as "using the socket system." resolveHits()
                          migrated to read foot_r/foot_l through this layer
                          instead of joints.footR/footL directly -- the
                          first real caller, so the convention is enforced
                          starting now rather than merely documented.
                          window.Rig._test.state() now also exposes
                          sockets alongside joints for test/debug
                          introspection. No behavior change: sockets
                          currently alias solveRig()'s own points 1:1

                          yet, since no weapon/skin exists to need one).
                          See prototypes/RYKNDU_RIG_SCHEMA.md for the full

  v0.1.8 — 2026-07-09 — Feel pass: visual/art polish, prompted by a live
                          playtest re-raising the pre-v0.1.6 complaint ("the
                          dot is so small") and a follow-up visual-art-
                          director audit. Fixed a real bug (the #debug,
                          #hud, and .version-marker overlays all shared the
                          same top strip with no reserved lanes and rendered
                          garbled overlapping text -- #debug is now gated

                          arrowhead shape with a distinct pulsing "about to
                          strike" telegraph state, not a plain ctx.arc()
                          circle. missFlash's peak alpha and decay were both
                          reduced -- it used to wash out the player's own
                          rig at the worst possible moment (a potential game
                          over). The kill death-flash now uses easeOutBack
                          for a snap instead of a linear fade. A miss now
                          triggers a brief player recoil pose (previously
                          only screen-level shake/flash reacted, never the
                          rig itself). Added ground-contact shadows and a
                          subtle background gradient to reduce the large
                          dead space above/below the rig. Added
                          prefers-reduced-motion gating for screen shake and
                          missFlash (OS-level signal only -- no settings
                          menu exists yet to layer a manual override on).
                          The GAME OVER retry text is now backed by a card

  v0.1.7 — 2026-07-08 — Phase 3 of the plan of action: real stakes. Up to
                          this point every build had verified-solid combat
                          but no actual way to lose -- an unanswered enemy
                          just incremented a counter forever. Added a
                          gauntlet session: MAX_MISSES=5 lives (the plan's
                          suggested 3-5-miss "winnable but threatening"
                          pool), a real GAME OVER state once they're spent,
                          and a restart on the next input -- not a

                          built toward. A player-facing #hud (kill count +

  v0.1.6 — 2026-07-08 — First quality pass against five named pillars
                          (Threat Readability, Rig Animation Quality, Combat
                          Feedback/Juice, Input Fairness & Responsiveness,
                          Audio), run the same way Wonderland/Sigil Chain's
                          own pre-game-3 quality pass worked: role-grounded
                          audits judged against a genuine bar, not a vibe
                          check, prompted directly by a producer playtest
                          ("couldn't tell when to hit, the model is so big
                          and the dot is so small").

                          The real bug underneath that complaint (found
                          independently by visual-art-director simulating
                          the pose and game-designer hand-solving the leg
                          IK — same answer, two methods): the strike pose's
                          foot target was 131px ABOVE the enemy's fixed
                          screen height at full extension, so the real hit
                          window was ~43ms concentrated at the START of the
                          strike (before the kick even looks like it's
                          landing), not at the visual "impact" moment.
                          Retargeted kickR_strike's hipR/kneeR via 2-bone IK
                          to reach the enemy's height; verified via
                          simulation that the ENTIRE 70ms strike phase is
                          now within hit radius (was ~43/70ms), and live
                          via a rAF-precision in-page timeline showing
                          distance closing smoothly through windup and the
                          kill landing on strike's first frame.

                          A second, independent engineer audit found a real
                          mechanical fairness bug: updateEnemies() ran
                          before resolveHits() in frame(), so a
                          geometrically clean, in-radius hit could get
                          stolen as a miss whenever an enemy's melee-range
                          timeout and the strike-phase start coincided in
                          the same frame — one-directional (only ever cost
                          the player), worse on lower frame rates. Fixed by
                          swapping the call order; reproduced and verified
                          fixed via a targeted timing test (12/12 clean).

                          Also landed: rig scaled 0.8x (was 262px tall vs a
                          28px enemy dot, a 9.4:1 ratio the producer
                          directly flagged) — LEN data itself is scaled,
                          not a render-time transform, since solveRig()
                          feeds both rendering and hit detection. Enemy
                          redesigned: 22px base radius growing to 34px as a
                          telegraph (reusing the travel-fraction already
                          computed, not a new timer), recolored from an
                          untokenized #c0392b to this studio's actual
                          --danger token (#ff4d70/#ff8da0, both already
                          established in wonderland.html/sigilchain.html).
                          Recovery-phase easing swapped to this studio's
                          proven easeOutBack "give it weight" idiom
                          (identical formula in both shipped games), never
                          reused here before. A kill now lingers ~220ms as
                          a fading white flash with a 10-particle
                          radiating burst (ported from wonderland's
                          hit-punch/particle patterns) instead of an
                          instant silent vanish; a miss gets its own
                          distinct danger-tinted full-screen flash, both
                          with their own screen-shake tier (kill +6, miss
                          +3) so kill and miss read as different weights,
                          not just different colors. Shake/flash are pure
                          presentation, applied as a render-time offset
                          only — never touching the coordinates hit
                          detection actually uses. True hitstop (freezing
                          the timing clock on impact) was considered and
                          explicitly left out of this pass: it would need
                          a paused "virtual now" threaded through
                          updateSeq/currentPose/startAttack, real invasive
                          risk to the just-stabilized timing system for a
                          nice-to-have when flash+punch+particles+shake
                          already deliver most of the impact.

                          Enemy spawn gap reduced 900ms->550ms (per
                          game-designer's math: the old cadence was 60%
                          dead time between encounters) — applied only
                          after the geometry fix landed, per that same
                          audit's explicit sequencing note, so this isn't
                          just letting players fail faster at a still-unfair
                          window.

                          Audio pillar landed in the same pass (separate
                          audio-designer audit): four one-shot SFX voices
                          (windup whoosh, strike impact, miss buzzer, and a
                          new proximity-pulse "closing in" cue timed to the
                          actual hit window) on a deliberately dry, reverb-
                          free graph — a reverb tail would blur the exact
                          transient onset this whole pass exists to
                          sharpen. No music system; nothing to score yet.

                          tests/rig-sequence.js extended to 22 assertions
                          (the dying-enemy lingering state, the ordering-bug
                          regression); new tests/rig-audio.js (14
                          assertions) verifies each SFX voice fires from

<script>
(function () {
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  const debugEl = document.getElementById('debug');
  const hudEl = document.getElementById('hud');
  if (new URLSearchParams(location.search).has('debug')) debugEl.style.display = 'block';

  let bgGradient = null;
  // Render-only camera scale (v0.1.22 mobile-emulation fix) -- a real
  // Playwright device-emulation pass (tests/rig-mobile-emulation.js)
  // caught both rigs' arm-spans and their ~160px duel separation
  // reaching past the edges of narrow phone viewports (as narrow as
  // 320px), overlapping the touch controls docked in the screen corners.
  // Both rigs rendered fine on every desktop-width test in this file's
  // history because 700px+ of width was always assumed, implicitly.
  // renderScale shrinks solveRig()'s PIXEL output only -- world-space
  // posX/velX/ARENA_BOUND and every physics constant stay in the same
  // units on every device, so movement/knockback/ring-out distances and
  // feel are identical regardless of screen size; only how many actual
  // screen pixels one world unit maps to changes. 700 is the narrowest
  // width the original (pre-mobile-pass) layout was ever screenshot-
  // verified at without complaint -- below that, scale down linearly;
  // at or above it, this is a no-op (scale stays 1, matching every
  // existing desktop-width test and screenshot in this file's history).
  let renderScale = 1;
  const RENDER_SCALE_REFERENCE_WIDTH = 700;
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    renderScale = Math.min(1, canvas.width / RENDER_SCALE_REFERENCE_WIDTH);
    // Subtle vertical gradient instead of a flat fill (v0.1.8): the large
    // empty canvas above/below the rig (roughly half the viewport at a
    // typical phone aspect ratio) read as literally nothing against a flat
    // single color, compounding the "generic prototype" feel. Cached here
    // rather than rebuilt every frame -- a gradient only needs to change
    // when the canvas itself resizes.
    bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    bgGradient.addColorStop(0, '#0d0e15');
    bgGradient.addColorStop(0.78, '#12141c');
    bgGradient.addColorStop(1, '#181a24');
  }
  window.addEventListener('resize', resize);
  resize();

  // ---- Segment lengths (px) ----
  // RESOLVED, v0.1.6 -- historical record of a fixed complaint, not an
  // open issue: scaled to 0.8x of the original v0.1.0-0.1.5 values after
  // a quality-pass finding (visual-art-director) that the rig at full
  // size was 262px tall against a 28px-diameter enemy dot -- a 9.4:1
  // ratio the producer's own playtest flagged directly ("the model is so
  // big and the dot is so small"). The 0.8x values immediately below ARE
  // the fix, shipped and unchanged since; this comment documents why they
  // exist, the same way every other historical comment in this file
  // explains a past decision rather than describing something still
  // broken. This shrinks the rig's screen dominance and also reads as
  // tighter/faster for a fast-reflex genre (same travel distance in the
  // same ms duration occupies a smaller fraction of the rig's own
  // silhouette). Scaling the data here, not a render-time canvas
  // transform, is required -- solveRig() feeds both rendering and hit
  // detection, so a draw-only scale would desync the visible foot from
  // the real hit-checked foot.
  const LEN = {
    thigh: 50, shin: 48, upperArm: 37, forearm: 37,
    spine: 62, neck: 2, headR: 19,
    hipW: 13, shoulderW: 24
  };

  // Angle convention: 0 = pointing right (+x), PI/2 = pointing down (canvas is y-down).
  const DOWN = Math.PI / 2;

  // ---- Poses: absolute angle per segment + pelvis offset ----
  // These numbers are a first guess, not a tuned result — expect to hand-adjust
  // them once you see the rig move.
  const POSES = {
    idle: {
      pelvisDX: 0, pelvisDY: 0, spineA: -DOWN + 0.05,
      hipL: DOWN + 0.22, kneeL: DOWN + 0.30,
      hipR: DOWN - 0.22, kneeR: DOWN - 0.30,
      shoulderL: DOWN + 0.30, elbowL: DOWN + 1.35,
      shoulderR: DOWN - 0.30, elbowR: DOWN - 1.35
    },
    kickR_windup: {
      pelvisDX: -8, pelvisDY: 3, spineA: -DOWN - 0.12,
      hipL: DOWN + 0.35, kneeL: DOWN + 0.55,
      hipR: DOWN - 0.55, kneeR: DOWN - 0.75,
      shoulderL: DOWN + 2.0, elbowL: DOWN + 1.7,
      shoulderR: DOWN - 1.6, elbowR: DOWN - 1.2
    },
    // hipR/kneeR were retargeted by a quality-pass finding (visual-art-director
    // AND game-designer, independently, via different methods -- pose
    // simulation vs. hand-solved 2-bone IK -- landed on the same answer):
    // the old strike pose (hipR:-0.35, kneeR:-0.30) put the foot 131px ABOVE
    // the enemy's fixed screen height at full extension, so the real hit
    // window was ~43ms concentrated at the START of the strike (before the
    // kick even looks like it's landing), not at the visual "impact" moment.
    // These angles were solved via 2-bone IK to put the foot at (dx=62,
    // dy=68) from the hip -- i.e. exactly level with the enemy's y-anchor
    // (groundY-30) given the new 0.8x-scaled thigh/shin -- and verified via
    // simulation to keep the ENTIRE 70ms strike phase within hit radius of
    // the enemy (was ~43/70ms before the fix). Still first-guess in the
    // sense that the exact silhouette wasn't eyes-on tuned, but the target
    // constraint (foot reaches enemy height) is a fairness-math requirement,
    // not a style call.
    kickR_strike: {
      pelvisDX: -11, pelvisDY: 0, spineA: -DOWN - 0.22,
      hipL: DOWN + 0.25, kneeL: DOWN + 0.35,
      hipR: 0.488, kneeR: 1.19,
      shoulderL: DOWN + 2.1, elbowL: DOWN + 1.8,
      shoulderR: DOWN - 1.3, elbowR: DOWN - 0.9
    }
  };

  // Keep a mirrored spine angle within (-pi, pi] of the un-mirrored range —
  // spineA's resting orientation is near -pi/2, so a raw "pi - angle"
  // reflection lands near +3pi/2 instead: numerically ~2pi away from its
  // own visual equivalent, which made lerpPose sweep almost a full
  // rotation on every left-side kick instead of a small lean.
  function wrapAngle(a) {
    while (a > Math.PI) a -= 2 * Math.PI;
    while (a <= -Math.PI) a += 2 * Math.PI;
    return a;
  }

  // Build the mirrored left-side kick from the right-side kick definitions,
  // so the two sides can never silently drift out of sync with each other.
  function mirror(pose) {
    return {
      pelvisDX: -pose.pelvisDX, pelvisDY: pose.pelvisDY, spineA: wrapAngle(Math.PI - pose.spineA),
      hipL: Math.PI - pose.hipR, kneeL: Math.PI - pose.kneeR,
      hipR: Math.PI - pose.hipL, kneeR: Math.PI - pose.kneeL,
      shoulderL: Math.PI - pose.shoulderR, elbowL: Math.PI - pose.elbowR,
      shoulderR: Math.PI - pose.shoulderL, elbowR: Math.PI - pose.elbowL
    };
  }
  POSES.kickL_windup = mirror(POSES.kickR_windup);
  POSES.kickL_strike = mirror(POSES.kickR_strike);

  // v0.1.8 feel-pass finding: a miss produced screen-level feedback (shake,
  // flash, buzz) but the player's own body never reacted -- the rig just
  // kept idling under the flash. Symmetric (a hit's direction/side isn't
  // meaningful here, unlike the kick poses), a slight crouch-back recoil:
  // pelvis dips and drops back, spine leans back further, arms pull in
  // tighter to the body instead of staying out at idle's wide T-pose.
  POSES.flinch = {
    pelvisDX: 0, pelvisDY: 6, spineA: -DOWN + 0.18,
    hipL: DOWN + 0.30, kneeL: DOWN + 0.22,
    hipR: DOWN - 0.30, kneeR: DOWN - 0.22,
    shoulderL: DOWN + 1.55, elbowL: DOWN + 1.9,
    shoulderR: DOWN - 1.55, elbowR: DOWN - 1.9
  };

  // Game 5 consolidation §5: a defensive stance the prototype never needed
  // (it only ever fought one-directional enemies). Symmetric like flinch,
  // but distinct from it -- lower/wider base (harder to knock down, not
  // recoiling), arms pulled in close and crossed toward center rather than
  // thrown back, reading as a held brace rather than a momentary reaction.
  // This is the pose only; what guard actually blocks/reduces (a hurtbox,
  // a guard timer/meter, parry timing) is real combat design deferred to
  // the next phase per this consolidation pass's own scope -- there's no
  // incoming-attack-vs-player hit check to defend against yet, since this
  // is still a single-rig-vs-enemy-dots prototype until the 2-player
  // extension lands.
  POSES.guard = {
    pelvisDX: 0, pelvisDY: 10, spineA: -DOWN + 0.05,
    hipL: DOWN + 0.35, kneeL: DOWN + 0.45,
    hipR: DOWN - 0.35, kneeR: DOWN - 0.45,
    shoulderL: DOWN + 0.35, elbowL: DOWN + 2.6,
    shoulderR: DOWN - 0.35, elbowR: DOWN - 2.6
  };

  function lerp(a, b, t) { return a + (b - a) * t; }
  function lerpPose(a, b, t) {
    const out = {};
    for (const k in a) out[k] = lerp(a[k], b[k], t);
    return out;
  }
  function easeOutQuad(t) { return 1 - (1 - t) * (1 - t); }
  function easeInQuad(t) { return t * t; }
  function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
  // This studio's proven "give it weight" idiom (identical formula in both
  // wonderland.html and sigilchain.html) -- overshoots past 1 before settling.
  // Quality-pass finding: this file never reused it even though the recovery
  // phase (cosmetic follow-through, no gameplay function) is exactly the kind
  // of moment the shipped games reserve it for.
  function easeOutBack(t) {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  }

  // Windup -> strike -> recover. Durations are a first guess for tempo —
  // this is the single most important thing to tune once you're watching it.
  function attackSequence(side) {
    const w = side === 'R' ? 'kickR_windup' : 'kickL_windup';
    const s = side === 'R' ? 'kickR_strike' : 'kickL_strike';
    return [
      { pose: w, dur: 110, ease: easeOutQuad },
      { pose: s, dur: 70, ease: easeInQuad },
      { pose: 'idle', dur: 220, ease: easeOutBack }
    ];
  }

  // Arena walking bound, module-level (not per-instance) since both rigs
  // share the same stage -- also the ring-out threshold (Game 5 combat
  // resolution): voluntary movement can never cross it (see
  // updateMovement()'s clamp below), so the ONLY way either rig's posX
  // ever ends up beyond it is a knockback impulse from a landed hit,
  // which is exactly what makes "cross this line" a meaningful ring-out
  // condition rather than something walking there directly could trigger.
  const ARENA_BOUND = 170;

  // Guard stamina meter constants (v0.1.24), module-level for the same
  // reason ARENA_BOUND is -- one shared budget both rigs are held to
  // identically, not per-instance tuning. Numbers picked to make
  // continuous blocking a real, felt cost without being punishing for a
  // single well-timed block: full meter (100) drains in 2.5s of
  // continuous guard (GUARD_DRAIN_PER_SEC=40) but takes 4s to fully
  // regenerate (GUARD_REGEN_PER_SEC=25) -- regen slower than drain is
  // deliberate, the same "stopping should cost more than starting" shape
  // MOVE_FRICTION > MOVE_ACCEL already uses for movement. A single
  // blocked hit also costs a real flat chunk (GUARD_BLOCK_HIT_DRAIN=20 --
  // a fifth of the whole meter) on top of the continuous drain, so
  // repeated blocking against a real attacker burns down faster than
  // just standing in guard alone.
  const GUARD_METER_MAX = 100;
  const GUARD_DRAIN_PER_SEC = 40;
  const GUARD_REGEN_PER_SEC = 25;
  const GUARD_MIN_TO_RAISE = 15; // can't re-raise guard the instant it hits empty -- needs to recover a little first
  const GUARD_BLOCK_HIT_DRAIN = 20;

  // Parry window (v0.1.25), same module-level sharing as everything else
  // above -- one budget both rigs are held to identically. Deliberately
  // tight: this rig's own strike-phase hit window was fixed down to the
  // frame in v0.1.6, so a genuine read-and-react parry (not "hold guard
  // and get lucky") needs a window that rewards anticipating the
  // attack's start, not blocking early and coasting through it. The
  // punish knockback itself reuses KNOCKBACK_SPEED (defined further down
  // alongside the rest of combat resolution) rather than a second
  // constant here -- a successful parry costs the attacker exactly as
  // much ground as a landed hit already costs a defender, not an
  // invented separate number.
  const PARRY_WINDOW_MS = 120;

  // ---- Rig controller factory (Game 5 2-player extension) ----
  // Extracted from what was a single set of module-level `seq`/`seqIdx`/...
  // variables (through v0.1.10) into a factory so a second player's rig can
  // exist as a genuinely separate state object -- not two references to
  // one shared pose array, the exact "duplicated logic silently drifts
  // apart" trap this file has already hit twice before (mockEnemy.hitAt's
  // duplicated duration constant; mirror()'s existence at all). Writing a
  // second, hand-copied version of this state machine for player 2 would
  // just relocate that same trap one level up, so this is a pure refactor
  // instead: verified against the full existing test suite (unchanged
  // behavior for player 1) before player 2 is ever instantiated from it.
  //
  // `opts.onAttackStart(side)` lets a caller hook the windup SFX trigger --
  // optional, since player 2 has no audio of its own yet. The miss-flinch
  // reaction used to be wired in externally via an `opts.idleOverlay` hook
  // (player 1 only, since player 2 had no source of flinches); now that a
  // landed rig-vs-rig hit (see applyKnockback() below) ALSO needs to flinch
  // the defender -- and the defender can be either player -- flinch moved
  // into the factory itself so both rigs get it for free, the same reason
  // movement/jump/guard already live in here rather than being bolted on
  // per-instance.
  function createRigController(opts) {
    opts = opts || {};
    let seq = null;
    let seqIdx = 0;
    let seqStart = 0;
    let fromPose = POSES.idle;
    let queuedSide = null; // one buffered input so a fast tap during the committed phases isn't dropped
    let attackSide = null; // which side the currently-playing (or most recent) attack was on
    let guarding = false;
    let hasHitThisSwing = false; // one landed rig-vs-rig hit per strike phase -- same "can't double-count" guarantee resolveHits() gets for free by deleting the enemy on contact, needed here since a defender can stay in PVP_HIT_RADIUS for several frames of one strike
    // Hit-reaction pose overlay -- was player-1-only (triggered on a missed
    // enemy), now shared: a landed PVP hit (applyKnockback(), unless
    // blocked) triggers the exact same flinch. Symmetric like POSES.flinch
    // itself, so there's nothing side-specific to get wrong.
    let flinchStart = -Infinity;
    const FLINCH_DUR = 180;
    function triggerFlinch() { flinchStart = performance.now(); }
    // Recovery follow-through state (real damped-spring momentum -- see
    // currentPose()'s recovery branch and updateSeq()'s exit-velocity
    // capture). null until the first attack ever enters recovery.
    let recoverEnterPose = null, recoverExitVel = null;
    const RECOVER_OMEGA = 18; // spring decay rate -- tuned so a near-zero exit velocity still settles within the same ~220ms window recovery always had (e^(-18*0.22) ≈ 1.9% residual)
    // ---- Movement physics (producer request: "detail the physics of the
    // rig" -- replacing the v0.1.16 instant-delta move() with a real
    // velocity/acceleration model). posX is a persistent world position,
    // distinct from pose.pelvisDX (the transient per-attack lean) -- fed
    // into solveRig() as the stand offset instead of a fixed per-player
    // constant. velX is real velocity (px/sec), integrated every frame in
    // updatePhysics(dt) -- moveIntent (-1..1, set once per frame by the
    // input layer via setMoveIntent) is a target *direction*, not a
    // position delta, so starting and stopping both take real time
    // (MOVE_ACCEL/MOVE_FRICTION) instead of snapping to a speed. facing
    // tracks actual velocity direction, not raw input, so it lags very
    // slightly behind an instant reversal the same way a real body would.
    const START_X = opts.startX || 0; // spawn point -- 0 for player 1, an offset for player 2 so a real duel doesn't start with both rigs on top of each other
    let posX = START_X, velX = 0, moveIntent = 0;
    let facing = opts.startFacing || 'R';
    const MOVE_MIN = -ARENA_BOUND, MOVE_MAX = ARENA_BOUND; // walking wall -- see ARENA_BOUND's own comment for why this is also the ring-out threshold
    const MOVE_MAX_SPEED = 220; // px/sec top speed
    const MOVE_ACCEL = 1400; // px/sec^2 -- how fast velocity ramps toward the intended speed while input is held
    const MOVE_FRICTION = 1800; // px/sec^2 -- how fast velocity decays to 0 with no input (or while a committed attack overrides intent to 0); higher than MOVE_ACCEL so stopping reads snappier than starting, not floaty
    function setMoveIntent(v) { moveIntent = clamp(v, -1, 1); }

    // ---- Knockback (Game 5 combat resolution) ----
    // A landed hit overrides velX directly (not another force added on top
    // of whatever velocity already existed) and locks out normal
    // movement/wall-clamp for KNOCKBACK_LOCK_MS -- during that window the
    // rig decelerates via the exact same MOVE_FRICTION real movement
    // already uses, just without the arena-wall clamp, since being
    // carried past that wall is what makes a ring-out possible at all
    // (see resolveDuelCombat()/checkRingOuts()). Tuned so the lock
    // window (260ms) comfortably outlasts the time a full-speed knockback
    // takes to decay to 0 under this same friction (480/1800 =~ 267ms) --
    // by the time normal movement resumes, velX has already settled, so
    // there's no jarring clamp-snap back onto the stage after knockback
    // stops just short of a ring-out.
    let knockbackTimer = 0;
    const KNOCKBACK_LOCK_MS = 260;
    function applyKnockback(vx, blocked) {
      velX = vx;
      knockbackTimer = KNOCKBACK_LOCK_MS;
      if (!blocked) {
        // A clean hit overrides whatever the defender was doing, the same
        // way a fresh attack already interrupts a recovery tail -- guard
        // survives a BLOCKED hit (handled by the caller never passing
        // blocked=true into this branch), but a landed hit cancels an
        // attack/guard/jump in progress.
        seq = null; queuedSide = null; guarding = false;
        jumping = false; jumpHeight = 0; velY = 0;
        triggerFlinch();
      }
    }

    function updateMovement(dt) {
      if (knockbackTimer > 0) {
        knockbackTimer -= dt * 1000;
        if (velX > 0) velX = Math.max(0, velX - MOVE_FRICTION * dt);
        else velX = Math.min(0, velX + MOVE_FRICTION * dt);
        posX += velX * dt; // deliberately unclamped -- see the comment above applyKnockback()
        return;
      }
      // No sliding the whole body mid-kick -- overriding intent to 0 (not
      // freezing velX outright) means a kick thrown mid-stride decelerates
      // into the committed phase via real friction instead of snapping
      // dead, which would itself look like the exact "knee jerk" weightless
      // motion this physics pass exists to fix.
      const intent = (seq && isCommittedPhase(seqIdx)) ? 0 : moveIntent;
      const targetSpeed = intent * MOVE_MAX_SPEED;
      const rate = intent !== 0 ? MOVE_ACCEL : MOVE_FRICTION;
      if (velX < targetSpeed) velX = Math.min(targetSpeed, velX + rate * dt);
      else if (velX > targetSpeed) velX = Math.max(targetSpeed, velX - rate * dt);
      const next = posX + velX * dt;
      if (next < MOVE_MIN || next > MOVE_MAX) velX = 0; // hit the arena wall -- stop dead rather than pinning against the clamp with residual velocity every frame
      posX = clamp(next, MOVE_MIN, MOVE_MAX);
      if (Math.abs(velX) > 8) facing = velX > 0 ? 'R' : 'L'; // only reface on real speed, not residual friction noise near 0
    }

    // ---- Jump physics ----
    // Replacing the v0.1.16 canned sin(t*pi) arc with real projectile
    // motion: a takeoff velocity, a constant downward acceleration
    // integrated every frame, same shape gravity actually has (falls back
    // through the same speed profile it rose with, not a fixed-duration
    // curve). GRAVITY/JUMP_SPEED are tuned to reproduce the old ~44px
    // apex / ~420ms flight time as a sanity check that this reads the same
    // or better, not picked blind: apex = JUMP_SPEED^2/(2*GRAVITY) =
    // 420^2/4000 = 44.1px; time-to-apex = JUMP_SPEED/GRAVITY = 0.21s, so a
    // symmetric up+down flight is ~420ms, matching the old JUMP_DUR.
    // Exclusive with attack/guard for this pass (can't jump mid-committed-
    // attack or while guarding, can't attack/guard while airborne) -- the
    // same "don't add complexity ahead of a working baseline" reasoning
    // this file's own history already names for why the consolidation
    // pass deferred combo/parry. Aerial attacks are a real, natural
    // extension later, not designed here.
    let jumping = false, velY = 0, jumpHeight = 0;
    const GRAVITY = 2000, JUMP_SPEED = 420;
    function tryJump() {
      if (jumping || guarding) return;
      if (seq && isCommittedPhase(seqIdx)) return;
      jumping = true;
      velY = JUMP_SPEED;
      jumpHeight = 0;
      seq = null;
      queuedSide = null;
    }
    function updateJump(dt) {
      if (!jumping) return;
      velY -= GRAVITY * dt;
      jumpHeight += velY * dt;
      if (jumpHeight <= 0) { jumpHeight = 0; velY = 0; jumping = false; }
    }
    function updatePhysics(dt) { updateMovement(dt); updateJump(dt); updateGuardMeter(dt); }

    // Convention: the LAST phase of any attackSequence is recovery —
    // cosmetic follow-through with no remaining gameplay function (the hit
    // has already resolved during strike). Every phase before that is
    // committed: once it starts, it plays out in full. This distinction is
    // load-bearing for the double-boss threat-reading design goal — a
    // player must be able to answer a second threat without waiting out
    // dead recovery time from the first.
    function isCommittedPhase(idx) {
      return idx < seq.length - 1;
    }

    // ---- Guard (Game 5 consolidation §5, meter added v0.1.24) ----
    // A held state, not a timed sequence like attacks -- guarding is true
    // for exactly as long as the guard input is held AND the guard meter
    // hasn't run out. Can't be raised mid-committed-attack (the same rule
    // attacks already use against each other) so a guard input can't cut a
    // committed windup/strike short; it CAN cut off an interruptible
    // recovery tail, the same way a fresh attack already does.
    //
    // guardMeter (v0.1.24) is real elapsed-time stamina, not a per-frame
    // magic number -- integrated in updateGuardMeter(dt), called from
    // updatePhysics(dt) alongside movement/jump, the same "real time, not
    // a canned curve" standard this rig's whole physics pass already
    // holds itself to. Continuous blocking drains it; releasing guard
    // regenerates it (slower than it drains, so turtling has a real
    // cost); hitting zero forces guard to drop immediately, not just
    // refuses the next raise. A landed, BLOCKED hit also costs a real
    // chunk of meter directly (damageGuardMeter(), called from
    // resolveDuelHit()) -- guard mitigates knockback but isn't free, the
    // exact gap the design docs named ("no guard timer/meter... free for
    // as long as the input is held").
    let guardMeter = GUARD_METER_MAX;
    function updateGuardMeter(dt) {
      if (guarding) {
        guardMeter = Math.max(0, guardMeter - GUARD_DRAIN_PER_SEC * dt);
        if (guardMeter <= 0) guarding = false; // exhausted -- forced out, not just refused on the next raise
      } else {
        guardMeter = Math.min(GUARD_METER_MAX, guardMeter + GUARD_REGEN_PER_SEC * dt);
      }
    }
    function damageGuardMeter(amount) {
      guardMeter = Math.max(0, guardMeter - amount);
      if (guardMeter <= 0) guarding = false;
    }
    // ---- Parry (v0.1.25) ----
    // The precision-timing reward guard never had: a hit landing within
    // PARRY_WINDOW_MS of the MOMENT guard was raised (not any time while
    // guarding, which is just a normal block) is a parry, not a block --
    // resolveDuelHit() checks isInParryWindow() and, on a parry, fully
    // negates the hit against the defender (no knockback, no guard-meter
    // cost) and punishes the ATTACKER instead. guardRaisedAt only updates
    // on the false->true transition, not every frame guard stays held, so
    // holding block from before an attack starts is never itself a free
    // parry window -- the window is tied to the RAISE, matching the "read
    // the attack and block at the right instant" skill a parry is
    // supposed to reward.
    let guardRaisedAt = -Infinity;
    function isInParryWindow() {
      return guarding && (performance.now() - guardRaisedAt) < PARRY_WINDOW_MS;
    }
    function setGuard(active) {
      if (active) {
        if (jumping) return; // can't block mid-air -- land first
        if (seq && isCommittedPhase(seqIdx)) return;
        if (guardMeter < GUARD_MIN_TO_RAISE) return; // too exhausted to raise guard again yet -- must recover a little first
        if (!guarding) guardRaisedAt = performance.now(); // only stamp the RAISE, not every frame guard stays held (see isInParryWindow()'s own comment)
        guarding = true;
        seq = null;
        queuedSide = null; // dropping a buffered attack is deliberate: raising guard is choosing not to attack
      } else {
        guarding = false;
      }
    }

    function startAttack(side) {
      // Capture the outgoing pose BEFORE seq/seqIdx/seqStart change —
      // otherwise currentPose() below takes its mid-sequence branch against
      // the new seq (t=0), returning fromPose unchanged instead of the
      // actual current pose.
      fromPose = currentPose();
      seq = attackSequence(side);
      seqIdx = 0;
      seqStart = performance.now();
      attackSide = side;
      hasHitThisSwing = false; // a fresh attack gets a fresh chance to land -- see resolveDuelHit()
      if (opts.onAttackStart) opts.onAttackStart(side);
    }

    function markHit() { hasHitThisSwing = true; } // called by resolveDuelHit() once this swing has landed, so the same strike can't score twice while the defender lingers in range

    function teleportTo(x) { posX = x; velX = 0; } // test/round-reset convenience -- bypasses movement physics for deterministic positioning, the same convenience window.Rig._test.spawnEnemy() already gets for enemy placement

    function triggerAttack(side) {
      if (guarding) return; // must drop guard before attacking -- no attack-while-guarding cancel exists
      if (jumping) return; // no aerial attacks in this pass -- land first
      if (seq && isCommittedPhase(seqIdx)) { queuedSide = side; return; }
      // Either idle, or sitting in the (interruptible) recovery phase —
      // start immediately. startAttack() captures currentPose() as
      // fromPose, so an interrupted recovery blends smoothly into the new
      // windup instead of snapping.
      startAttack(side);
    }

    function currentPose() {
      if (jumping) {
        // jumpHeight is real integrated projectile motion (see
        // updateJump()), not a canned curve -- read directly as a
        // pelvisDY offset on top of idle. updateJump() (called once per
        // frame from updatePhysics(), same as updateSeq()) is what clears
        // `jumping` on landing; currentPose() only ever reads the current
        // height, it doesn't own the physics step.
        return Object.assign({}, POSES.idle, { pelvisDY: POSES.idle.pelvisDY - jumpHeight });
      }
      if (guarding) return POSES.guard; // takes priority over idle/overlay -- setGuard() already refuses to set this mid-committed-attack
      if (!seq) {
        // Idle breathing so the rig isn't static between attacks. v0.1.11
        // values (450ms/2.4px, 900ms/0.04rad) were real but nearly
        // imperceptible at actual render size -- measured live via
        // window.Rig._test.state().pose deltas: ~1.85px pelvis bob and
        // ~1.1deg shoulder sway over half a cycle, plus a 450ms period read
        // as a nervous twitch, not a breath. Slowed and amplified here to
        // an actually-visible calm-breathing read; still scaled with the
        // 0.8x rig resize, same as LEN.
        const bob = Math.sin(performance.now() / 1400) * 4.5;
        const sway = Math.sin(performance.now() / 1800) * 0.07;
        const base = Object.assign({}, POSES.idle, {
          pelvisDY: POSES.idle.pelvisDY + bob,
          shoulderL: POSES.idle.shoulderL + sway,
          shoulderR: POSES.idle.shoulderR - sway
        });
        const flinchElapsed = performance.now() - flinchStart;
        if (flinchElapsed < FLINCH_DUR) {
          return lerpPose(base, POSES.flinch, 1 - easeOutQuad(flinchElapsed / FLINCH_DUR));
        }
        return base;
      }
      // Recovery: a real damped-spring follow-through instead of another
      // canned easing curve, seeded with the strike's actual exit velocity
      // (captured in updateSeq() the instant this phase began). Closed-
      // form critically-damped solution -- x(t) = (x0 + (v0+omega*x0)*t) *
      // e^(-omega*t) -- chosen specifically so this stays a stateless
      // "evaluate at any t" function like every other phase here, instead
      // of needing frame-by-frame integration and a change to how/when
      // this phase ends. A hard, fully-committed kick carries measurably
      // more momentum through this window than one interrupted early --
      // that's the actual "weight" a fixed-duration blend can't produce.
      if (!isCommittedPhase(seqIdx)) {
        const t = (performance.now() - seqStart) / 1000; // seconds since recovery began
        const decay = Math.exp(-RECOVER_OMEGA * t);
        const pose = {};
        for (const k in POSES.idle) {
          const x0 = recoverEnterPose[k] - POSES.idle[k];
          const v0 = recoverExitVel[k];
          pose[k] = POSES.idle[k] + (x0 + (v0 + RECOVER_OMEGA * x0) * t) * decay;
        }
        return pose;
      }
      const step = seq[seqIdx];
      const t = Math.min(1, (performance.now() - seqStart) / step.dur);
      const eased = step.ease(t);
      const target = POSES[step.pose];
      return lerpPose(fromPose, target, eased);
    }

    function updateSeq(now) {
      if (!seq) return;
      const step = seq[seqIdx];
      if (now - seqStart >= step.dur) {
        // Capture the pose this phase was heading toward BEFORE advancing,
        // so the next phase blends from the correct starting point.
        const completed = step.pose === 'idle' ? POSES.idle : POSES[step.pose];
        seqIdx++;
        seqStart = now;
        if (seqIdx >= seq.length) {
          // Sequence is over — bail out before touching seq[seqIdx], which
          // is now out of bounds. This check has to come before any read of
          // the next step, not after.
          seq = null;
          if (queuedSide) {
            const s = queuedSide;
            queuedSide = null;
            startAttack(s);
          }
          return;
        }
        // Entering recovery: seed the damped-spring follow-through (see
        // currentPose()) with the strike's actual exit velocity -- fromPose
        // still holds the strike's OWN starting pose here (not yet
        // overwritten below) and `completed`/`step.dur` are the strike's
        // ending pose and duration, so this is a real average angular
        // velocity for the phase that just finished, not an invented
        // number. A fast, fully-committed kick carries measurably more
        // momentum into recovery than one interrupted early -- this is
        // what actually answers the "knee jerk" complaint at the attack
        // itself, not just movement/jump.
        if (!isCommittedPhase(seqIdx)) {
          recoverEnterPose = completed;
          recoverExitVel = {};
          for (const k in completed) {
            recoverExitVel[k] = (completed[k] - fromPose[k]) / (step.dur / 1000);
          }
        }
        fromPose = completed;
        // The committed phases (windup+strike) just finished, so we're
        // about to enter recovery — which has no gameplay function left. If
        // an input was already buffered during windup/strike, don't make
        // the player wait out the full recovery: fire it now instead.
        if (!isCommittedPhase(seqIdx) && queuedSide) {
          const s = queuedSide;
          queuedSide = null;
          startAttack(s);
        }
      }
    }

    function reset() {
      seq = null; seqIdx = 0; seqStart = 0; fromPose = POSES.idle;
      queuedSide = null; attackSide = null; guarding = false;
      recoverEnterPose = null; recoverExitVel = null;
      posX = START_X; velX = 0; moveIntent = 0; facing = opts.startFacing || 'R';
      jumping = false; velY = 0; jumpHeight = 0;
      hasHitThisSwing = false; knockbackTimer = 0; flinchStart = -Infinity;
      guardMeter = GUARD_METER_MAX; guardRaisedAt = -Infinity;
    }

    return {
      triggerAttack, setGuard, currentPose, updateSeq, reset, tryJump,
      setMoveIntent, updatePhysics, triggerFlinch, markHit, applyKnockback, teleportTo,
      damageGuardMeter, isInParryWindow,
      get guarding() { return guarding; },
      get seqIdx() { return seqIdx; },
      get seqLen() { return seq ? seq.length : 0; },
      get committed() { return seq ? isCommittedPhase(seqIdx) : false; },
      get queuedSide() { return queuedSide; },
      get attackSide() { return attackSide; },
      get idle() { return !seq; },
      get posX() { return posX; },
      get velX() { return velX; },
      get facing() { return facing; },
      get jumping() { return jumping; },
      get velY() { return velY; },
      get recoverExitVel() { return recoverExitVel; },
      get recoverEnterPose() { return recoverEnterPose; },
      get hasHitThisSwing() { return hasHitThisSwing; },
      get knockbackTimer() { return knockbackTimer; },
      get guardMeter() { return guardMeter; }
    };
  }

  // Player 1: the original single-rig prototype's controller, now built
  // from the shared factory. triggerFlinch() now lives inside the factory
  // itself (both rigs get it -- see the comment above hasHitThisSwing),
  // called here on a missed enemy the same way it's called on a landed
  // PVP hit against either rig.
  const p1 = createRigController({
    startX: -80, startFacing: 'R', // duel spawn: left side, facing right toward player 2
    onAttackStart: () => SFX.windupWhoosh() // every attack starts at the windup phase, so this is exactly the windup trigger point
  });

  // Player 2 (2-player extension): a second, independent instance from the
  // SAME factory -- genuinely separate closure variables, not a reference
  // to player 1's. Was held back behind SHOW_P2=false ("let's make it one
  // rig for now") while movement/jump/momentum got proven on one rig
  // first; re-enabled now that player 2 has the same physics and a real
  // input scheme (see the Input section) and rig-vs-rig combat resolution
  // exists (resolveCombatHits() below) -- a fully-2-player build is the
  // actual goal this rig work has been driving toward.
  const SHOW_P2 = true;
  const P1_COLOR = '#3fd0ff'; // cyan -- verified-safe vs. this studio's reserved gold/red/green bands (STUDIO_BIBLE.md §11)
  const P2_COLOR = '#6b4dff'; // indigo-violet -- same verification
  const p2 = createRigController({ startX: 80, startFacing: 'L' }); // duel spawn: right side, facing left toward player 1

  function triggerAttack(side) { SFX.ensureCtx(); p1.triggerAttack(side); } // idempotent safety net — covers the window.Rig._test.trigger() path too, not just real keydown/pointerdown gestures
  function setGuard(active) { p1.setGuard(active); }
  function currentPose() { return p1.currentPose(); }
  function updateSeq(now) { p1.updateSeq(now); }

  // ---- Rig solving (pure math — no canvas calls) ----
  // Returns every joint's world-space position for a given pose. This is the
  // one place segment-endpoint math happens; rendering and (later) hit
  // detection both read from this same output instead of each computing
  // positions their own way, which is exactly how mockEnemy.hitAt's
  // duplicated-duration bug happened before — two copies of the same math
  // silently drifting apart.
  function segEnd(x1, y1, angle, len) {
    return { x: x1 + Math.cos(angle) * len, y: y1 + Math.sin(angle) * len };
  }

  function solveRig(pose, standOffset) {
    // standOffset (px from canvas center, default 0) is where this rig
    // STANDS on screen -- distinct from pose.pelvisDX, which is the
    // transient per-attack lean. Added for the Game 5 2-player extension
    // (consolidation, not part of the original single-rig schema): default
    // 0 reproduces the original single-rig behavior exactly, so every
    // existing caller/test that never passes a second argument is
    // unaffected.
    //
    // Every length/offset below is multiplied by renderScale -- a pure
    // screen-pixel camera scale (see resize()'s own comment), never
    // applied to standOffset's own WORLD value (that stays real
    // world-space px, matching posX/velX/ARENA_BOUND exactly, so movement
    // speed and physics feel are identical on every device). Only how
    // many actual screen pixels one world unit maps to shrinks on a
    // narrow viewport.
    const s = renderScale;
    const groundY = canvas.height * 0.78;
    const cx = canvas.width / 2 + (standOffset || 0) * s + pose.pelvisDX * s;
    const pelvis = { x: cx, y: groundY - (LEN.thigh + LEN.shin) * s + pose.pelvisDY * s };

    const hipL = { x: pelvis.x - LEN.hipW * 0.4 * s, y: pelvis.y };
    const kneeL = segEnd(hipL.x, hipL.y, pose.hipL, LEN.thigh * s);
    const footL = segEnd(kneeL.x, kneeL.y, pose.kneeL, LEN.shin * s);

    const hipR = { x: pelvis.x + LEN.hipW * 0.4 * s, y: pelvis.y };
    const kneeR = segEnd(hipR.x, hipR.y, pose.hipR, LEN.thigh * s);
    const footR = segEnd(kneeR.x, kneeR.y, pose.kneeR, LEN.shin * s);

    const chest = segEnd(pelvis.x, pelvis.y, pose.spineA, LEN.spine * s);

    const shoulderL = { x: chest.x - LEN.shoulderW * 0.5 * s, y: chest.y + 6 * s };
    const elbowL = segEnd(shoulderL.x, shoulderL.y, pose.shoulderL, LEN.upperArm * s);
    const handL = segEnd(elbowL.x, elbowL.y, pose.elbowL, LEN.forearm * s);

    const shoulderR = { x: chest.x + LEN.shoulderW * 0.5 * s, y: chest.y + 6 * s };
    const elbowR = segEnd(shoulderR.x, shoulderR.y, pose.shoulderR, LEN.upperArm * s);
    const handR = segEnd(elbowR.x, elbowR.y, pose.elbowR, LEN.forearm * s);

    const head = { x: chest.x, y: chest.y - (LEN.neck + LEN.headR) * s };

    return {
      pelvis, hipL, kneeL, footL, hipR, kneeR, footR,
      chest, shoulderL, elbowL, handL, shoulderR, elbowR, handR, head
    };
  }

  // ---- Attachment sockets (consolidation §3) ----
  // The one place weapon/skin/hit-detection code should ever ask "where is
  // X on this rig" -- never by reaching into solveRig()'s raw joint output
  // directly. Socket names are deliberately distinct from solveRig()'s own
  // joint keys (hand_r vs handR) so a stray direct joint read is visually
  // obvious as not going through this layer. Every socket resolves to a
  // plain world-space {x,y} for now -- no orientation/rotation component,
  // since nothing attached needs one yet (no weapon/skin exists). Add
  // rotation here if/when one does, rather than opening a second lookup
  // path alongside this one.
  function getSockets(joints) {
    return {
      hand_r: joints.handR, hand_l: joints.handL,
      foot_r: joints.footR, foot_l: joints.footL,
      hip: joints.pelvis, back: joints.chest, head: joints.head,
      // Added for rig-vs-rig combat resolution (Game 5): a kick's strike
      // pose is solved to land at ankle/enemy-dot height (see
      // kickR_strike's own comment -- ~80px below the pelvis), so hip
      // alone is the wrong reference point for a defender's hurtbox. This
      // is the midpoint between both feet -- ground-level, not tied to
      // whichever leg happens to be forward -- and real enough a future
      // ground-shadow or dust-FX attachment could reuse it too, not a
      // hit-detection-only special case.
      stance: { x: (joints.footL.x + joints.footR.x) / 2, y: (joints.footL.y + joints.footR.y) / 2 }
    };
  }

  // ---- Drawing (pure rendering — no math, reads joints from solveRig) ----
  // color defaults to the original single-rig white so every existing
  // caller that never passes one renders exactly as before. The 2-player
  // extension passes distinct per-player colors (P1_COLOR/P2_COLOR) --
  // verified-safe hues against this studio's reserved gold/red/green bands
  // (STUDIO_BIBLE.md §11), per the visual-art-director draft this session.
  function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }
  // Copied verbatim from iridescentcosmology.html/sigilchain.html -- this
  // studio's proven color-shading utility (the same one behind the
  // faceted-gem-rendering technique), not a new one invented for this rig.
  function shadeHex(hex, dLight, dSat) {
    dSat = dSat || 0;
    const r = parseInt(hex.slice(1, 3), 16) / 255, g = parseInt(hex.slice(3, 5), 16) / 255, b = parseInt(hex.slice(5, 7), 16) / 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h, s, l = (max + min) / 2;
    if (max === min) { h = s = 0; }
    else {
      const d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      switch (max) {
        case r: h = (g - b) / d + (g < b ? 6 : 0); break;
        case g: h = (b - r) / d + 2; break;
        case b: h = (r - g) / d + 4; break;
      }
      h /= 6;
    }
    h *= 360; s = clamp(s * 100 + dSat, 0, 100); l = clamp(l * 100 + dLight, 0, 100);
    return `hsl(${h.toFixed(0)}, ${s.toFixed(0)}%, ${l.toFixed(0)}%)`;
  }

  // Tapered, flat-color limb segment with a dark outline stroke -- the
  // "Stick Fight"/mobile-stickman-brawler visual language (bold flat
  // silhouette, high contrast, crisp edge), per the producer's own
  // reference set for this rig, replacing the v0.1.12 gradient-shaded
  // look that direct feedback found too subtle/generic. widthStart/
  // widthEnd taper the segment (wider at the proximal joint, narrower
  // distal). A single flat fill instead of a gradient is a deliberate
  // style choice here, not a downgrade -- every reference image is flat
  // color, not shaded volume; the read comes from bold proportions and a
  // crisp silhouette edge, not from simulated lighting.
  function drawLimb(p1, p2, widthStart, widthEnd, baseColor, outlineColor) {
    const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
    const nx = Math.cos(angle + Math.PI / 2), ny = Math.sin(angle + Math.PI / 2);
    const p1a = { x: p1.x + nx * widthStart / 2, y: p1.y + ny * widthStart / 2 };
    const p1b = { x: p1.x - nx * widthStart / 2, y: p1.y - ny * widthStart / 2 };
    const p2a = { x: p2.x + nx * widthEnd / 2, y: p2.y + ny * widthEnd / 2 };
    const p2b = { x: p2.x - nx * widthEnd / 2, y: p2.y - ny * widthEnd / 2 };
    // Outline pass first, slightly oversized, sits entirely behind the
    // flat fill drawn on top -- this is what gives the "sticker popped off
    // the background" edge several references show, without needing a
    // separate stroke-then-fill-exact-path (which leaves the stroke
    // straddling the fill edge and half-covered).
    const o = 2.4;
    ctx.beginPath();
    ctx.moveTo(p1a.x + nx * o, p1a.y + ny * o);
    ctx.lineTo(p2a.x + nx * o, p2a.y + ny * o);
    ctx.lineTo(p2b.x - nx * o, p2b.y - ny * o);
    ctx.lineTo(p1b.x - nx * o, p1b.y - ny * o);
    ctx.closePath();
    ctx.fillStyle = outlineColor;
    ctx.fill();
    ctx.beginPath(); ctx.arc(p1.x, p1.y, widthStart / 2 + o, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(p2.x, p2.y, widthEnd / 2 + o, 0, Math.PI * 2); ctx.fill();

    ctx.beginPath();
    ctx.moveTo(p1a.x, p1a.y);
    ctx.lineTo(p2a.x, p2a.y);
    ctx.lineTo(p2b.x, p2b.y);
    ctx.lineTo(p1b.x, p1b.y);
    ctx.closePath();
    ctx.fillStyle = baseColor;
    ctx.fill();
    // Rounded end caps so adjacent segments blend at the joint instead of
    // a hard seam.
    ctx.beginPath(); ctx.arc(p1.x, p1.y, widthStart / 2, 0, Math.PI * 2); ctx.fillStyle = baseColor; ctx.fill();
    ctx.beginPath(); ctx.arc(p2.x, p2.y, widthEnd / 2, 0, Math.PI * 2); ctx.fillStyle = baseColor; ctx.fill();
  }

  // A multi-point tapered limb rendered as ONE continuous silhouette,
  // replacing two separate drawLimb() calls meeting at a joint (thigh+
  // shin, upperArm+forearm). Two overlapping shapes with their own
  // rounded caps read as "parts stuck together" at the knee/elbow, even
  // with a joint gem layered on top -- a real, valid note (producer
  // feedback: "smooth out the joints to make it appear like a single
  // being"). This computes a mitered normal at the interior joint --
  // averaging the unit directions of the two adjacent segments, not their
  // raw angles, so it can't misbehave at an angle wraparound -- and builds
  // one polygon around all three points, so there is no internal seam for
  // the knee/elbow to show at all. The per-vertex round-join circles
  // (already drawn at every point, including the interior one) are what
  // keep this artifact-free even under a sharp bend (a fully-flexed knee
  // mid-kick) where a pure miter alone can pinch.
  function drawLimbChain(pts, widths, baseColor, outlineColor) {
    const n = pts.length;
    const normal = [];
    for (let i = 0; i < n; i++) {
      let dx, dy;
      if (i === 0) { dx = pts[1].x - pts[0].x; dy = pts[1].y - pts[0].y; }
      else if (i === n - 1) { dx = pts[i].x - pts[i - 1].x; dy = pts[i].y - pts[i - 1].y; }
      else {
        const d1x = pts[i].x - pts[i - 1].x, d1y = pts[i].y - pts[i - 1].y;
        const d2x = pts[i + 1].x - pts[i].x, d2y = pts[i + 1].y - pts[i].y;
        const l1 = Math.hypot(d1x, d1y) || 1, l2 = Math.hypot(d2x, d2y) || 1;
        dx = d1x / l1 + d2x / l2; dy = d1y / l1 + d2y / l2; // average of unit vectors, not angles -- no wraparound case to handle
      }
      const len = Math.hypot(dx, dy) || 1;
      normal.push({ x: -dy / len, y: dx / len });
    }
    function pass(padding, color) {
      ctx.beginPath();
      for (let i = 0; i < n; i++) {
        const w = widths[i] / 2 + padding;
        const x = pts[i].x + normal[i].x * w, y = pts[i].y + normal[i].y * w;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      for (let i = n - 1; i >= 0; i--) {
        const w = widths[i] / 2 + padding;
        ctx.lineTo(pts[i].x - normal[i].x * w, pts[i].y - normal[i].y * w);
      }
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
      for (let i = 0; i < n; i++) {
        ctx.beginPath();
        ctx.arc(pts[i].x, pts[i].y, widths[i] / 2 + padding, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
      }
    }
    pass(2.4, outlineColor);
    pass(0, baseColor);
  }

  // A distinct rounded "fist"/"foot" mass at a limb's terminal joint --
  // several references make hands/feet read as a clearly rounded blob,
  // not just a line tapering to a point. Drawn after the limb it caps so
  // it sits on top, same outline-behind-fill technique as drawLimb.
  function drawTerminal(p, radius, baseColor, outlineColor) {
    ctx.beginPath(); ctx.arc(p.x, p.y, radius + 2.4, 0, Math.PI * 2); ctx.fillStyle = outlineColor; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x, p.y, radius, 0, Math.PI * 2); ctx.fillStyle = baseColor; ctx.fill();
  }

  // Rykndu's own signature accent, distinct from the generic-brawler
  // reference set: a small faceted-gem node at each major joint, reusing
  // this studio's actual signature rendering technique (see the
  // faceted-gem-rendering skill -- alternating lit/dark facets fanned from
  // a center point, a soft glow behind it, a translucent outer ring) at a
  // scale that reads as a socketed crystal joint rather than a full gem
  // shape. This is what makes the rig read as *this* studio's character
  // rather than a reskin of any other stickman-brawler asset -- same
  // "arcane" visual identity Shin Mahou Arcade's other games already
  // carry (Sigil Chain's runes, Iridescent Cosmology's Rites), just never
  // applied to a rig before.
  function drawJointGem(p, radius, baseColor) {
    const sides = 7; // odd count, same reasoning the skill gives for hand-authored asymmetry over a uniform even fan: avoids a perfectly mirrored look even at this small a scale
    ctx.save();
    ctx.shadowBlur = radius * 2.2;
    ctx.shadowColor = baseColor;
    for (let i = 0; i < sides; i++) {
      const a0 = (i / sides) * Math.PI * 2, a1 = ((i + 1) / sides) * Math.PI * 2;
      const lit = i % 2 === 0;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + Math.cos(a0) * radius, p.y + Math.sin(a0) * radius);
      ctx.lineTo(p.x + Math.cos(a1) * radius, p.y + Math.sin(a1) * radius);
      ctx.closePath();
      ctx.fillStyle = shadeHex(baseColor, lit ? 20 : -18, lit ? 10 : -8);
      ctx.fill();
      ctx.shadowBlur = 0; // only the first facet needs to cast the glow -- repeating it per-facet would blur every internal edge, not just the silhouette
    }
    ctx.restore();
    ctx.beginPath();
    ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.45)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function renderRig(j, color) {
    const c = color || '#e8e8f0';
    const outline = shadeHex(c, -38, -10); // a darker shade of the same hue, not a universal black -- keeps P1/P2 distinguishable by outline too, not just fill
    // Every thickness/radius below is scaled by the same renderScale
    // solveRig() already applies to joint positions (see resize()'s own
    // comment) -- without this, a narrow-viewport rig would keep its full
    // desktop limb thickness/joint-gem size around a shrunk skeleton and
    // read as stubby/disproportionate instead of a consistently smaller
    // version of the same character.
    const s = renderScale;
    // legs first (drawn behind torso) -- each leg is now ONE continuous
    // chain (hip->knee->foot) instead of two separate tapered shapes
    // meeting at the knee, so there's no internal seam for the joint gem
    // to have to hide. Chunkier taper than a classic stick figure, matching
    // the reference set's thick-limb proportions.
    drawLimbChain([j.hipL, j.kneeL, j.footL], [16 * s, 11 * s, 8 * s], c, outline);
    drawLimbChain([j.hipR, j.kneeR, j.footR], [16 * s, 11 * s, 8 * s], c, outline);
    drawTerminal(j.footL, 7 * s, c, outline);
    drawTerminal(j.footR, 7 * s, c, outline);
    drawJointGem(j.hipL, 4.5 * s, c); drawJointGem(j.kneeL, 4 * s, c);
    drawJointGem(j.hipR, 4.5 * s, c); drawJointGem(j.kneeR, 4 * s, c);

    // spine -- solid wedge widening toward the chest/shoulders (already a
    // single 2-point segment, no internal joint to smooth)
    drawLimb(j.pelvis, j.chest, 13 * s, 17 * s, c, outline);

    // arms -- same one-continuous-chain treatment as the legs
    // (shoulder->elbow->hand)
    drawLimbChain([j.shoulderL, j.elbowL, j.handL], [10 * s, 8 * s, 7 * s], c, outline);
    drawLimbChain([j.shoulderR, j.elbowR, j.handR], [10 * s, 8 * s, 7 * s], c, outline);
    drawTerminal(j.handL, 6.5 * s, c, outline);
    drawTerminal(j.handR, 6.5 * s, c, outline);
    drawJointGem(j.shoulderL, 4.5 * s, c); drawJointGem(j.elbowL, 4 * s, c);
    drawJointGem(j.shoulderR, 4.5 * s, c); drawJointGem(j.elbowR, 4 * s, c);

    // chest core -- a slightly larger signature gem, the one Rykndu-
    // specific mark rather than a repeated joint detail (the studio's
    // "Grimoire vocabulary" already treats a core/rite/rune as the
    // recognizable emblem of a character or system elsewhere -- this is
    // that idea applied to the rig itself)
    drawJointGem(j.chest, 6.5 * s, c);

    // head -- flat fill matching the flat-silhouette style, same outline
    // treatment as the limbs so it reads as one consistent character
    ctx.beginPath(); ctx.arc(j.head.x, j.head.y, (LEN.headR + 2.4) * s, 0, Math.PI * 2); ctx.fillStyle = outline; ctx.fill();
    ctx.beginPath(); ctx.arc(j.head.x, j.head.y, LEN.headR * s, 0, Math.PI * 2); ctx.fillStyle = c; ctx.fill();
  }

  // ---- Guard meter (v0.1.24) ----
  // A stamina cost with nothing visible to show it would just read as
  // "guard randomly stopped working" -- the whole point of a real
  // resource is that the player can see it spend down. Drawn as a small
  // world-space bar above the rig's own head (follows the character,
  // scales with renderScale the same as everything else about it) rather
  // than a fixed HUD element, since "the player is looking at the rig
  // most of the time" is this project's own stated design priority --
  // the meter belongs on the character, not off in a corner.
  function drawGuardMeter(j, meter, color) {
    const s = renderScale;
    const w = 34 * s, h = 4 * s;
    const x = j.head.x - w / 2, y = j.head.y - (LEN.headR + 12) * s;
    const pct = Math.max(0, Math.min(1, meter / GUARD_METER_MAX));
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x, y, w, h);
    // Low meter reads as a warning (amber) rather than the rig's own
    // color once it's under a quarter full -- the moment guard is at
    // real risk of being forced out, not just a smaller bar in the same hue.
    ctx.fillStyle = pct < 0.25 ? '#ffb84d' : color;
    ctx.fillRect(x, y, w * pct, h);
  }

  // ---- Audio (SFX only — no music yet, nothing to score). One sfxGain ->
  // one DynamicsCompressor -> destination, per the adaptive-game-audio
  // skill's "how much do you actually need" guidance (Sigil Chain's scoped-
  // down shape, not Wonderland's full graph): a reflex-timing game's first
  // audio need is a set of distinct, instantly-legible one-shot stingers,
  // not a produced mix. Deliberately NO reverb send here even though both
  // reference Music modules have one — a reverb tail would blur the exact
  // transient onset this pass exists to sharpen (the producer's "couldn't
  // tell when to hit" problem is a clarity problem, not an atmosphere gap).
  // Every voice below is a fully-scheduled one-shot burst fired at a single
  // event instant (startAttack(), a kill, a miss, a proximity threshold
  // crossing) — none of them are continuously-updated per-frame automation,
  // so none of them need the cancel-then-ramp idiom the skill polices for
  // ongoing values; they just fire and finish.
  const SFX = (function () {
    let ctx, sfx, compressor, started = false;

    function ensureCtx() {
      if (ctx) return;
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      sfx = ctx.createGain(); sfx.gain.value = 0.6;
      compressor = ctx.createDynamicsCompressor();
      compressor.threshold.value = -18; compressor.knee.value = 12;
      compressor.ratio.value = 4; compressor.attack.value = 0.003; compressor.release.value = 0.22;
      sfx.connect(compressor); compressor.connect(ctx.destination);
      started = true;
    }

    // Windup whoosh — startAttack(): a rising bandpass noise sweep timed to
    // exactly the 110ms windup duration, so its rising pitch peaks right as
    // the strike phase begins. This is the "get ready" telegraph.
    function windupWhoosh() {
      if (!ctx) return;
      const t = ctx.currentTime;
      const len = Math.floor(ctx.sampleRate * 0.13);
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.5);
      const src = ctx.createBufferSource(); src.buffer = buf;
      const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.5;
      bp.frequency.setValueAtTime(400, t);
      bp.frequency.exponentialRampToValueAtTime(1800, t + 0.11); // 110ms == the windup phase duration exactly
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.22, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.13);
      src.connect(bp); bp.connect(g); g.connect(sfx);
      src.start(t);
    }

    // Strike-connect impact — resolveHits(), on a kill: pitch-drop sine
    // thump + a short noise click transient. Percussive/punchy on purpose,
    // the timbral opposite of missBuzz() below so a connect and a miss can
    // never be confused by ear alone.
    function strikeImpact() {
      if (!ctx) return;
      const t = ctx.currentTime;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.5, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
      const o = ctx.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(240, t);
      o.frequency.exponentialRampToValueAtTime(55, t + 0.08);
      o.connect(g); g.connect(sfx);
      o.start(t); o.stop(t + 0.18);

      const clen = Math.floor(ctx.sampleRate * 0.012);
      const cbuf = ctx.createBuffer(1, clen, ctx.sampleRate);
      const cd = cbuf.getChannelData(0);
      for (let i = 0; i < clen; i++) cd[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / clen, 4);
      const csrc = ctx.createBufferSource(); csrc.buffer = cbuf;
      const chp = ctx.createBiquadFilter(); chp.type = 'highpass'; chp.frequency.value = 2000;
      const cg = ctx.createGain(); cg.gain.value = 0.35;
      csrc.connect(chp); chp.connect(cg); cg.connect(sfx);
      csrc.start(t);
    }

    // Miss buzzer — updateEnemies()'s miss branch, when an enemy reaches
    // melee range unanswered: two detuned, descending SQUARE oscillators
    // (harsh/buzzy on purpose — square + detune beating reads as "wrong"),
    // the timbral opposite of strikeImpact()'s sine thump.
    function missBuzz() {
      if (!ctx) return;
      const t = ctx.currentTime;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.2, t + 0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.26);
      const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 900;
      lp.connect(g); g.connect(sfx);
      const o1 = ctx.createOscillator(); o1.type = 'square';
      o1.frequency.setValueAtTime(200, t);
      o1.frequency.exponentialRampToValueAtTime(90, t + 0.24);
      const o2 = ctx.createOscillator(); o2.type = 'square';
      o2.frequency.setValueAtTime(206, t); // ~1.03x detune for a harsh beating "wrong" texture
      o2.frequency.exponentialRampToValueAtTime(92.7, t + 0.24);
      const g2 = ctx.createGain(); g2.gain.value = 0.6;
      o1.connect(lp); o2.connect(g2); g2.connect(lp);
      o1.start(t); o2.start(t); o1.stop(t + 0.27); o2.stop(t + 0.27);
    }

    // Proximity pulse — updateEnemies(), fired once per enemy at each of
    // three fixed travel-fraction thresholds (0.4 / 0.7 / 0.9 of
    // ENEMY_TRAVEL_MS). This is an event-gated one-shot pattern, NOT
    // continuous per-frame automation: each pulse is a fully-scheduled
    // burst fired the single frame its threshold is crossed, never a value
    // ramped again on every tick, so it doesn't need (and deliberately
    // avoids) the cancel-then-ramp idiom. A pure-sine "beep" — the least
    // textured of the four voices on purpose, so it never gets mistaken for
    // the swept whoosh, the punchy impact, or the buzzy miss. Pitch, volume
    // rise and duration shortens pulse-to-pulse so the three read as an
    // accelerating "closing in" telegraph rather than three identical dings.
    const PULSE_DEFS = [
      { freq: 400, dur: 0.09, vol: 0.12 },
      { freq: 550, dur: 0.07, vol: 0.16 },
      { freq: 750, dur: 0.05, vol: 0.22 }
    ];
    function proximityPulse(stage) {
      if (!ctx) return;
      const def = PULSE_DEFS[stage];
      const t = ctx.currentTime;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(def.vol, t + 0.003);
      g.gain.exponentialRampToValueAtTime(0.0001, t + def.dur);
      const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = def.freq;
      o.connect(g); g.connect(sfx);
      o.start(t); o.stop(t + def.dur + 0.02);
    }

    // Parry chime (v0.1.25) — resolveDuelHit()'s parry branch, deliberately
    // distinct from every other voice here: a bright two-harmonic ring
    // (not strikeImpact()'s low thump, missBuzz()'s harsh buzz, or
    // windupWhoosh()'s sweep) so a successful parry reads as its own
    // rewarding event, not just a differently-timed block.
    function parryChime() {
      if (!ctx) return;
      const t = ctx.currentTime;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.35, t + 0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
      const o1 = ctx.createOscillator(); o1.type = 'triangle'; o1.frequency.value = 880;
      const o2 = ctx.createOscillator(); o2.type = 'triangle'; o2.frequency.value = 1320; // a fifth above -- reads as a bright chime, not a single tone
      const g2 = ctx.createGain(); g2.gain.value = 0.5;
      o1.connect(g); o2.connect(g2); g2.connect(g); g.connect(sfx);
      o1.start(t); o2.start(t); o1.stop(t + 0.36); o2.stop(t + 0.36);
    }

    return {
      ensureCtx, windupWhoosh, strikeImpact, missBuzz, proximityPulse, parryChime,
      _test: { isStarted: () => started, sfxGainValue: () => sfx ? sfx.gain.value : null }
    };
  })();
  const PULSE_THRESHOLDS = [0.4, 0.7, 0.9]; // fraction of ENEMY_TRAVEL_MS at which each proximityPulse stage fires

  // ---- Juice: particles, screen shake, hit/miss flash ----
  // Pure presentation, deliberately kept separate from collision/timing math
  // (same separation wonderland's own Juice module guarantees) -- none of
  // this reads or writes seq/seqIdx/enemy positions used for hit detection.
  // Scope decision: true hitstop (freezing the timing clock on impact) was
  // considered and left out of this pass -- it would require threading a
