<!--
  RYKNDU DOLL RIG — CHANGE LOG
  (one line per change, most recent on top — treat git commit messages as
  the authoritative record of what actually changed; this comment is
  useful context, not ground truth)

  v0.1.11 — 2026-07-20 — Game 5 2-player extension. Refactored the
                          player-1 animation state into
                          createRigController(), a factory (pure refactor,
                          verified zero behavior change against the full
                          existing suite), so player 2 could be
                          instantiated as a genuinely separate closure from
                          it instead of a hand-copied duplicate of the
                          state machine -- duplicating that logic would
                          relocate the exact "two copies of the same math
                          silently drift apart" trap this file has already
                          hit twice (mockEnemy.hitAt's duplicated duration
                          constant; the reason mirror() exists at all).
                          solveRig(pose, standOffset) gained an optional
                          second argument (default 0, so every existing
                          call site is unaffected) for where a rig stands
                          on screen, distinct from pose.pelvisDX's
                          transient per-attack lean. renderRig(joints,
                          color) gained an optional color argument (default
                          the original white) -- player 1 renders cyan
                          (#3fd0ff), player 2 indigo-violet (#6b4dff), both
                          verified against this studio's reserved gold/
                          red/green color-language bands (STUDIO_BIBLE.md
                          §11).

                          Player 2 is deliberately NOT wired into the
                          enemy/session/hit-detection system above (that
                          stays player-1-only) -- rig-vs-rig combat
                          resolution (a hurtbox, a guard timer, parry) is
                          real combat design deferred past this
                          consolidation pass. This lands the substrate:
                          two independently-driven, independently-animated
                          rigs on screen at once, each posable/testable
                          through its own window.Rig / window.Rig2 test
                          hook.

                          Input: player 2 gets a split-keyboard fallback
                          (A/D/S for kick-L/kick-R/guard) alongside
                          player 1's existing arrows, always live
                          regardless of gamepad connection. Added generic
                          Gamepad API support -- plain button indices, not
                          hardcoded to one controller model, so standard-
                          mapped devices (most USB arcade sticks included)
                          work without special-casing. Pad-to-player
                          assignment is fixed at first connection
                          (connection order: first pad -> player 1, second
                          -> player 2) and never re-arbitrated per frame --
                          deliberately NOT the existing shipped "last
                          active pad wins" pattern in wardfall.html/
                          infall.html/iridescentcosmology.html, which would
                          be actively wrong here since both players' pads
                          are live simultaneously. Kick buttons use rising-
                          edge detection (the API has no press-event model,
                          only a per-frame snapshot) so a held button
                          doesn't refire every frame; guard is level-
                          triggered by design, matching the keyboard
                          guard's hold semantics.

                          See prototypes/RYKNDU_2PLAYER.md for the full
                          writeup of what this does and doesn't cover.

  v0.1.10 — 2026-07-20 — Game 5 consolidation pass §5: added a `guard`
                          state -- POSES.guard (a held, low, arms-in brace,
                          distinct from POSES.flinch's momentary recoil)
                          plus setGuard(active)/`guarding`. A held state,
                          not a timed sequence like attacks: guarding is
                          true for exactly as long as the input is held.
                          Gated the same way attacks already gate each
                          other -- can't be raised mid-committed
                          windup/strike, but does cut off an interruptible
                          recovery tail. triggerAttack() now refuses to
                          start an attack while guarding (must release
                          guard first). Bound to ArrowDown (hold) alongside
                          the existing ArrowLeft/Right kick inputs, and to
                          window.Rig._test.setGuard() for tests. This is
                          the pose/input-gating only -- what guard actually
                          blocks (a hurtbox, a timer/meter, parry timing)
                          is real combat design deferred past this
                          consolidation pass, since there's no incoming-
                          attack-vs-player hit check to defend against yet
                          in a still-single-rig-vs-enemy-dots prototype.
                          See prototypes/RYKNDU_MOVESET.md for the full
                          state/transition table this pass also wrote.

  v0.1.9 — 2026-07-20 — Game 5 consolidation pass §3: added a named
                          attachment-socket layer (getSockets(joints):
                          hand_r, hand_l, foot_r, foot_l, hip, back, head)
                          on top of solveRig()'s existing joint output.
                          Socket names are deliberately distinct from
                          solveRig()'s own joint keys (hand_r vs handR) so
                          a stray direct joint read doesn't silently pass
                          as "using the socket system." resolveHits()
                          migrated to read foot_r/foot_l through this layer
                          instead of joints.footR/footL directly -- the
                          first real caller, so the convention is enforced
                          starting now rather than merely documented.
                          window.Rig._test.state() now also exposes
                          sockets alongside joints for test/debug
                          introspection. No behavior change: sockets
                          currently alias solveRig()'s own points 1:1
                          (no independent orientation/rotation component
                          yet, since no weapon/skin exists to need one).
                          See prototypes/RYKNDU_RIG_SCHEMA.md for the full
                          socket-layer doc.

  v0.1.8 — 2026-07-09 — Feel pass: visual/art polish, prompted by a live
                          playtest re-raising the pre-v0.1.6 complaint ("the
                          dot is so small") and a follow-up visual-art-
                          director audit. Fixed a real bug (the #debug,
                          #hud, and .version-marker overlays all shared the
                          same top strip with no reserved lanes and rendered
                          garbled overlapping text -- #debug is now gated
                          behind ?debug=1, .version-marker moved to the
                          bottom). Enemies are now a hand-authored, oriented
                          arrowhead shape with a distinct pulsing "about to
                          strike" telegraph state, not a plain ctx.arc()
                          circle. missFlash's peak alpha and decay were both
                          reduced -- it used to wash out the player's own
                          rig at the worst possible moment (a potential game
                          over). The kill death-flash now uses easeOutBack
                          for a snap instead of a linear fade. A miss now
                          triggers a brief player recoil pose (previously
                          only screen-level shake/flash reacted, never the
                          rig itself). Added ground-contact shadows and a
                          subtle background gradient to reduce the large
                          dead space above/below the rig. Added
                          prefers-reduced-motion gating for screen shake and
                          missFlash (OS-level signal only -- no settings
                          menu exists yet to layer a manual override on).
                          The GAME OVER retry text is now backed by a card
                          instead of bare fillText, which used to render
                          straight through the frozen character's head.

  v0.1.7 — 2026-07-08 — Phase 3 of the plan of action: real stakes. Up to
                          this point every build had verified-solid combat
                          but no actual way to lose -- an unanswered enemy
                          just incremented a counter forever. Added a
                          gauntlet session: MAX_MISSES=5 lives (the plan's
                          suggested 3-5-miss "winnable but threatening"
                          pool), a real GAME OVER state once they're spent,
                          and a restart on the next input -- not a
                          health-bar boss fight, which the studio never
                          built toward. A player-facing #hud (kill count +
                          heart pips) replaces reading kills/missed off the
                          dev-only #debug overlay. Session freeze on loss:
                          updateSeq()/resolveHits()/updateEnemies() stop
                          running, but particles/shake/currentPose()'s own
                          eased-to-1 settle still finish naturally, so the
                          rig holds its last pose under the overlay instead
                          of snapping or continuing to animate.

  v0.1.6 — 2026-07-08 — First quality pass against five named pillars
                          (Threat Readability, Rig Animation Quality, Combat
                          Feedback/Juice, Input Fairness & Responsiveness,
                          Audio), run the same way Wonderland/Sigil Chain's
                          own pre-game-3 quality pass worked: role-grounded
                          audits judged against a genuine bar, not a vibe
                          check, prompted directly by a producer playtest
                          ("couldn't tell when to hit, the model is so big
                          and the dot is so small").

                          The real bug underneath that complaint (found
                          independently by visual-art-director simulating
                          the pose and game-designer hand-solving the leg
                          IK — same answer, two methods): the strike pose's
                          foot target was 131px ABOVE the enemy's fixed
                          screen height at full extension, so the real hit
                          window was ~43ms concentrated at the START of the
                          strike (before the kick even looks like it's
                          landing), not at the visual "impact" moment.
                          Retargeted kickR_strike's hipR/kneeR via 2-bone IK
                          to reach the enemy's height; verified via
                          simulation that the ENTIRE 70ms strike phase is
                          now within hit radius (was ~43/70ms), and live
                          via a rAF-precision in-page timeline showing
                          distance closing smoothly through windup and the
                          kill landing on strike's first frame.

                          A second, independent engineer audit found a real
                          mechanical fairness bug: updateEnemies() ran
                          before resolveHits() in frame(), so a
                          geometrically clean, in-radius hit could get
                          stolen as a miss whenever an enemy's melee-range
                          timeout and the strike-phase start coincided in
                          the same frame — one-directional (only ever cost
                          the player), worse on lower frame rates. Fixed by
                          swapping the call order; reproduced and verified
                          fixed via a targeted timing test (12/12 clean).

                          Also landed: rig scaled 0.8x (was 262px tall vs a
                          28px enemy dot, a 9.4:1 ratio the producer
                          directly flagged) — LEN data itself is scaled,
                          not a render-time transform, since solveRig()
                          feeds both rendering and hit detection. Enemy
                          redesigned: 22px base radius growing to 34px as a
                          telegraph (reusing the travel-fraction already
                          computed, not a new timer), recolored from an
                          untokenized #c0392b to this studio's actual
                          --danger token (#ff4d70/#ff8da0, both already
                          established in wonderland.html/sigilchain.html).
                          Recovery-phase easing swapped to this studio's
                          proven easeOutBack "give it weight" idiom
                          (identical formula in both shipped games), never
                          reused here before. A kill now lingers ~220ms as
                          a fading white flash with a 10-particle
                          radiating burst (ported from wonderland's
                          hit-punch/particle patterns) instead of an
                          instant silent vanish; a miss gets its own
                          distinct danger-tinted full-screen flash, both
                          with their own screen-shake tier (kill +6, miss
                          +3) so kill and miss read as different weights,
                          not just different colors. Shake/flash are pure
                          presentation, applied as a render-time offset
                          only — never touching the coordinates hit
                          detection actually uses. True hitstop (freezing
                          the timing clock on impact) was considered and
                          explicitly left out of this pass: it would need
                          a paused "virtual now" threaded through
                          updateSeq/currentPose/startAttack, real invasive
                          risk to the just-stabilized timing system for a
                          nice-to-have when flash+punch+particles+shake
                          already deliver most of the impact.

                          Enemy spawn gap reduced 900ms->550ms (per
                          game-designer's math: the old cadence was 60%
                          dead time between encounters) — applied only
                          after the geometry fix landed, per that same
                          audit's explicit sequencing note, so this isn't
                          just letting players fail faster at a still-unfair
                          window.

                          Audio pillar landed in the same pass (separate
                          audio-designer audit): four one-shot SFX voices
                          (windup whoosh, strike impact, miss buzzer, and a
                          new proximity-pulse "closing in" cue timed to the
                          actual hit window) on a deliberately dry, reverb-
                          free graph — a reverb tail would blur the exact
                          transient onset this whole pass exists to
                          sharpen. No music system; nothing to score yet.

                          tests/rig-sequence.js extended to 22 assertions
                          (the dying-enemy lingering state, the ordering-bug
                          regression); new tests/rig-audio.js (14
                          assertions) verifies each SFX voice fires from
                          the correct call site with the right sound shape.
                          Both stable across repeated runs.

  v0.1.5 — 2026-07-08 — Real hit detection and an autonomous enemy,
                          replacing the mock marker. Two independent team
                          reviews (game-designer and engineer) had found the
                          same root cause behind this rig "feeling thin":
                          the old mockEnemy only ever existed as a side
                          effect of the player's own startAttack() call, so
                          it could never actually threaten anything.
                          Enemies now spawn and approach on their own timer
                          (one at a time for now — the array/side-based
                          shape is ready for a second concurrent enemy
                          later, but actually spawning two at once is still
                          deferred, per the studio's own gate on the
                          double-boss goal). A hit is checked only during
                          the strike phase specifically, against the real
                          kicking foot's world position from solveRig() —
                          the exact thing the v0.1.4 refactor was for. An
                          enemy that reaches melee range unanswered is
                          counted as missed rather than killed; neither
                          count is wired to a health bar or win/lose yet —
                          that's the next phase, gated on this one existing
                          first. window.Rig._test now exposes the enemy
                          list, kill/miss counts, and a spawnEnemy(side,
                          elapsedMs) hook for deterministic testing.

  v0.1.4 — 2026-07-08 — Split drawRig() into solveRig(pose), pure math that
                          returns every joint's world-space position, and
                          renderRig(joints), which only draws from that
                          output. Previously a joint's position (e.g. a
                          foot) was computed and discarded in the same
                          statement it was drawn in, so no hit-detection
                          system had anything to read. No intended visual
                          change — verified by before/after screenshot
                          comparison at idle, mid-windup, and mid-strike.
                          window.Rig._test.state() now also exposes the
                          solved joints. This was flagged as the one real
                          architectural blocker for adding enemies/hit
                          detection next (an independent engineer review
                          confirmed the rest of the rig's foundation is
                          sound and didn't need restructuring).

  v0.1.3 — 2026-07-08 — Studio audit (game-designer subagent) found the
                          attack model was structurally unable to support
                          the decided double-boss/single-input-stream design
                          goal: windup+strike+recover (400ms) was one
                          indivisible lock, even though the hit resolves
                          during strike (152ms) and the remaining 220ms of
                          recovery has no gameplay function. Split the lock
                          into committed phases (windup+strike, 180ms,
                          uninterruptible) and a final recovery phase that a
                          new input can now cancel immediately instead of
                          waiting out — a buffered input fires the instant
                          the committed phase ends, and a fresh input during
                          recovery starts right away. Also added a window.Rig
                          _test hook and a committed Playwright regression
                          test (tests/rig-sequence.js) driving this state
                          machine through the real page, since two real bugs
                          upstream were already found by simulating it, not
                          by reading it.
                          Correction (independent engineer audit, same day):
                          this comment previously misnamed the test file and
                          called it "non-DOM" — it's DOM/Playwright-driven.
                          Treat git commit messages as the authoritative
                          record for this file's history; this comment is
                          useful context but not ground truth.

  v0.1.2 — 2026-07-08 — v0.1.1's pose-blend fix only covered the transition
                          inside the sequence loop; startAttack() had the
                          same circular-self-read bug (fromPose was captured
                          AFTER seq was reassigned, so it read as a no-op),
                          causing a visible snap on every attack after the
                          first. Reordered so fromPose is captured first.
                          Also fixed a left-kick-only bug where the mirrored
                          spine angle landed ~2pi away from its visual
                          equivalent, making lerpPose sweep almost a full
                          rotation instead of a small lean — mirror() now
                          wraps spineA into (-pi, pi]. And mockEnemy.hitAt
                          no longer re-hardcodes the windup/strike durations
                          (it now reads them from the sequence itself), so a
                          future timing-tuning pass can't silently desync it.

  v0.1.1 — 2026-07-08 — Fixed a crash on the last phase of any attack
                          sequence: seqIdx could go out of bounds and get
                          read before the end-of-sequence check ran. Reordered
                          so the bounds check happens first, and fixed the
                          pose-blend handoff to use the just-completed phase's
                          actual target instead of a circular self-read.

  v0.1.0 — 2026-07-08 — Phase 0 + first rig prototype: joint hierarchy
                          (pelvis/spine/head, hip-knee legs, shoulder-elbow
                          arms), idle breathing pose, left/right kick attack
                          with windup/strike/recover phases and input
                          buffering, keyboard + tap-zone input, mock
                          incoming-enemy marker for connect-timing
                          feel-testing only (not real hit detection).
-->

<style>

  #stage { display: block; touch-action: none; }

     the same top ~8px strip with no reserved lanes, so their text visibly
     overlapped ("Do♥♥♥♥Prototype — v0.1.7") -- the audit's top-severity
     finding, since it corrupted the player-facing HUD's own legibility.
     .version-marker moves to its own row above #hint at the bottom (it's a
